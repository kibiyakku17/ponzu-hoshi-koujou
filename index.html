<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ひらけ！ほしこうじょう</title>
<style>
  :root{
    --bg:#070a14;
    --panel:#131a2e;
    --panel2:#1c2542;
    --line:#2e3a63;
    --text:#e8ecff;
    --sub:#8f9bc4;
    --accent:#5ee6c8;
    --warn:#ffb347;
    --danger:#ff6b81;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;
    touch-action:none;user-select:none;-webkit-user-select:none;}
  #game{position:fixed;inset:0;display:block;touch-action:none;}

  /* ===== HUD ===== */
  #hud-top{position:fixed;top:env(safe-area-inset-top,0);left:0;right:0;
    display:flex;align-items:center;gap:8px;padding:8px 10px;pointer-events:none;z-index:10;}
  #battery-wrap{flex:0 0 auto;display:flex;align-items:center;gap:6px;
    background:rgba(19,26,46,.88);border:1px solid var(--line);border-radius:10px;padding:6px 10px;}
  #battery-bar{width:90px;height:12px;background:#0a0f20;border-radius:6px;overflow:hidden;border:1px solid var(--line);}
  #battery-fill{height:100%;width:100%;background:var(--accent);transition:width .2s;}
  #battery-txt{font-size:11px;color:var(--sub);min-width:56px;}
  #charging{font-size:11px;color:var(--accent);display:none;}
  .hud-btn{pointer-events:auto;background:rgba(19,26,46,.88);border:1px solid var(--line);
    color:var(--text);border-radius:10px;width:40px;height:40px;font-size:18px;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .hud-btn:active{background:var(--panel2);}
  #hud-top .spacer{flex:1;}

  #quest{position:fixed;top:calc(env(safe-area-inset-top,0) + 58px);left:10px;right:10px;
    background:rgba(19,26,46,.82);border:1px solid var(--line);border-radius:10px;
    padding:7px 11px;font-size:12px;color:var(--text);z-index:9;pointer-events:none;line-height:1.5;}
  #quest b{color:var(--accent);font-weight:600;}

  #hud-bottom{position:fixed;bottom:env(safe-area-inset-bottom,0);left:0;right:0;
    padding:8px 10px 10px;z-index:10;pointer-events:none;}
  #inv-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
  .inv-chip{background:rgba(19,26,46,.88);border:1px solid var(--line);border-radius:8px;
    padding:4px 8px;font-size:12px;display:flex;align-items:center;gap:5px;}
  .dot{width:10px;height:10px;border-radius:2px;display:inline-block;flex:0 0 auto;}
  #bottom-btns{display:flex;gap:8px;}
  .big-btn{pointer-events:auto;flex:1;background:var(--panel);border:1px solid var(--line);
    color:var(--text);border-radius:12px;padding:12px 0;font-size:15px;font-weight:600;}
  .big-btn:active{background:var(--panel2);}
  #cancel-build{display:none;background:#3d2030;border-color:var(--danger);color:var(--danger);}

  #zoom-btns{position:fixed;right:10px;bottom:calc(env(safe-area-inset-bottom,0) + 110px);
    display:flex;flex-direction:column;gap:8px;z-index:10;}

  /* ===== パネル（ボトムシート） ===== */
  #panel-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;display:none;}
  #panel{position:fixed;left:0;right:0;bottom:0;max-height:72vh;overflow-y:auto;z-index:21;display:none;
    background:var(--panel);border-top:2px solid var(--line);border-radius:18px 18px 0 0;
    padding:14px 14px calc(env(safe-area-inset-bottom,0) + 18px);}
  #panel h2{font-size:16px;margin-bottom:10px;color:var(--accent);display:flex;align-items:center;gap:8px;}
  #panel h3{font-size:13px;margin:12px 0 6px;color:var(--sub);}
  .row{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #1e2745;font-size:13px;flex-wrap:wrap;}
  .row .grow{flex:1;min-width:70px;}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:8px 12px;font-size:13px;}
  .btn:active{background:#28345e;}
  .btn.primary{background:#0e4d40;border-color:var(--accent);color:var(--accent);font-weight:600;}
  .btn.danger{background:#3d2030;border-color:var(--danger);color:var(--danger);}
  .btn:disabled{opacity:.35;}
  .btn.small{padding:6px 9px;font-size:12px;}
  .cost{font-size:11px;color:var(--sub);}
  .cost .ng{color:var(--danger);}
  #panel .close-x{margin-left:auto;background:none;border:none;color:var(--sub);font-size:22px;padding:2px 8px;}
  .progress{height:8px;background:#0a0f20;border-radius:4px;overflow:hidden;border:1px solid var(--line);margin:4px 0;}
  .progress i{display:block;height:100%;background:var(--warn);}
  textarea{width:100%;height:90px;background:#0a0f20;color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:8px;font-size:11px;font-family:monospace;}

  /* ===== トースト ===== */
  #toast{position:fixed;top:calc(env(safe-area-inset-top,0) + 100px);left:50%;transform:translateX(-50%);
    background:rgba(10,15,32,.94);border:1px solid var(--accent);color:var(--text);
    padding:9px 16px;border-radius:10px;font-size:13px;z-index:40;display:none;max-width:86vw;text-align:center;}
  #toast.warn{border-color:var(--warn);color:var(--warn);}
  #toast.danger{border-color:var(--danger);color:var(--danger);}

  /* ===== クリア画面 ===== */
  #clear-overlay{position:fixed;inset:0;background:#04060e;z-index:50;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;}
  #clear-canvas{width:min(88vw,420px);border-radius:12px;border:1px solid var(--line);}
  #clear-overlay h1{font-size:22px;color:var(--accent);text-align:center;}
  #clear-overlay p{font-size:13px;color:var(--text);text-align:center;line-height:1.8;max-width:340px;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud-top">
  <div id="battery-wrap">
    <span style="font-size:14px">🔋</span>
    <div id="battery-bar"><div id="battery-fill"></div></div>
    <span id="battery-txt">100%</span>
    <span id="charging">⚡充電中</span>
  </div>
  <div class="spacer"></div>
  <button class="hud-btn" id="btn-center" title="ロボへ">📍</button>
  <button class="hud-btn" id="btn-settings" title="設定">⚙️</button>
</div>

<div id="quest"></div>

<div id="zoom-btns">
  <button class="hud-btn" id="btn-zoomin">＋</button>
  <button class="hud-btn" id="btn-zoomout">－</button>
</div>

<div id="hud-bottom">
  <div id="inv-bar"></div>
  <div id="bottom-btns">
    <button class="big-btn" id="btn-build">🔨 建設</button>
    <button class="big-btn" id="btn-erase">🗑 撤去</button>
    <button class="big-btn" id="cancel-build">✕ 設置キャンセル</button>
  </div>
</div>

<div id="panel-back"></div>
<div id="panel"></div>
<div id="toast"></div>

<div id="clear-overlay">
  <canvas id="clear-canvas" width="420" height="320"></canvas>
  <h1 id="clear-title">救難信号 送信成功！</h1>
  <p id="clear-msg">アンテナが起動し、信号は星の海を越えていく。<br>
  探査ロボ・ぽん太はこの星で、迎えの船を待ちながら<br>工場をひらきつづけるのだった……。<br><br>― Phase 1 クリア！おめでとう！ ―</p>
  <button class="btn primary" id="btn-clear-continue" style="padding:12px 30px;font-size:15px;">つづける</button>
</div>

<script>
'use strict';
/* =====================================================================
 * ひらけ！ほしこうじょう Phase 1 (MVP)  - ぽんず工房
 * 単一HTML / Canvas / localStorageセーブ
 * =====================================================================
 * ▼▼▼ 調整パラメータ（バランス調整はここをいじる） ▼▼▼ */
const CONFIG = {
  AREA_W: 48,             // 第1・第2エリアそれぞれの一辺タイル数
  MAP_H: 48,              // マップの高さ（タイル数）
  BORDER_W: 3,            // エリア間の境界壁の厚み（ゲートはこの中央に1マス）
  SEED: 20260702,        // マップ生成シード（変えると別マップ）
  VIEW_R: 4.5,           // 視界半径（タイル）
  MOVE_SPEED: 3.2,       // 移動速度（タイル/秒）
  BATTERY_MAX: 100,
  MOVE_COST: 0.55,       // 1タイル移動あたりのバッテリー消費
  CHARGE_RATE: 22,       // 拠点付近での充電速度（/秒）
  LOW_BATTERY: 25,       // 警告を出す残量
  EMPTY_PENALTY: 0.2,    // バッテリー切れ時に失う資源の割合
  MINE_PER_TAP: 1,       // 手動採掘1タップの獲得数
  ORE_MIN: 30, ORE_MAX: 55,        // 鉱脈1タイルの埋蔵量
  MINER_INTERVAL: 4,     // 採掘機の産出間隔（秒/個）
  MINER_BUFFER: 12,      // 採掘機の内部バッファ上限
  MINER_RADIUS: 1,       // 採掘機の採掘範囲（1=中心3×3）
  ARM_INTERVAL: 2,       // アームの搬送間隔（秒/個）
  BELT_TIME: 1,          // ベルトが1タイル分アイテムを運ぶのにかかる時間（秒）
  SMELT_TIME: 2.5,       // 精錬1個あたりの時間（秒）
  FURNACE_IN_CAP: 20,    // 精錬炉の投入スロット上限（種類ごと）
  FURNACE_OUT_CAP: 20,   // 精錬炉の完成品スロット上限（種類ごと）
  ASSEMBLER_TIME: 3,        // 組立機の1クラフトあたりの時間（秒）
  ASSEMBLER_IN_CAP: 20,     // 組立機の投入スロット上限（材料ごと）
  ASSEMBLER_OUT_CAP: 20,    // 組立機の完成品スロット上限
  CHEST_CAP: 60,         // 保管箱の容量（合計）
  ANTENNA_RANGE: 5,      // アンテナを設置できる拠点からの距離
  AUTOSAVE_SEC: 10,
  BATTERY_UPGRADE_COST: { circuit: 3, crystal: 2 },  // バッテリー拡張の材料（1回のみ）
  BATTERY_UPGRADE_MULT: 1.5,                          // バッテリー拡張後の最大容量倍率
  OFFLINE_MAX_HOURS: 4,        // オフライン生産を計算する上限時間
  OFFLINE_REPORT_MIN_SEC: 30,  // これ未満の不在時間はレポートしない
  // 設備の設置コスト（gateは修理コスト）
  COSTS: {
    furnace:  { stone: 5 },
    chest:    { stone: 3 },
    workbench:{ stone: 4, ironPlate: 2 },
    miner:    { ironPlate: 4, stoneBlock: 2 },
    antenna:  { part: 5, stoneBlock: 5, crystal: 3 },
    arm:      { ironPlate: 1, part: 1 },
    belt:     { ironPlate: 1 },
    gate:     { part: 10, stoneBlock: 10 },
    beacon:   { circuit: 5, part: 10, crystal: 5 },
    assembler:{ ironPlate: 5, part: 3 },
  },
  // クラフトレシピ（作業台）
  RECIPES: [
    { out: 'part', outN: 1, in: { ironPlate: 2 }, name: '部品' },
    { out: 'circuit', outN: 1, in: { copperWire: 2, ironPlate: 1 }, name: '回路' },
  ],
};
/* ▲▲▲ 調整パラメータここまで ▲▲▲ */

// ---- タイル種別 ----
const T_PLAIN = 0, T_ROCK = 1, T_IRON = 2, T_STONE = 3, T_CRYSTAL = 4, T_COPPER = 5;
const ORE_ITEM = { [T_IRON]: 'ironOre', [T_STONE]: 'stone', [T_CRYSTAL]: 'crystal', [T_COPPER]: 'copperOre' };

// ---- 4方向ベクトル（E,S,W,N の順・時計回り。canvas回転角 = index*90°と一致） ----
const DIR_VEC = [
  { x: 1, y: 0, n: '→' },
  { x: 0, y: 1, n: '↓' },
  { x: -1, y: 0, n: '←' },
  { x: 0, y: -1, n: '↑' },
];

// ---- アイテム定義 ----
const ITEMS = {
  ironOre:   { name: '鉄鉱石',   color: '#c9784a' },
  stone:     { name: '石',       color: '#9aa3ad' },
  crystal:   { name: 'エネルギー結晶', color: '#5ee6c8' },
  ironPlate: { name: '鉄板',     color: '#e8b34b' },
  stoneBlock:{ name: '石ブロック', color: '#cfd6de' },
  part:      { name: '部品',     color: '#7fb2ff' },
  copperOre: { name: '銅鉱石',   color: '#ff9248' },
  copperWire:{ name: '銅線',     color: '#e2703a' },
  circuit:   { name: '回路',     color: '#8fe0a0' },
};

// ---- 設備定義 ----
const BUILDINGS = {
  base:      { name: '拠点', icon: '🏠' },
  miner:     { name: '採掘機', icon: '⛏️', desc: '鉱脈の上に設置。数秒ごとに自動で採掘し、隣の保管箱・精錬炉へ渡す。' },
  furnace:   { name: '精錬炉', icon: '🔥', desc: '鉄鉱石→鉄板、石→石ブロックを自動で加工する。' },
  chest:     { name: '保管箱', icon: '📦', desc: 'アイテムをしまえる箱。採掘機の隣に置くと自動で溜まる。' },
  workbench: { name: '作業台', icon: '🔧', desc: '手動クラフト用。鉄板から部品を作れる。' },
  antenna:   { name: '通信アンテナ', icon: '📡', desc: '拠点の近くに設置して起動すれば救難信号を送れる！' },
  arm:       { name: 'アーム', icon: '🦾', desc: '後ろの設備/ベルトから受け取り、前の設備/ベルトへ渡す（数秒に1個）。設置後タップで90度回転。' },
  belt:      { name: 'ベルト', icon: '➡️', desc: '乗ったアイテムを進行方向へ運ぶ。設備への出し入れはアーム経由。設置後タップで90度回転。' },
  gate:      { name: '壊れたゲート', icon: '🚧' },
  beacon:    { name: '誘導ビーコン', icon: '🛰️', desc: 'アンテナ起動後の最終目標。起動すると迎えの船に位置を知らせる。' },
  assembler: { name: '組立機', icon: '⚙️', desc: 'レシピを選んで自動クラフト。材料は隣接/アーム経由で搬入、完成品はアームで搬出。' },
};

const SAVE_KEY = 'ponzu_hoshi_koujou_v1';
// マップ構成：第1エリア｜境界壁(BORDER_W、中央にゲート)｜第2エリア
const AREA_W = CONFIG.AREA_W, MAP_H = CONFIG.MAP_H, BORDER_W = CONFIG.BORDER_W;
const W = AREA_W * 2 + BORDER_W, H = MAP_H;
const GATE_X = AREA_W + Math.floor(BORDER_W / 2), GATE_Y = 24;

// =====================================================================
// 乱数（シード付き）
// =====================================================================
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
// タイル装飾用の決定的ハッシュ（0..1）
function hash2(x, y, n) {
  let h = (x * 374761393 + y * 668265263 + n * 1274126177) | 0;
  h = Math.imul(h ^ (h >>> 13), 1103515245);
  return ((h >>> 16) & 1023) / 1023;
}

// =====================================================================
// ゲーム状態
// =====================================================================
const G = {
  tiles: new Uint8Array(W * H),
  ore: new Uint16Array(W * H),      // 鉱脈の残量
  explored: new Uint8Array(W * H),
  buildings: {},                    // "x,y" -> building object
  base: { x: 24, y: 24 },           // 第1エリア内、局所座標=グローバル座標（第1エリアはx0=0に配置）
  player: {
    x: 24, y: 25,                   // タイル座標（float）
    path: [],                       // 移動先ノード列
    battery: CONFIG.BATTERY_MAX,
    inv: {},
    pending: null,                  // 到着後アクション {type,x,y}
    facing: 1,
    batteryUpgraded: false,
  },
  flags: {},                        // クエスト進行フラグ
  cleared: false,
  beaconCleared: false,
  lastSeen: Date.now(),
  time: 0,
};

const idx = (x, y) => y * W + x;
const inMap = (x, y) => x >= 0 && y >= 0 && x < W && y < H;
const bkey = (x, y) => x + ',' + y;
const buildingAt = (x, y) => G.buildings[bkey(x, y)];
function walkable(x, y) {
  if (!inMap(x, y) || G.tiles[idx(x, y)] === T_ROCK) return false;
  const b = buildingAt(x, y);
  if (!b) return true;
  if (b.type === 'gate') return b.repaired;   // 修理済みゲートだけ通行可
  return false;
}
function invCount(inv, item) { return inv[item] || 0; }
function invAdd(inv, item, n) { inv[item] = (inv[item] || 0) + n; if (inv[item] <= 0) delete inv[item]; }
function invTotal(inv) { return Object.values(inv).reduce((a, b) => a + b, 0); }
function battMax() { return CONFIG.BATTERY_MAX * (G.player.batteryUpgraded ? CONFIG.BATTERY_UPGRADE_MULT : 1); }

// =====================================================================
// マップ生成（第1・第2エリアをそれぞれローカル生成してから貼り付け）
// =====================================================================
// 1エリア分（AREA_W×MAP_H）の地形をローカル座標で生成する
function genAreaLocal(rng, opts) {
  const LN = AREA_W;
  const tiles = new Uint8Array(LN * MAP_H);
  const ore = new Uint16Array(LN * MAP_H);
  const lidx = (x, y) => y * LN + x;
  const linMap = (x, y) => x >= 0 && y >= 0 && x < LN && y < MAP_H;

  // 岩クラスタ（ランダムウォーク）
  for (let c = 0; c < (opts.rockClusters || 28); c++) {
    let x = Math.floor(rng() * LN), y = Math.floor(rng() * MAP_H);
    const size = 4 + Math.floor(rng() * 8);
    for (let s = 0; s < size; s++) {
      if (linMap(x, y)) tiles[lidx(x, y)] = T_ROCK;
      x += Math.floor(rng() * 3) - 1; y += Math.floor(rng() * 3) - 1;
    }
  }
  function placeVein(type, cx, cy, size) {
    let x = cx, y = cy, placed = 0;
    for (let s = 0; s < size * 3 && placed < size; s++) {
      if (linMap(x, y) && tiles[lidx(x, y)] === T_PLAIN) {
        tiles[lidx(x, y)] = type;
        ore[lidx(x, y)] = CONFIG.ORE_MIN + Math.floor(rng() * (CONFIG.ORE_MAX - CONFIG.ORE_MIN));
        placed++;
      }
      x += Math.floor(rng() * 3) - 1; y += Math.floor(rng() * 3) - 1;
    }
    return placed;
  }

  const bx = 24, by = 24; // 第1エリアの拠点位置（G.baseと一致させる）
  for (let i = 0; i < 7; i++) placeVein(T_IRON, Math.floor(rng() * LN), Math.floor(rng() * MAP_H), 4 + Math.floor(rng() * 4));
  for (let i = 0; i < 7; i++) placeVein(T_STONE, Math.floor(rng() * LN), Math.floor(rng() * MAP_H), 4 + Math.floor(rng() * 4));
  for (let i = 0; i < 5; i++) {
    let x, y, guard = 0;
    do { x = Math.floor(rng() * LN); y = Math.floor(rng() * MAP_H); }
    while (opts.hasBase && Math.hypot(x - bx, y - by) < 12 && ++guard < 50);
    placeVein(T_CRYSTAL, x, y, 3 + Math.floor(rng() * 3));
  }
  if (opts.copper) {
    for (let i = 0; i < 8; i++) placeVein(T_COPPER, Math.floor(rng() * LN), Math.floor(rng() * MAP_H), 4 + Math.floor(rng() * 4));
  }

  if (opts.hasBase) {
    for (let dy = -3; dy <= 3; dy++) for (let dx = -3; dx <= 3; dx++) {
      const x = bx + dx, y = by + dy;
      if (linMap(x, y)) { tiles[lidx(x, y)] = T_PLAIN; ore[lidx(x, y)] = 0; }
    }
    placeVein(T_IRON, bx - 5, by - 4, 5);
    placeVein(T_STONE, bx + 5, by + 4, 5);
  } else if (opts.copper) {
    // ゲート側の入口付近に銅・鉄鉱脈を保証
    for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
      const x = 2 + dx, y = GATE_Y + dy;
      if (linMap(x, y)) { tiles[lidx(x, y)] = T_PLAIN; ore[lidx(x, y)] = 0; }
    }
    placeVein(T_COPPER, 3, GATE_Y, 5);
    placeVein(T_IRON, 2, GATE_Y - 6, 4);
  }

  return { tiles, ore };
}

function pasteArea(local, x0) {
  for (let y = 0; y < MAP_H; y++) for (let x = 0; x < AREA_W; x++) {
    const gi = idx(x0 + x, y), li = y * AREA_W + x;
    G.tiles[gi] = local.tiles[li];
    G.ore[gi] = local.ore[li];
  }
}

// 境界壁＋ゲート開口部を彫る（tiles/oreは任意の配列に対して実行できる：移行処理でも再利用）
function carveBorderAndGate(tiles, ore) {
  for (let y = 0; y < MAP_H; y++) for (let x = AREA_W; x < AREA_W + BORDER_W; x++) {
    tiles[idx(x, y)] = T_ROCK; ore[idx(x, y)] = 0;
  }
  // ゲートの行は境界の壁の厚み全体＋両側の接続タイルを地形として通行可能にする。
  // 未修理の間は、ゲート「建物」自体（walkable()）が通行を塞ぐ。
  for (let x = AREA_W - 1; x <= AREA_W + BORDER_W; x++) {
    tiles[idx(x, GATE_Y)] = T_PLAIN; ore[idx(x, GATE_Y)] = 0;
  }
}

function genMap(seed) {
  const rng = mulberry32(seed);
  G.tiles.fill(T_ROCK);
  G.ore.fill(0);

  const area1 = genAreaLocal(rng, { hasBase: true, rockClusters: 30 });
  pasteArea(area1, 0);
  const area2 = genAreaLocal(rng, { hasBase: false, copper: true, rockClusters: 24 });
  pasteArea(area2, AREA_W + BORDER_W);
  carveBorderAndGate(G.tiles, G.ore);

  G.buildings = {};
  G.buildings[bkey(G.base.x, G.base.y)] = { type: 'base', x: G.base.x, y: G.base.y };
  G.buildings[bkey(GATE_X, GATE_Y)] = { type: 'gate', x: GATE_X, y: GATE_Y, repaired: false };
  G.player.x = G.base.x; G.player.y = G.base.y + 1;
  G.player.batteryUpgraded = false;
  G.beaconCleared = false;
}

// =====================================================================
// 経路探索（A*・4方向）
// =====================================================================
function findPath(sx, sy, tx, ty) {
  if (!walkable(tx, ty)) return null;
  const open = [{ x: sx, y: sy, g: 0, f: 0, p: null }];
  const seen = new Map([[idx(sx, sy), 0]]);
  let guard = 0;
  while (open.length && ++guard < 6000) {
    let bi = 0;
    for (let i = 1; i < open.length; i++) if (open[i].f < open[bi].f) bi = i;
    const cur = open.splice(bi, 1)[0];
    if (cur.x === tx && cur.y === ty) {
      const path = [];
      for (let n = cur; n.p; n = n.p) path.unshift({ x: n.x, y: n.y });
      return path;
    }
    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const nx = cur.x + dx, ny = cur.y + dy;
      if (!walkable(nx, ny)) continue;
      const g = cur.g + 1;
      const k = idx(nx, ny);
      if (seen.has(k) && seen.get(k) <= g) continue;
      seen.set(k, g);
      open.push({ x: nx, y: ny, g, f: g + Math.abs(tx - nx) + Math.abs(ty - ny), p: cur });
    }
  }
  return null;
}
// 目標の隣接タイルへの経路（設備や鉱脈に近づく用）
function findPathAdjacent(tx, ty) {
  const p = G.player, sx = Math.round(p.x), sy = Math.round(p.y);
  let best = null;
  for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
    const ax = tx + dx, ay = ty + dy;
    if (!walkable(ax, ay)) continue;
    if (ax === sx && ay === sy) return [];
    const path = findPath(sx, sy, ax, ay);
    if (path && (!best || path.length < best.length)) best = path;
  }
  return best;
}

// =====================================================================
// プレイヤー操作
// =====================================================================
function playerDistTo(x, y) { return Math.hypot(G.player.x - x, G.player.y - y); }

function tryMine(x, y) {
  const t = G.tiles[idx(x, y)];
  const item = ORE_ITEM[t];
  if (!item || G.ore[idx(x, y)] <= 0) return;
  G.ore[idx(x, y)] -= CONFIG.MINE_PER_TAP;
  invAdd(G.player.inv, item, CONFIG.MINE_PER_TAP);
  fx.push({ type: 'pop', x, y, txt: '+1 ' + ITEMS[item].name, t: 0 });
  if (G.ore[idx(x, y)] <= 0) {
    G.tiles[idx(x, y)] = T_PLAIN;
    toast(ITEMS[item].name + 'の鉱脈を掘りつくした');
  }
  markDirty();
}

function onTapTile(x, y) {
  if (!inMap(x, y) || !G.explored[idx(x, y)]) { return; }
  const p = G.player;

  // 撤去モード
  if (eraseMode) {
    const b = buildingAt(x, y);
    if (b && b.type !== 'base' && b.type !== 'gate') removeBuilding(b);
    else toast('ここには撤去できる設備がない', 'warn');
    return;
  }

  // 設置モード
  if (buildMode) { tryPlace(buildMode, x, y); return; }

  // 設備タップ
  const b = buildingAt(x, y);
  if (b) {
    if (playerDistTo(x, y) <= 1.6) { openBuilding(b); }
    else {
      const path = findPathAdjacent(x, y);
      if (path) { p.path = path; p.pending = { type: 'open', x, y }; }
      else toast('そこへは行けない', 'warn');
    }
    return;
  }

  // 鉱脈タップ → 近ければ採掘、遠ければ移動して採掘
  const t = G.tiles[idx(x, y)];
  if (ORE_ITEM[t]) {
    if (playerDistTo(x, y) <= 1.6) { tryMine(x, y); }
    else {
      const path = findPath(Math.round(p.x), Math.round(p.y), x, y) || findPathAdjacent(x, y);
      if (path) { p.path = path; p.pending = { type: 'mine', x, y }; }
      else toast('そこへは行けない', 'warn');
    }
    return;
  }

  // 平地タップ → 移動
  if (t === T_ROCK) { toast('岩は通れない', 'warn'); return; }
  const path = findPath(Math.round(p.x), Math.round(p.y), x, y);
  if (path) { p.path = path; p.pending = null; }
  else toast('そこへは行けない', 'warn');
}

// =====================================================================
// 設備の設置・撤去
// =====================================================================
let buildMode = null;
let eraseMode = false;

function canAfford(cost) {
  return Object.entries(cost).every(([k, v]) => invCount(G.player.inv, k) >= v);
}
function payCost(cost) { for (const [k, v] of Object.entries(cost)) invAdd(G.player.inv, k, -v); }
function costText(cost) {
  return Object.entries(cost).map(([k, v]) => {
    const ok = invCount(G.player.inv, k) >= v;
    return `<span class="${ok ? '' : 'ng'}">${ITEMS[k].name}×${v}</span>`;
  }).join('　');
}

function tryPlace(type, x, y) {
  const cost = CONFIG.COSTS[type];
  if (!G.explored[idx(x, y)]) { toast('未探索の場所には置けない', 'warn'); return; }
  if (buildingAt(x, y)) { toast('すでに設備がある', 'warn'); return; }
  if (Math.round(G.player.x) === x && Math.round(G.player.y) === y) { toast('ロボの足元には置けない', 'warn'); return; }
  const t = G.tiles[idx(x, y)];
  if (type === 'miner') {
    if (t === T_ROCK) { toast('岩の上には置けない', 'warn'); return; }
    let hasOre = false;
    const R = CONFIG.MINER_RADIUS;
    for (let dy = -R; dy <= R && !hasOre; dy++) for (let dx = -R; dx <= R; dx++) {
      const nx = x + dx, ny = y + dy;
      if (inMap(nx, ny) && ORE_ITEM[G.tiles[idx(nx, ny)]] && G.ore[idx(nx, ny)] > 0) { hasOre = true; break; }
    }
    if (!hasOre) { toast(`採掘機は鉱脈から${R}マス以内に置く`, 'warn'); return; }
  } else {
    if (t === T_ROCK) { toast('岩の上には置けない', 'warn'); return; }
    if (ORE_ITEM[t]) { toast('鉱脈の上に置けるのは採掘機だけ', 'warn'); return; }
  }
  if (type === 'antenna' && Math.hypot(x - G.base.x, y - G.base.y) > CONFIG.ANTENNA_RANGE) {
    toast(`アンテナは拠点から${CONFIG.ANTENNA_RANGE}マス以内に設置する`, 'warn'); return;
  }
  if (!canAfford(cost)) { toast('材料が足りない', 'warn'); return; }

  payCost(cost);
  const b = { type, x, y };
  if (type === 'miner') { b.timer = 0; b.buffer = {}; }
  if (type === 'furnace') { b.input = {}; b.output = {}; b.job = null; b.progress = 0; }
  if (type === 'chest') { b.inv = {}; }
  if (type === 'antenna') { b.active = false; }
  if (type === 'arm') { b.dir = 0; b.timer = 0; }
  if (type === 'belt') { b.dir = 0; b.item = null; b.progress = 0; }
  if (type === 'beacon') { b.active = false; }
  if (type === 'assembler') { b.input = {}; b.output = {}; b.job = null; b.progress = 0; b.recipeOut = null; }
  G.buildings[bkey(x, y)] = b;
  buildMode = null;
  updateBuildModeUI();
  toast(BUILDINGS[type].name + 'を設置した！');
  markDirty(); saveGame();
}

function removeBuilding(b) {
  if (b.type === 'base' || b.type === 'gate') return; // 拠点・ゲートは撤去不可
  // コスト返却＋中身をプレイヤーへ
  payCostRefund(CONFIG.COSTS[b.type]);
  for (const src of [b.buffer, b.input, b.output, b.inv]) {
    if (src) for (const [k, v] of Object.entries(src)) invAdd(G.player.inv, k, v);
  }
  if (b.item) invAdd(G.player.inv, b.item, 1);
  delete G.buildings[bkey(b.x, b.y)];
  closePanel();
  toast(BUILDINGS[b.type].name + 'を撤去した（材料は返却）');
  markDirty(); saveGame();
}
function payCostRefund(cost) { for (const [k, v] of Object.entries(cost)) invAdd(G.player.inv, k, v); }

// =====================================================================
// 設備の自動処理
// =====================================================================
const SMELT_OUT = { ironOre: 'ironPlate', stone: 'stoneBlock', copperOre: 'copperWire' };
function furnaceAccepts(item) { return !!SMELT_OUT[item]; }

// ---- 設備の入出力（採掘機バッファ／精錬炉の投入出力／保管箱／ベルト、共通操作） ----
function firstKey(obj) { const ks = Object.keys(obj); return ks.length ? ks[0] : null; }
function bldPeekOutput(b) {
  if (b.type === 'chest') return firstKey(b.inv);
  if (b.type === 'furnace') return firstKey(b.output);
  if (b.type === 'miner') return firstKey(b.buffer);
  if (b.type === 'assembler') return firstKey(b.output);
  if (b.type === 'belt') return b.item;
  return null;
}
function bldRemoveOne(b, item) {
  if (b.type === 'chest') invAdd(b.inv, item, -1);
  else if (b.type === 'furnace') invAdd(b.output, item, -1);
  else if (b.type === 'miner') invAdd(b.buffer, item, -1);
  else if (b.type === 'assembler') invAdd(b.output, item, -1);
  else if (b.type === 'belt') { b.item = null; b.progress = 0; }
}
function bldCanInsert(b, item) {
  if (b.type === 'chest') return invTotal(b.inv) < CONFIG.CHEST_CAP;
  if (b.type === 'furnace') return furnaceAccepts(item) && invCount(b.input, item) < CONFIG.FURNACE_IN_CAP;
  if (b.type === 'assembler') {
    const recipe = assemblerRecipe(b);
    return !!(recipe && recipe.in[item] !== undefined && invCount(b.input, item) < CONFIG.ASSEMBLER_IN_CAP);
  }
  if (b.type === 'belt') return !b.item;
  return false;
}
function bldInsert(b, item) {
  if (b.type === 'chest') invAdd(b.inv, item, 1);
  else if (b.type === 'furnace') invAdd(b.input, item, 1);
  else if (b.type === 'assembler') invAdd(b.input, item, 1);
  else if (b.type === 'belt') { b.item = item; b.progress = 0; }
}

function tickMachines(dt) {
  for (const b of Object.values(G.buildings)) {
    if (b.type === 'miner') tickMiner(b, dt);
    else if (b.type === 'furnace') tickFurnace(b, dt);
    else if (b.type === 'assembler') tickAssembler(b, dt);
    else if (b.type === 'arm') tickArm(b, dt);
    else if (b.type === 'belt') tickBelt(b, dt);
  }
}

// 組立機に選択中のレシピオブジェクトを返す（CONFIG.RECIPESからoutで検索）
function assemblerRecipe(b) { return b.recipeOut ? CONFIG.RECIPES.find(r => r.out === b.recipeOut) : null; }

function tickAssembler(b, dt) {
  const recipe = assemblerRecipe(b);
  if (!recipe) return; // レシピ未選択
  if (!b.job) {
    const hasAll = Object.entries(recipe.in).every(([k, v]) => invCount(b.input, k) >= v);
    if (hasAll && invCount(b.output, recipe.out) < CONFIG.ASSEMBLER_OUT_CAP) {
      for (const [k, v] of Object.entries(recipe.in)) invAdd(b.input, k, -v);
      b.job = recipe.out; b.progress = 0;
    }
  }
  if (b.job) {
    b.progress += dt;
    if (b.progress >= CONFIG.ASSEMBLER_TIME) {
      const jobRecipe = CONFIG.RECIPES.find(r => r.out === b.job);
      invAdd(b.output, b.job, jobRecipe ? jobRecipe.outN : 1);
      b.job = null; b.progress = 0;
      markDirty();
    }
  }
}

function tickArm(a, dt) {
  a.timer += dt;
  if (a.timer < CONFIG.ARM_INTERVAL) return;
  const dv = DIR_VEC[a.dir];
  const src = buildingAt(a.x - dv.x, a.y - dv.y);
  const dst = buildingAt(a.x + dv.x, a.y + dv.y);
  if (!src || !dst) return;
  const item = bldPeekOutput(src);
  if (!item) return;
  if (!bldCanInsert(dst, item)) return;
  bldRemoveOne(src, item);
  bldInsert(dst, item);
  a.timer = 0;
  markDirty();
}

function tickBelt(b, dt) {
  if (!b.item) return;
  if (b.progress < 1) b.progress = Math.min(1, b.progress + dt / CONFIG.BELT_TIME);
  if (b.progress >= 1) {
    const dv = DIR_VEC[b.dir];
    const nb = buildingAt(b.x + dv.x, b.y + dv.y);
    if (nb && nb.type === 'belt' && !nb.item) {
      nb.item = b.item; nb.progress = 0;
      b.item = null; b.progress = 0;
      markDirty();
    }
  }
}

// 採掘機の中心から半径MINER_RADIUS内にある、まだ残量のある鉱脈タイル一覧
function minerOreTiles(b) {
  const list = [];
  const R = CONFIG.MINER_RADIUS;
  for (let dy = -R; dy <= R; dy++) for (let dx = -R; dx <= R; dx++) {
    const nx = b.x + dx, ny = b.y + dy;
    if (!inMap(nx, ny)) continue;
    const t = G.tiles[idx(nx, ny)];
    if (ORE_ITEM[t] && G.ore[idx(nx, ny)] > 0) list.push({ x: nx, y: ny, item: ORE_ITEM[t] });
  }
  return list;
}

function tickMiner(b, dt) {
  const veins = minerOreTiles(b);
  if (veins.length === 0) { b.depleted = true; return; }   // 範囲内の鉱脈が尽きた
  b.depleted = false;
  b.timer += dt;
  if (b.timer < CONFIG.MINER_INTERVAL) return;
  // 範囲内の鉱脈を順番に採掘（ラウンドロビン）
  const cursor = (b.cursor || 0) % veins.length;
  const vein = veins[cursor];
  b.cursor = (cursor + 1) % veins.length;
  const item = vein.item;
  // 受け渡し先を探す（隣接の精錬炉→保管箱→内部バッファ）
  let placed = false;
  for (const dv of DIR_VEC) {
    const nb = buildingAt(b.x + dv.x, b.y + dv.y);
    if (nb && (nb.type === 'furnace' || nb.type === 'chest') && bldCanInsert(nb, item)) {
      bldInsert(nb, item); placed = true; break;
    }
  }
  if (!placed) {
    if (invTotal(b.buffer) >= CONFIG.MINER_BUFFER) return; // 満杯：待機（timerは保持）
    invAdd(b.buffer, item, 1);
  }
  b.timer = 0;
  const vi = idx(vein.x, vein.y);
  G.ore[vi]--;
  if (G.ore[vi] <= 0) G.tiles[vi] = T_PLAIN;
  markDirty();
}

function tickFurnace(b, dt) {
  if (!b.job) {
    for (const src of Object.keys(SMELT_OUT)) {
      const out = SMELT_OUT[src];
      if (invCount(b.input, src) > 0 && invCount(b.output, out) < CONFIG.FURNACE_OUT_CAP) {
        invAdd(b.input, src, -1);
        b.job = out; b.progress = 0;
        break;
      }
    }
  }
  if (b.job) {
    b.progress += dt;
    if (b.progress >= CONFIG.SMELT_TIME) {
      invAdd(b.output, b.job, 1);
      b.job = null; b.progress = 0;
      markDirty();
    }
  }
}

// =====================================================================
// 更新ループ
// =====================================================================
let dirty = true;
function markDirty() { dirty = true; }
const fx = [];   // エフェクト（+1ポップなど）

function update(dt) {
  G.time += dt;
  const p = G.player;

  // --- 移動 ---
  if (p.path.length > 0) {
    const node = p.path[0];
    const dx = node.x - p.x, dy = node.y - p.y;
    const dist = Math.hypot(dx, dy);
    const step = CONFIG.MOVE_SPEED * dt;
    if (Math.abs(dx) > 0.01) p.facing = dx > 0 ? 1 : -1;
    if (dist <= step) {
      p.x = node.x; p.y = node.y;
      p.path.shift();
      p.battery = Math.max(0, p.battery - CONFIG.MOVE_COST * dist);
    } else {
      p.x += dx / dist * step; p.y += dy / dist * step;
      p.battery = Math.max(0, p.battery - CONFIG.MOVE_COST * step);
    }
    if (followCam) centerCamera(false);
    // バッテリー警告（最大容量に対する割合で判定。バッテリー拡張後も同じ％で警告）
    const lowThreshold = battMax() * (CONFIG.LOW_BATTERY / CONFIG.BATTERY_MAX);
    if (p.battery <= lowThreshold && !lowWarned && p.battery > 0) {
      lowWarned = true;
      toast('⚠️ バッテリー残りわずか！拠点に戻って充電しよう', 'warn');
    }
    // バッテリー切れ → 強制帰還
    if (p.battery <= 0) forcedReturn();
  } else if (p.pending) {
    const a = p.pending; p.pending = null;
    if (playerDistTo(a.x, a.y) <= 1.6) {
      if (a.type === 'mine') tryMine(a.x, a.y);
      else if (a.type === 'open') { const b = buildingAt(a.x, a.y); if (b) openBuilding(b); }
    }
  }

  // --- 充電 ---
  const nearBase = Math.hypot(p.x - G.base.x, p.y - G.base.y) <= 1.8;
  const chargingEl = document.getElementById('charging');
  if (nearBase && p.battery < battMax()) {
    p.battery = Math.min(battMax(), p.battery + CONFIG.CHARGE_RATE * dt);
    chargingEl.style.display = 'inline';
    if (p.battery > battMax() * (CONFIG.LOW_BATTERY / CONFIG.BATTERY_MAX)) lowWarned = false;
  } else {
    chargingEl.style.display = 'none';
  }

  // --- 視界 ---
  const px = Math.round(p.x), py = Math.round(p.y), R = Math.ceil(CONFIG.VIEW_R);
  for (let dy = -R; dy <= R; dy++) for (let dx = -R; dx <= R; dx++) {
    const x = px + dx, y = py + dy;
    if (inMap(x, y) && dx * dx + dy * dy <= CONFIG.VIEW_R * CONFIG.VIEW_R) G.explored[idx(x, y)] = 1;
  }

  // --- 設備 ---
  tickMachines(dt);

  // --- エフェクト ---
  for (let i = fx.length - 1; i >= 0; i--) { fx[i].t += dt; if (fx[i].t > 1) fx.splice(i, 1); }

  // --- クエスト＆HUD ---
  updateFlags();
  if (dirty) { renderInvBar(); renderQuest(); refreshOpenPanel(); dirty = false; }
  renderBattery();

  // --- オートセーブ ---
  autosaveT += dt;
  if (autosaveT >= CONFIG.AUTOSAVE_SEC) { autosaveT = 0; saveGame(); }
}

let lowWarned = false;
let autosaveT = 0;

function forcedReturn() {
  const p = G.player;
  p.path = []; p.pending = null;
  p.x = G.base.x; p.y = G.base.y + 1;
  // 軽ペナルティ：資源の一部を失う
  for (const k of Object.keys(p.inv)) {
    const lose = Math.floor(p.inv[k] * CONFIG.EMPTY_PENALTY);
    if (lose > 0) invAdd(p.inv, k, -lose);
  }
  centerCamera(true);
  toast('🔋 バッテリー切れ！緊急帰還した（資源の一部を失った…）', 'danger');
  lowWarned = false;
  markDirty();
}

// =====================================================================
// クエスト（進行ガイド）
// =====================================================================
const QUESTS = [
  { id: 'gather',   check: () => invCount(G.player.inv, 'ironOre') + totalEverMined('ironOre') >= 1 && invCount(G.player.inv, 'stone') >= 5,
    text: '鉱脈をタップして <b>鉄鉱石</b> と <b>石×5</b> を集めよう' },
  { id: 'furnace',  check: () => hasBuilding('furnace'), text: '<b>精錬炉</b> を建てよう（🔨建設 → 石×5）' },
  { id: 'plate',    check: () => everHad('ironPlate'), text: '精錬炉に <b>鉄鉱石</b> を入れて <b>鉄板</b> を作ろう' },
  { id: 'workbench',check: () => hasBuilding('workbench'), text: '<b>作業台</b> を建てよう（石×4＋鉄板×2）' },
  { id: 'part',     check: () => everHad('part'), text: '作業台で <b>部品</b> を作ろう（鉄板×2）' },
  { id: 'miner',    check: () => hasBuilding('miner'), text: '<b>採掘機</b> を鉱脈の上に置いて自動化しよう（鉄板×4＋石ブロック×2）' },
  { id: 'antenna',  check: () => hasBuilding('antenna'), text: '<b>通信アンテナ</b> を拠点の近くに建てよう（部品×5＋石ブロック×5＋結晶×3）' },
  { id: 'activate', check: () => G.cleared, text: 'アンテナをタップして <b>起動</b> しよう！' },
];
// アンテナ起動後の継続目標
const QUESTS_POST = [
  { id: 'gate',    check: () => !!G.flags['q_gate'],
    text: '東側の<b>壊れたゲート</b>を修理して第2エリアへ行こう（部品×10＋石ブロック×10）' },
  { id: 'copper',  check: () => everHad('copperWire'), text: '第2エリアで<b>銅鉱石</b>を集めて精錬炉で<b>銅線</b>を作ろう' },
  { id: 'circuit', check: () => everHad('circuit'), text: '作業台で<b>回路</b>を作ろう（銅線×2＋鉄板×1）' },
  { id: 'battery', check: () => !!G.player.batteryUpgraded, text: '作業台で<b>バッテリー拡張</b>をしよう（回路×3＋結晶×2）' },
  { id: 'beacon',  check: () => G.beaconCleared, text: '<b>誘導ビーコン</b>を建てて起動しよう（回路×5＋部品×10＋結晶×5）' },
];
function hasBuilding(type) { return Object.values(G.buildings).some(b => b.type === type); }
function buildingOfType(type) { return Object.values(G.buildings).find(b => b.type === type); }
function everHad(item) { return !!G.flags['had_' + item]; }
function totalEverMined() { return 0; } // gather判定は所持数で簡易化
function updateFlags() {
  for (const k of ['ironPlate', 'part', 'copperWire', 'circuit']) {
    if (invCount(G.player.inv, k) > 0) {
      if (!G.flags['had_' + k]) { G.flags['had_' + k] = true; markDirty(); }
    }
  }
  for (const q of [...QUESTS, ...QUESTS_POST]) {
    if (!G.flags['q_' + q.id] && q.check()) { G.flags['q_' + q.id] = true; markDirty(); }
  }
}
function renderQuest() {
  const el = document.getElementById('quest');
  if (!G.cleared) {
    const q = QUESTS.find(q => !G.flags['q_' + q.id]);
    el.innerHTML = q ? '🎯 ' + q.text : '🎉 全ステップ完了！';
    return;
  }
  const q2 = QUESTS_POST.find(q => !G.flags['q_' + q.id]);
  el.innerHTML = q2 ? '🎯 ' + q2.text : '🎉 すべての目標を達成した！自由に工場をひろげよう';
}

// =====================================================================
// 描画
// =====================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let cam = { x: 24, y: 25 };   // 画面中心のタイル座標
let tilePx = 40;              // ズーム（1タイルのピクセルサイズ）
let followCam = true;
let dpr = 1, vw = 0, vh = 0;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  vw = window.innerWidth; vh = window.innerHeight;
  canvas.width = vw * dpr; canvas.height = vh * dpr;
  canvas.style.width = vw + 'px'; canvas.style.height = vh + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);

function centerCamera(snap) {
  if (snap) { cam.x = G.player.x; cam.y = G.player.y; }
  else {
    cam.x += (G.player.x - cam.x) * 0.15;
    cam.y += (G.player.y - cam.y) * 0.15;
  }
}
function tileToScreen(x, y) {
  return [vw / 2 + (x - cam.x) * tilePx, vh / 2 + (y - cam.y) * tilePx];
}
function screenToTile(sx, sy) {
  return [Math.round(cam.x + (sx - vw / 2) / tilePx), Math.round(cam.y + (sy - vh / 2) / tilePx)];
}

function render() {
  ctx.fillStyle = '#04060e';
  ctx.fillRect(0, 0, vw, vh);
  // 宇宙背景の星
  for (let i = 0; i < 60; i++) {
    const sx = (hash2(i, 7, 1) * vw), sy = (hash2(i, 13, 2) * vh);
    ctx.globalAlpha = 0.25 + 0.5 * hash2(i, 3, 3);
    ctx.fillStyle = '#cfd8ff';
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  const s = tilePx;
  const x0 = Math.floor(cam.x - vw / 2 / s) - 1, x1 = Math.ceil(cam.x + vw / 2 / s) + 1;
  const y0 = Math.floor(cam.y - vh / 2 / s) - 1, y1 = Math.ceil(cam.y + vh / 2 / s) + 2;
  const p = G.player;

  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      if (!inMap(x, y)) continue;
      const [sx, sy] = tileToScreen(x - 0.5, y - 0.5);
      if (!G.explored[idx(x, y)]) continue;  // 未探索＝背景（霧）のまま
      drawTile(x, y, sx, sy, s);
    }
  }

  // 経路プレビュー
  ctx.fillStyle = 'rgba(94,230,200,.5)';
  for (const node of p.path) {
    const [sx, sy] = tileToScreen(node.x, node.y);
    ctx.beginPath(); ctx.arc(sx, sy, s * 0.08, 0, 7); ctx.fill();
  }

  // 設備（y順に描く）
  const blds = Object.values(G.buildings).filter(b => G.explored[idx(b.x, b.y)]).sort((a, b) => a.y - b.y);
  let playerDrawn = false;
  for (const b of blds) {
    if (!playerDrawn && p.y < b.y) { drawPlayer(s); playerDrawn = true; }
    const [sx, sy] = tileToScreen(b.x - 0.5, b.y - 0.5);
    drawBuilding(b, sx, sy, s);
  }
  if (!playerDrawn) drawPlayer(s);

  // 現在視界外の霧（探索済みだが暗い）
  ctx.fillStyle = 'rgba(4,6,14,.55)';
  for (let y = y0; y <= y1; y++) for (let x = x0; x <= x1; x++) {
    if (!inMap(x, y) || !G.explored[idx(x, y)]) continue;
    const d2 = (x - p.x) ** 2 + (y - p.y) ** 2;
    if (d2 > CONFIG.VIEW_R * CONFIG.VIEW_R) {
      const [sx, sy] = tileToScreen(x - 0.5, y - 0.5);
      ctx.fillRect(sx, sy, s + 1, s + 1);
    }
  }

  // 設置モードのガイド
  if (buildMode) {
    ctx.strokeStyle = 'rgba(94,230,200,.7)'; ctx.lineWidth = 2;
    if (buildMode === 'antenna') {
      const [bx, by] = tileToScreen(G.base.x, G.base.y);
      ctx.beginPath(); ctx.arc(bx, by, CONFIG.ANTENNA_RANGE * s, 0, 7); ctx.stroke();
    }
  }

  // ベルト連続設置／連続撤去のドラッグプレビュー
  if (dragPath) {
    const rgb = dragPath.mode === 'belt' ? '94,230,200' : '255,107,129';
    for (const t of dragPath.tiles) {
      const [tsx, tsy] = tileToScreen(t.x - 0.5, t.y - 0.5);
      ctx.fillStyle = `rgba(${rgb},.35)`;
      ctx.fillRect(tsx, tsy, s, s);
      if (dragPath.mode === 'belt') {
        ctx.save();
        ctx.translate(tsx + s / 2, tsy + s / 2);
        ctx.rotate(t.dir * Math.PI / 2);
        ctx.fillStyle = 'rgba(94,230,200,.9)';
        const uu = s / 8;
        ctx.beginPath();
        ctx.moveTo(uu * 2, 0); ctx.lineTo(-uu * 0.8, -uu * 0.9); ctx.lineTo(-uu * 0.8, uu * 0.9);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }
  }

  // エフェクト（+1ポップ）
  ctx.textAlign = 'center'; ctx.font = 'bold 13px sans-serif';
  for (const f of fx) {
    const [sx, sy] = tileToScreen(f.x, f.y);
    ctx.globalAlpha = 1 - f.t;
    ctx.fillStyle = '#5ee6c8';
    ctx.fillText(f.txt, sx, sy - s * 0.5 - f.t * 22);
  }
  ctx.globalAlpha = 1;
}

// --- タイル描画（ドット絵風・コード生成） ---
function drawTile(x, y, sx, sy, s) {
  const t = G.tiles[idx(x, y)];
  const u = s / 8;
  // 地面ベース
  ctx.fillStyle = (x + y) % 2 ? '#191d33' : '#1b1f37';
  ctx.fillRect(sx, sy, s + 1, s + 1);
  // 地面の砂粒
  for (let i = 0; i < 3; i++) {
    const hx = hash2(x, y, i * 2), hy = hash2(x, y, i * 2 + 1);
    ctx.fillStyle = hash2(x, y, i + 9) > 0.5 ? '#232849' : '#141728';
    ctx.fillRect(sx + hx * (s - u), sy + hy * (s - u), u, u);
  }
  if (t === T_ROCK) {
    ctx.fillStyle = '#3c4560';
    ctx.fillRect(sx + u * 0.5, sy + u, s - u, s - u * 1.5);
    ctx.fillStyle = '#4d5878';
    ctx.fillRect(sx + u, sy + u * 1.5, s - u * 3, u * 2);
    ctx.fillStyle = '#2a3148';
    ctx.fillRect(sx + u * 1.5, sy + s - u * 2.5, s - u * 3, u * 1.5);
  } else if (ORE_ITEM[t]) {
    const colors = { [T_IRON]: ['#c9784a', '#8f4f2c'], [T_STONE]: ['#aab3bf', '#6f7885'], [T_CRYSTAL]: ['#5ee6c8', '#2a9d84'], [T_COPPER]: ['#ff9248', '#b85a1e'] };
    const [c1, c2] = colors[t];
    const rich = G.ore[idx(x, y)] / CONFIG.ORE_MAX;   // 残量で粒の数を変える
    const lumps = Math.max(2, Math.round(2 + rich * 3));
    for (let i = 0; i < lumps; i++) {
      const hx = u + hash2(x, y, 20 + i) * (s - u * 3.5);
      const hy = u + hash2(x, y, 30 + i) * (s - u * 3.5);
      if (t === T_CRYSTAL) {
        // 結晶はひし形＋光
        ctx.fillStyle = c2;
        ctx.fillRect(sx + hx, sy + hy + u * 0.5, u * 1.6, u * 0.8);
        ctx.fillStyle = c1;
        ctx.fillRect(sx + hx + u * 0.35, sy + hy - u * 0.3, u * 0.9, u * 1.8);
      } else {
        ctx.fillStyle = c2;
        ctx.fillRect(sx + hx, sy + hy, u * 2, u * 1.6);
        ctx.fillStyle = c1;
        ctx.fillRect(sx + hx + u * 0.3, sy + hy + u * 0.25, u * 1.2, u * 0.8);
      }
    }
  }
}

// --- プレイヤー（探査ロボ）描画 ---
function drawPlayer(s) {
  const p = G.player;
  const [sx, sy] = tileToScreen(p.x - 0.5, p.y - 0.5);
  const u = s / 8;
  const bob = Math.sin(G.time * 6) * (p.path.length ? u * 0.4 : u * 0.12);
  ctx.save();
  ctx.translate(sx + s / 2, sy + s / 2 + bob);
  ctx.scale(p.facing, 1);
  // キャタピラ
  ctx.fillStyle = '#2a3148';
  ctx.fillRect(-u * 2.6, u * 1.6, u * 5.2, u * 1.4);
  ctx.fillStyle = '#454f6e';
  ctx.fillRect(-u * 2.2, u * 1.9, u * 0.8, u * 0.8);
  ctx.fillRect(-u * 0.4, u * 1.9, u * 0.8, u * 0.8);
  ctx.fillRect(u * 1.4, u * 1.9, u * 0.8, u * 0.8);
  // ボディ
  ctx.fillStyle = '#dde4f5';
  ctx.fillRect(-u * 2.2, -u * 1.6, u * 4.4, u * 3.2);
  ctx.fillStyle = '#b8c2dd';
  ctx.fillRect(-u * 2.2, u * 0.8, u * 4.4, u * 0.8);
  // バイザー（目）
  ctx.fillStyle = '#0a0f20';
  ctx.fillRect(-u * 1.4, -u * 1, u * 3.2, u * 1.3);
  ctx.fillStyle = '#5ee6c8';
  ctx.fillRect(u * 0.4, -u * 0.8, u * 1, u * 0.9);
  // アンテナ
  ctx.fillStyle = '#8f9bc4';
  ctx.fillRect(u * 1.4, -u * 2.8, u * 0.4, u * 1.2);
  ctx.fillStyle = '#ff6b81';
  ctx.fillRect(u * 1.2, -u * 3.3, u * 0.8, u * 0.7);
  ctx.restore();
}

// --- 設備描画 ---
function drawBuilding(b, sx, sy, s) {
  const u = s / 8;
  if (b.type === 'base') {
    // 着陸パッド＋ドーム
    ctx.fillStyle = '#2c3554';
    ctx.fillRect(sx - u, sy - u, s + u * 2, s + u * 2);
    ctx.fillStyle = '#3a4568';
    ctx.fillRect(sx, sy, s, s);
    ctx.fillStyle = '#5ee6c8';
    ctx.fillRect(sx + u * 0.5, sy + u * 0.5, u, u);
    ctx.fillRect(sx + s - u * 1.5, sy + u * 0.5, u, u);
    ctx.fillRect(sx + u * 0.5, sy + s - u * 1.5, u, u);
    ctx.fillRect(sx + s - u * 1.5, sy + s - u * 1.5, u, u);
    ctx.fillStyle = '#cdd8f5';
    ctx.fillRect(sx + u * 1.5, sy + u * 0.5, s - u * 3, s - u * 2.5);
    ctx.fillStyle = '#9fb2e5';
    ctx.fillRect(sx + u * 2, sy + u * 1.2, s - u * 4, u * 1.2);
    // ⚡マーク
    ctx.fillStyle = '#ffd94b';
    ctx.fillRect(sx + s / 2 - u * 0.4, sy + u * 3, u * 0.9, u * 1);
    ctx.fillRect(sx + s / 2 - u * 0.8, sy + u * 3.8, u * 0.9, u * 1);
  } else if (b.type === 'miner') {
    const working = !b.depleted && invTotal(b.buffer) < CONFIG.MINER_BUFFER;
    const drill = working ? Math.abs(Math.sin(G.time * 8)) * u : 0;
    ctx.fillStyle = '#7a4a22';
    ctx.fillRect(sx + u, sy + u * 2, s - u * 2, s - u * 3);
    ctx.fillStyle = '#e8963c';
    ctx.fillRect(sx + u * 1.5, sy + u * 1.2, s - u * 3, u * 2);
    ctx.fillStyle = '#c2762a';
    ctx.fillRect(sx + u * 2, sy + u * 3.5, s - u * 4, u * 1.4);
    // ドリル
    ctx.fillStyle = '#cfd6de';
    ctx.fillRect(sx + s / 2 - u * 0.5, sy + u * 4 + drill, u, u * 2.2);
    ctx.fillStyle = '#8f99a8';
    ctx.fillRect(sx + s / 2 - u * 0.25, sy + u * 6 + drill, u * 0.5, u);
    // ランプ
    ctx.fillStyle = working ? '#5ee6c8' : '#ff6b81';
    ctx.fillRect(sx + s - u * 2.2, sy + u * 1.6, u * 0.9, u * 0.9);
    // 範囲内の鉱脈を掘りつくした → 停止表示
    if (b.depleted) {
      ctx.fillStyle = 'rgba(10,10,20,.5)';
      ctx.fillRect(sx, sy, s, s);
      ctx.fillStyle = '#ff6b81';
      ctx.font = `bold ${Math.round(u * 2.2)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('×', sx + s / 2, sy + s / 2 + u * 0.7);
    }
  } else if (b.type === 'furnace') {
    ctx.fillStyle = '#5a3a3a';
    ctx.fillRect(sx + u, sy + u, s - u * 2, s - u * 1.5);
    ctx.fillStyle = '#7a4f4a';
    ctx.fillRect(sx + u * 1.5, sy + u * 1.5, s - u * 3, u * 1.2);
    // 炉の口（稼働で明滅）
    const hot = b.job ? 0.7 + 0.3 * Math.sin(G.time * 10) : 0.15;
    ctx.fillStyle = `rgba(255,140,50,${hot})`;
    ctx.fillRect(sx + u * 2.5, sy + u * 4, s - u * 5, u * 2.2);
    ctx.fillStyle = `rgba(255,220,120,${hot * 0.8})`;
    ctx.fillRect(sx + u * 3.2, sy + u * 4.5, s - u * 6.4, u * 1.2);
    // 煙突
    ctx.fillStyle = '#463030';
    ctx.fillRect(sx + s - u * 2.6, sy - u * 0.5, u * 1.4, u * 2);
  } else if (b.type === 'chest') {
    ctx.fillStyle = '#6e5230';
    ctx.fillRect(sx + u * 1.2, sy + u * 2.5, s - u * 2.4, s - u * 3.8);
    ctx.fillStyle = '#8f6c40';
    ctx.fillRect(sx + u * 1.2, sy + u * 2.5, s - u * 2.4, u * 1.6);
    ctx.fillStyle = '#e8b34b';
    ctx.fillRect(sx + s / 2 - u * 0.5, sy + u * 3.6, u, u);
    const fill = invTotal(b.inv) / CONFIG.CHEST_CAP;
    if (fill > 0) {
      ctx.fillStyle = '#5ee6c8';
      ctx.fillRect(sx + u * 1.2, sy + s - u * 1.6, (s - u * 2.4) * Math.min(1, fill), u * 0.4);
    }
  } else if (b.type === 'workbench') {
    ctx.fillStyle = '#4a5568';
    ctx.fillRect(sx + u, sy + u * 3, s - u * 2, s - u * 4);
    ctx.fillStyle = '#5f6e88';
    ctx.fillRect(sx + u * 0.6, sy + u * 2.4, s - u * 1.2, u * 1.4);
    // 工具
    ctx.fillStyle = '#e8b34b';
    ctx.fillRect(sx + u * 1.6, sy + u * 1.4, u * 1.6, u * 0.7);
    ctx.fillStyle = '#7fb2ff';
    ctx.fillRect(sx + s - u * 3.4, sy + u * 1.2, u * 0.8, u * 1.1);
  } else if (b.type === 'antenna') {
    // マスト（タイルの上にはみ出して描く）
    ctx.fillStyle = '#39415f';
    ctx.fillRect(sx + u * 1.5, sy + s - u * 2, s - u * 3, u * 1.5);
    ctx.fillStyle = '#8f9bc4';
    ctx.fillRect(sx + s / 2 - u * 0.5, sy - s * 0.8, u, s * 1.6);
    ctx.fillRect(sx + s / 2 - u * 2, sy - s * 0.3, u * 4, u * 0.5);
    // パラボラ
    ctx.fillStyle = '#cfd8ff';
    ctx.beginPath();
    ctx.arc(sx + s / 2, sy - s * 0.8, u * 2.2, Math.PI * 0.9, Math.PI * 2.1);
    ctx.fill();
    ctx.fillStyle = '#ff6b81';
    ctx.fillRect(sx + s / 2 - u * 0.4, sy - s * 0.95, u * 0.8, u * 0.8);
    // 起動中は信号リング
    if (b.active) {
      const r = (G.time % 1.5) / 1.5;
      ctx.strokeStyle = `rgba(94,230,200,${1 - r})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx + s / 2, sy - s * 0.8, u * 2 + r * s * 1.2, 0, 7);
      ctx.stroke();
    }
  } else if (b.type === 'assembler') {
    ctx.fillStyle = '#3a4568';
    ctx.fillRect(sx + u, sy + u, s - u * 2, s - u * 2);
    ctx.fillStyle = '#2a3148';
    ctx.fillRect(sx + u * 1.5, sy + u * 1.5, s - u * 3, s - u * 3);
    const spin = b.job ? G.time * 4 : 0;
    ctx.save();
    ctx.translate(sx + s / 2, sy + s / 2);
    ctx.rotate(spin);
    ctx.fillStyle = b.job ? '#7fb2ff' : '#4a5568';
    for (let i = 0; i < 4; i++) {
      ctx.save(); ctx.rotate(i * Math.PI / 2);
      ctx.fillRect(-u * 0.5, -u * 2.4, u, u * 1.1);
      ctx.restore();
    }
    ctx.fillStyle = '#1c2542';
    ctx.beginPath(); ctx.arc(0, 0, u * 1.1, 0, 7); ctx.fill();
    ctx.restore();
    if (!b.recipeOut) {
      ctx.fillStyle = '#ff6b81';
      ctx.font = `bold ${Math.round(u * 1.8)}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillText('？', sx + s / 2, sy + s - u * 0.8);
    }
  } else if (b.type === 'gate') {
    ctx.fillStyle = '#4a5568';
    ctx.fillRect(sx + u * 0.5, sy, u * 1.2, s);
    ctx.fillRect(sx + s - u * 1.7, sy, u * 1.2, s);
    if (b.repaired) {
      ctx.fillStyle = '#5ee6c8';
      ctx.fillRect(sx + u * 0.5, sy + u * 3.5, u * 1.2, u * 1.2);
      ctx.fillRect(sx + s - u * 1.7, sy + u * 3.5, u * 1.2, u * 1.2);
    } else {
      ctx.fillStyle = '#ff6b81';
      ctx.fillRect(sx + u * 1.5, sy + u * 2.5, s - u * 3, u * 2);
      ctx.fillStyle = '#c94a5e';
      ctx.fillRect(sx + u * 1.5, sy + u * 4.6, s - u * 3, u);
    }
  } else if (b.type === 'beacon') {
    ctx.fillStyle = '#39415f';
    ctx.fillRect(sx + u * 1.2, sy + s - u * 2, s - u * 2.4, u * 1.5);
    ctx.fillStyle = '#9b87c0';
    ctx.fillRect(sx + s / 2 - u * 0.6, sy - s * 0.9, u * 1.2, s * 1.7);
    ctx.fillStyle = '#ffd94b';
    ctx.beginPath(); ctx.arc(sx + s / 2, sy - s * 0.95, u * 1.4, 0, 7); ctx.fill();
    if (b.active) {
      const r = (G.time * 1.4) % (Math.PI * 2);
      ctx.strokeStyle = 'rgba(155,135,192,.85)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx + s / 2, sy - s * 0.95);
      ctx.lineTo(sx + s / 2 + Math.cos(r) * s * 1.3, sy - s * 0.95 + Math.sin(r) * s * 1.3);
      ctx.stroke();
      const r2 = (G.time % 1.5) / 1.5;
      ctx.strokeStyle = `rgba(155,135,192,${1 - r2})`;
      ctx.beginPath(); ctx.arc(sx + s / 2, sy - s * 0.95, u * 1.6 + r2 * s * 1.1, 0, 7); ctx.stroke();
    }
  } else if (b.type === 'belt') {
    const ang = b.dir * Math.PI / 2;
    ctx.save();
    ctx.translate(sx + s / 2, sy + s / 2);
    ctx.rotate(ang);
    ctx.fillStyle = '#20263f';
    ctx.fillRect(-s * 0.45, -s * 0.45, s * 0.9, s * 0.9);
    ctx.fillStyle = '#39415f';
    for (let i = -1; i <= 1; i++) ctx.fillRect(-u * 0.5, i * u * 1.8 - u * 0.4, u, u * 0.8);
    ctx.fillStyle = '#5ee6c8';
    ctx.beginPath();
    ctx.moveTo(u * 2, 0); ctx.lineTo(u * 0.8, -u * 0.9); ctx.lineTo(u * 0.8, u * 0.9);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    if (b.item) {
      const dv = DIR_VEC[b.dir];
      const cx = sx + s / 2 + dv.x * (b.progress - 0.5) * s * 0.7;
      const cy = sy + s / 2 + dv.y * (b.progress - 0.5) * s * 0.7;
      ctx.fillStyle = ITEMS[b.item].color;
      ctx.fillRect(cx - u * 0.9, cy - u * 0.9, u * 1.8, u * 1.8);
    }
  } else if (b.type === 'arm') {
    const ang = b.dir * Math.PI / 2;
    const pulse = a_pulse(b);
    ctx.save();
    ctx.translate(sx + s / 2, sy + s / 2);
    ctx.rotate(ang);
    ctx.fillStyle = '#3a4568';
    ctx.fillRect(-u * 2.2, -u * 2.2, u * 4.4, u * 4.4);
    ctx.fillStyle = pulse ? '#5ee6c8' : '#7fb2ff';
    ctx.fillRect(-u * 0.6, -u * 0.6, u * 3.4, u * 1.2);
    ctx.fillStyle = '#e8b34b';
    ctx.beginPath(); ctx.arc(u * 2.8, 0, u * 0.9, 0, 7); ctx.fill();
    ctx.fillStyle = '#1c2542';
    ctx.beginPath(); ctx.arc(0, 0, u * 0.9, 0, 7); ctx.fill();
    ctx.restore();
  }
}
function a_pulse(a) { return (a.timer || 0) / CONFIG.ARM_INTERVAL > 0.75; }

// =====================================================================
// 入力（タップ／ドラッグ／ズーム）
// =====================================================================
// ベルト連続設置／連続撤去用：a→bを4方向ステップで繋ぐ（斜めはx優先→y優先で分解）
function tilesBetween(a, b) {
  const path = [];
  let x = a.x, y = a.y;
  while (x !== b.x) { x += Math.sign(b.x - x); path.push({ x, y }); }
  while (y !== b.y) { y += Math.sign(b.y - y); path.push({ x, y }); }
  return path;
}
function vecToDir(dx, dy) { return DIR_VEC.findIndex(d => d.x === dx && d.y === dy); }
function paintModeActive() { return buildMode === 'belt' || eraseMode; }

// ドラッグで拾った経路に沿ってベルトを連続設置。岩・鉱脈・既存設備・資材切れで停止
function commitBeltDrag(tiles) {
  let placed = 0;
  for (const t of tiles) {
    if (!G.explored[idx(t.x, t.y)]) break;
    if (Math.round(G.player.x) === t.x && Math.round(G.player.y) === t.y) break;
    if (buildingAt(t.x, t.y)) break;
    const tt = G.tiles[idx(t.x, t.y)];
    if (tt === T_ROCK || ORE_ITEM[tt]) break;
    if (!canAfford(CONFIG.COSTS.belt)) break;
    payCost(CONFIG.COSTS.belt);
    G.buildings[bkey(t.x, t.y)] = { type: 'belt', x: t.x, y: t.y, dir: t.dir, item: null, progress: 0 };
    placed++;
  }
  if (placed > 0) { markDirty(); saveGame(); }
  toast(placed > 0 ? `ベルトを${placed}個設置した` : '設置できなかった（岩・鉱脈・設備・資材不足）', placed > 0 ? undefined : 'warn');
}
// ドラッグで拾った経路上の設備をまとめて撤去（拠点・ゲートはスキップして継続）
function commitEraseDrag(tiles) {
  let removed = 0;
  for (const t of tiles) {
    const b = buildingAt(t.x, t.y);
    if (!b || b.type === 'base' || b.type === 'gate') continue;
    removeBuilding(b);
    removed++;
  }
  toast(removed > 0 ? `${removed}個の設備を撤去した` : '撤去できる設備がなかった', removed > 0 ? undefined : 'warn');
}

let ptr = null;
let dragPath = null;   // {mode:'belt'|'erase', tiles:[{x,y,dir}]} 連続設置/撤去のプレビュー
canvas.addEventListener('pointerdown', e => {
  const paint = paintModeActive();
  ptr = { id: e.pointerId, sx: e.clientX, sy: e.clientY, cx: cam.x, cy: cam.y, drag: false, paint };
  if (paint) {
    const [tx, ty] = screenToTile(e.clientX, e.clientY);
    dragPath = { mode: buildMode === 'belt' ? 'belt' : 'erase', tiles: [{ x: tx, y: ty, dir: 0 }] };
  }
});
canvas.addEventListener('pointermove', e => {
  if (!ptr || e.pointerId !== ptr.id) return;
  const dx = e.clientX - ptr.sx, dy = e.clientY - ptr.sy;
  if (!ptr.drag && Math.hypot(dx, dy) > 12) { ptr.drag = true; if (!ptr.paint) followCam = false; }
  if (!ptr.drag) return;
  if (ptr.paint) {
    const [tx, ty] = screenToTile(e.clientX, e.clientY);
    const tiles = dragPath.tiles;
    const last = tiles[tiles.length - 1];
    if (tx !== last.x || ty !== last.y) {
      for (const s of tilesBetween(last, { x: tx, y: ty })) {
        const prev = tiles[tiles.length - 1];
        const dir = vecToDir(s.x - prev.x, s.y - prev.y);
        if (dir < 0) continue;
        prev.dir = dir; // 直前タイルの向きを、進んだ方向で確定
        tiles.push({ x: s.x, y: s.y, dir: 0 });
      }
    }
  } else {
    cam.x = ptr.cx - dx / tilePx;
    cam.y = ptr.cy - dy / tilePx;
  }
});
canvas.addEventListener('pointerup', e => {
  if (!ptr || e.pointerId !== ptr.id) return;
  if (!ptr.drag) {
    const [tx, ty] = screenToTile(e.clientX, e.clientY);
    onTapTile(tx, ty);
  } else if (ptr.paint && dragPath) {
    if (dragPath.mode === 'belt') commitBeltDrag(dragPath.tiles);
    else commitEraseDrag(dragPath.tiles);
  }
  ptr = null; dragPath = null;
});
canvas.addEventListener('pointercancel', () => { ptr = null; dragPath = null; });

document.getElementById('btn-zoomout').onclick = () => { tilePx = Math.max(16, Math.round(tilePx / 1.25)); };

  }));
  panelEl.querySelectorAll('[data-assembler-recipe]').forEach(btn => btn.addEventListener('click', () => {
    const newRecipe = btn.dataset.assemblerRecipe;
    if (b.recipeOut === newRecipe) return;
    // レシピ変更時は投入済みの材料をプレイヤーへ返却（違う材料が機内に残らないように）
    for (const [k, v] of Object.entries(b.input)) invAdd(inv, k, v);
    b.input = {}; b.job = null; b.progress = 0;
    b.recipeOut = newRecipe;
    markDirty(); saveGame();
    openBuilding(b);
  }));
  const chestMove = (k, n, toChest) => {
    if (toChest) {
      n = Math.min(n, invCount(inv, k), CONFIG.CHEST_CAP - invTotal(b.inv));
      if (n > 0) { invAdd(inv, k, -n); invAdd(b.inv, k, n); }
    } else {
      n = Math.min(n, invCount(b.inv, k));
      if (n > 0) { invAdd(b.inv, k, -n); invAdd(inv, k, n); }
    }
    markDirty(); saveGame();
  };
  panelEl.querySelectorAll('[data-put]').forEach(btn => btn.addEventListener('click', () => chestMove(btn.dataset.put, 1, true)));
  panelEl.querySelectorAll('[data-put10]').forEach(btn => btn.addEventListener('click', () => chestMove(btn.dataset.put10, 10, true)));
  panelEl.querySelectorAll('[data-take]').forEach(btn => btn.addEventListener('click', () => chestMove(btn.dataset.take, 1, false)));
  panelEl.querySelectorAll('[data-take10]').forEach(btn => btn.addEventListener('click', () => chestMove(btn.dataset.take10, 10, false)));
  const craft = (ri, times) => {
    const r = CONFIG.RECIPES[ri];
    for (let i = 0; i < times; i++) {
      if (!canAfford(r.in)) break;
      payCost(r.in);
      invAdd(inv, r.out, r.outN);
    }
    markDirty(); saveGame();
  };
  panelEl.querySelectorAll('[data-craft]').forEach(btn => btn.addEventListener('click', () => craft(+btn.dataset.craft, 1)));
  panelEl.querySelectorAll('[data-craft5]').forEach(btn => btn.addEventListener('click', () => craft(+btn.dataset.craft5, 5)));
  panelEl.querySelector('#pb-activate')?.addEventListener('click', () => activateAntenna(b));
  panelEl.querySelector('#pb-rotate')?.addEventListener('click', () => {
    b.dir = (b.dir + 1) % 4;
    markDirty(); saveGame();
    openBuilding(b);
  });
  panelEl.querySelector('#pb-battery-upgrade')?.addEventListener('click', () => {
    if (G.player.batteryUpgraded || !canAfford(CONFIG.BATTERY_UPGRADE_COST)) return;
    payCost(CONFIG.BATTERY_UPGRADE_COST);
    const oldMax = battMax();
    G.player.batteryUpgraded = true;
    G.player.battery = G.player.battery / oldMax * battMax();
    toast('バッテリーを拡張した！最大容量+' + Math.round((CONFIG.BATTERY_UPGRADE_MULT - 1) * 100) + '%');
    markDirty(); saveGame();
    openBuilding(b);
  });
  panelEl.querySelector('#pb-repair')?.addEventListener('click', () => {
    if (!canAfford(CONFIG.COSTS.gate)) return;
    payCost(CONFIG.COSTS.gate);
    G.flags['q_gate'] = true; // ゲート自体は撤去するため、修理済みの記録は先にフラグへ残す
    delete G.buildings[bkey(b.x, b.y)]; // 修理後はタイルを完全な平地に戻す（ベルト設置・通行が可能に）
    toast('ゲートを修理した！第2エリアへ進める（ベルトも通せるようになった）');
    closePanel(); markDirty(); saveGame();
  });
  panelEl.querySelector('#pb-beacon-activate')?.addEventListener('click', () => activateBeacon(b));
}

// --- 設定 ---
function openSettings() {
  showPanel(`<h2>⚙️ 設定<button class="close-x">✕</button></h2>
    <div class="row"><div class="grow">セーブデータ（JSON）</div>
      <button class="btn" id="st-export">書き出す</button>
      <button class="btn" id="st-import">読み込む</button></div>
    <textarea id="st-json" placeholder="「書き出す」でここにJSONが出ます。読み込みはここに貼り付けて「読み込む」"></textarea>
    <div class="row" style="margin-top:8px"><div class="grow">手動セーブ</div><button class="btn" id="st-save">セーブ</button></div>
    <div class="row"><div class="grow">最初からやり直す<br><span class="cost">セーブデータを消して新しい星へ</span></div>
      <button class="btn danger" id="st-reset">リセット</button></div>
    <h3>あそびかた</h3>
    <div class="row"><span class="cost">
      ・タップで移動／鉱脈タップで採掘（近くにいるとき）<br>
      ・ドラッグでスクロール、＋－でズーム、📍でロボの位置へ<br>
      ・バッテリーに注意！拠点の近くで自動充電<br>
      ・🔨建設から設備を置いて、アンテナ起動でクリア！</span></div>`);
  openedPanel = null;
  panelEl.querySelector('#st-export').onclick = () => {
    panelEl.querySelector('#st-json').value = JSON.stringify(makeSave());
    toast('書き出した！全選択してコピーしてね');
  };
  panelEl.querySelector('#st-import').onclick = () => {
    try {
      const data = JSON.parse(panelEl.querySelector('#st-json').value);
      if (!data || data.v !== 1) throw new Error('bad');
      applySave(data);
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      closePanel();
      toast('セーブデータを読み込んだ！');
    } catch { toast('読み込み失敗…JSONを確認してね', 'danger'); }
  };
  panelEl.querySelector('#st-save').onclick = () => { saveGame(); toast('セーブした！'); };
  panelEl.querySelector('#st-reset').onclick = () => {
    if (confirm('セーブデータを消して最初からやり直す？')) {
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    }
  };
}

// =====================================================================
// クリア演出
// =====================================================================
function activateAntenna(b) {
  b.active = true;
  G.cleared = true;
  closePanel();
  saveGame();
  document.getElementById('clear-title').textContent = '救難信号 送信成功！';
  document.getElementById('clear-msg').innerHTML = 'アンテナが起動し、信号は星の海を越えていく。<br>' +
    '探査ロボ・ぽん太はこの星で、迎えの船を待ちながら<br>工場をひらきつづけるのだった……。<br><br>― Phase 1 クリア！おめでとう！ ―';
  drawClearArt('antenna');
  document.getElementById('clear-overlay').style.display = 'flex';
}
function activateBeacon(b) {
  b.active = true;
  G.beaconCleared = true;
  closePanel();
  saveGame();
  document.getElementById('clear-title').textContent = '誘導ビーコン 起動成功！';
  document.getElementById('clear-msg').innerHTML = 'ビーコンの光が夜空を貫き、迎えの船へ道しるべを示す。<br>' +
    '探査ロボ・ぽん太の物語は、まだまだ続いていく……。<br><br>― Phase 2 クリア！おめでとう！ ―';
  drawClearArt('beacon');
  document.getElementById('clear-overlay').style.display = 'flex';
  markDirty();
}
document.getElementById('btn-clear-continue').onclick = () => {
  document.getElementById('clear-overlay').style.display = 'none';
  markDirty();
};

function drawClearArt(variant) {
  const c = document.getElementById('clear-canvas');
  const x = c.getContext('2d');
  const W = c.width, H = c.height;
  // 夜空グラデ
  const grad = x.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050716'); grad.addColorStop(1, '#1a1440');
  x.fillStyle = grad; x.fillRect(0, 0, W, H);
  // 星
  for (let i = 0; i < 90; i++) {
    x.globalAlpha = 0.3 + hash2(i, 5, 8) * 0.7;
    x.fillStyle = i % 7 === 0 ? '#ffd94b' : '#dfe8ff';
    x.fillRect(hash2(i, 1, 4) * W, hash2(i, 2, 6) * H * 0.72, 2, 2);
  }
  x.globalAlpha = 1;
  // 遠くの惑星
  x.fillStyle = '#7a5aa8'; x.beginPath(); x.arc(W * 0.82, H * 0.2, 26, 0, 7); x.fill();
  x.fillStyle = '#9377c2'; x.beginPath(); x.arc(W * 0.79, H * 0.18, 20, 0, 7); x.fill();
  // 地面
  x.fillStyle = '#241f45'; x.beginPath();
  x.ellipse(W / 2, H * 1.25, W * 0.85, H * 0.55, 0, 0, 7); x.fill();
  // アンテナ
  const ax = W * 0.5, ay = H * 0.78;
  x.fillStyle = '#39415f'; x.fillRect(ax - 22, ay - 8, 44, 14);
  x.fillStyle = '#8f9bc4'; x.fillRect(ax - 4, ay - 90, 8, 86);
  x.fillRect(ax - 20, ay - 50, 40, 5);
  x.fillStyle = '#cfd8ff'; x.beginPath(); x.arc(ax, ay - 92, 22, Math.PI * 0.95, Math.PI * 2.05); x.fill();
  x.fillStyle = '#ff6b81'; x.fillRect(ax - 4, ay - 104, 8, 8);
  // 信号
  const glow = variant === 'beacon' ? '155,135,192' : '94,230,200';
  for (let i = 1; i <= 3; i++) {
    x.strokeStyle = `rgba(${glow},${1 - i * 0.25})`;
    x.lineWidth = 3;
    x.beginPath(); x.arc(ax, ay - 100, 14 + i * 16, Math.PI * 1.15, Math.PI * 1.85); x.stroke();
  }
  // ロボ（ばんざい）
  const rx = W * 0.3, ry = H * 0.8, u = 5;
  x.fillStyle = '#2a3148'; x.fillRect(rx - u * 2.6, ry + u * 1.6, u * 5.2, u * 1.4);
  x.fillStyle = '#dde4f5'; x.fillRect(rx - u * 2.2, ry - u * 1.6, u * 4.4, u * 3.2);
  x.fillStyle = '#0a0f20'; x.fillRect(rx - u * 1.4, ry - u, u * 2.8, u * 1.3);
  x.fillStyle = '#5ee6c8'; x.fillRect(rx - u * 0.9, ry - u * 0.8, u * 0.8, u * 0.9);
  x.fillRect(rx + u * 0.3, ry - u * 0.8, u * 0.8, u * 0.9);
  x.fillStyle = '#dde4f5';  // 両腕ばんざい
  x.fillRect(rx - u * 3.4, ry - u * 3.4, u, u * 2.4);
  x.fillRect(rx + u * 2.4, ry - u * 3.4, u, u * 2.4);
  x.fillStyle = '#ff6b81'; x.fillRect(rx - u * 0.4, ry - u * 3.4, u * 0.8, u * 0.7);
  x.fillStyle = '#8f9bc4'; x.fillRect(rx - u * 0.2, ry - u * 2.8, u * 0.4, u * 1.2);
}

// =====================================================================
// トースト
// =====================================================================
let toastTimer = null;
function toast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = kind || '';
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2600);
}

// =====================================================================
// セーブ／ロード
// =====================================================================
function makeSave() {
  return {
    v: 2,
    seed: CONFIG.SEED,
    tiles: Array.from(G.tiles).join(''),
    ore: Array.from(G.ore),
    explored: Array.from(G.explored).join(''),
    buildings: Object.values(G.buildings),
    player: {
      x: G.player.x, y: G.player.y, battery: G.player.battery, inv: G.player.inv,
      batteryUpgraded: !!G.player.batteryUpgraded,
    },
    flags: G.flags,
    cleared: G.cleared,
    beaconCleared: !!G.beaconCleared,
    time: G.time,
    lastSeen: G.lastSeen,
  };
}
function saveGame() {
  G.lastSeen = Date.now();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(makeSave())); } catch (e) { /* 容量オーバー等は無視 */ }
}
function applySave(d) {
  for (let i = 0; i < d.tiles.length; i++) G.tiles[i] = +d.tiles[i];
  G.ore.set(d.ore);
  for (let i = 0; i < d.explored.length; i++) G.explored[i] = +d.explored[i];
  G.buildings = {};
  for (const b of d.buildings) G.buildings[bkey(b.x, b.y)] = b;
  const base = d.buildings.find(b => b.type === 'base');
  if (base) { G.base.x = base.x; G.base.y = base.y; }
  // 旧仕様（修理済みゲートが設備として残ったまま）からの互換：タイルを平地として開放する
  const oldGate = buildingOfType('gate');
  if (oldGate && oldGate.repaired) {
    delete G.buildings[bkey(oldGate.x, oldGate.y)];
    (d.flags || (d.flags = {}))['q_gate'] = true;
  }
  G.player.x = d.player.x; G.player.y = d.player.y;
  G.player.battery = d.player.battery;
  G.player.inv = d.player.inv || {};
  G.player.batteryUpgraded = !!d.player.batteryUpgraded;
  G.player.path = []; G.player.pending = null;
  G.flags = d.flags || {};
  G.cleared = !!d.cleared;
  G.beaconCleared = !!d.beaconCleared;
  G.time = d.time || 0;
  G.lastSeen = d.lastSeen || Date.now();
  buildMode = null;
  centerCamera(true);
  markDirty();
}

// Phase1（v1・48×48単一エリア）のセーブを新マップ形式（v2・第1＋第2エリア）へ移行
function migrateV1(d) {
  const OLD_N = 48;
  const newTiles = new Uint8Array(W * H).fill(T_ROCK);
  const newOre = new Uint16Array(W * H);
  const newExplored = new Uint8Array(W * H);
  for (let y = 0; y < OLD_N; y++) for (let x = 0; x < OLD_N; x++) {
    const oi = y * OLD_N + x, ni = idx(x, y);   // 第1エリアはx0=0のまま座標が一致する
    newTiles[ni] = +d.tiles[oi];
    newOre[ni] = d.ore[oi];
    newExplored[ni] = +d.explored[oi];
  }
  const rng = mulberry32((d.seed || CONFIG.SEED) + 777);
  const area2 = genAreaLocal(rng, { hasBase: false, copper: true, rockClusters: 24 });
  for (let y = 0; y < MAP_H; y++) for (let x = 0; x < AREA_W; x++) {
    const ni = idx(AREA_W + BORDER_W + x, y), li = y * AREA_W + x;
    newTiles[ni] = area2.tiles[li];
    newOre[ni] = area2.ore[li];
  }
  carveBorderAndGate(newTiles, newOre);

  return {
    v: 2,
    seed: d.seed,
    tiles: Array.from(newTiles).join(''),
    ore: Array.from(newOre),
    explored: Array.from(newExplored).join(''),
    buildings: [...d.buildings, { type: 'gate', x: GATE_X, y: GATE_Y, repaired: false }],
    player: { x: d.player.x, y: d.player.y, battery: d.player.battery, inv: d.player.inv || {}, batteryUpgraded: false },
    flags: d.flags || {},
    cleared: !!d.cleared,
    beaconCleared: false,
    time: d.time || 0,
    lastSeen: Date.now(),
  };
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    let d = JSON.parse(raw);
    if (d.v === 1) { d = migrateV1(d); toast('セーブデータを更新しました（第2エリアが追加されたよ）'); }
    if (d.v !== 2) return false;
    applySave(d);
    return true;
  } catch (e) { return false; }
}

// =====================================================================
// オフライン生産
// =====================================================================
// 全設備の保有アイテム総量をスナップショット（留守中レポートの差分計算用）
function snapshotProduction() {
  const totals = {};
  for (const b of Object.values(G.buildings)) {
    for (const src of [b.buffer, b.input, b.output, b.inv]) {
      if (!src) continue;
      for (const [k, v] of Object.entries(src)) totals[k] = (totals[k] || 0) + v;
    }
    if (b.item) totals[b.item] = (totals[b.item] || 0) + 1;
  }
  return totals;
}
// 1秒刻みで tickMachines を繰り返し、通常プレイと同じロジックで不在時間分を早送りする
// （枯渇・容量上限などはtick関数自体が処理するため、ここで特別扱いする必要はない）
function simulateOffline(totalSeconds) {
  const STEP = 1;
  let remaining = totalSeconds;
  while (remaining > 0.001) {
    const step = Math.min(STEP, remaining);
    tickMachines(step);
    remaining -= step;
  }
}
function showOfflineReport(seconds, before, after) {
  const hrs = Math.floor(seconds / 3600), mins = Math.floor((seconds % 3600) / 60);
  const timeTxt = hrs > 0 ? `${hrs}時間${mins}分` : `${mins}分`;
  const keys = new Set([...Object.keys(before), ...Object.keys(after)]);
  const rows = [...keys]
    .map(k => ({ k, diff: (after[k] || 0) - (before[k] || 0) }))
    .filter(r => r.diff !== 0 && ITEMS[r.k])
    .sort((a, b) => b.diff - a.diff);
  const list = rows.length
    ? rows.map(r => `<div class="row"><span class="dot" style="background:${ITEMS[r.k].color}"></span><div class="grow">${ITEMS[r.k].name}</div><b style="color:${r.diff > 0 ? 'var(--accent)' : 'var(--danger)'}">${r.diff > 0 ? '+' : ''}${r.diff}</b></div>`).join('')
    : '<div class="row">目立った変化はなかった</div>';
  showPanel(`<h2>🌙 留守中の生産レポート<button class="close-x">✕</button></h2>
    <div class="row"><div class="grow">${timeTxt}ぶんの時間が経過し、自動化設備が稼働していた。</div></div>
    ${list}`);
  openedPanel = null;
}

// =====================================================================
// 起動
// =====================================================================
document.addEventListener('visibilitychange', () => { if (document.hidden) saveGame(); });
window.addEventListener('pagehide', () => saveGame());

function boot() {
  resize();
  const hadSave = loadGame();
  if (!hadSave) {
    genMap(CONFIG.SEED);
    toast('未知の惑星に不時着した…。まずは鉱脈をタップして資源を集めよう！');
  } else {
    const elapsedSec = Math.min(CONFIG.OFFLINE_MAX_HOURS * 3600, Math.max(0, (Date.now() - (G.lastSeen || Date.now())) / 1000));
    if (elapsedSec > CONFIG.OFFLINE_REPORT_MIN_SEC) {
      const before = snapshotProduction();
      simulateOffline(elapsedSec);
      const after = snapshotProduction();
      showOfflineReport(elapsedSec, before, after);
    }
  }
  G.lastSeen = Date.now();
  centerCamera(true);
  markDirty();
  updateBuildModeUI();

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.1, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
boot();
</script>
