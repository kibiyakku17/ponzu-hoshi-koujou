<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ひらけ！ほしこうじょう</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#070a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ほしこうじょう">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" href="icon-192.png">
<meta property="og:title" content="ひらけ！ほしこうじょう">
<meta property="og:description" content="不時着ロボが資源を採り工場を組む2Dサンドボックス">
<meta property="og:image" content="icon-512.png">
<style>
  :root{
    --bg:#070a14;
    --panel:#131a2e;
    --panel2:#1c2542;
    --line:#2e3a63;
    --text:#e8ecff;
    --sub:#8f9bc4;
    --accent:#5ee6c8;
    --warn:#ffb347;
    --danger:#ff6b81;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;
    touch-action:none;user-select:none;-webkit-user-select:none;}
  #game{position:fixed;inset:0;display:block;touch-action:none;}

  /* ===== HUD ===== */
  #hud-top{position:fixed;top:env(safe-area-inset-top,0);left:0;right:0;
    display:flex;align-items:center;gap:8px;padding:8px 10px;pointer-events:none;z-index:10;}
  #battery-wrap{flex:0 0 auto;display:flex;align-items:center;gap:6px;
    background:rgba(19,26,46,.88);border:1px solid var(--line);border-radius:10px;padding:6px 10px;}
  #battery-bar{width:90px;height:12px;background:#0a0f20;border-radius:6px;overflow:hidden;border:1px solid var(--line);}
  #battery-fill{height:100%;width:100%;background:var(--accent);transition:width .2s;}
  #battery-txt{font-size:11px;color:var(--sub);min-width:56px;}
  #charging{font-size:11px;color:var(--accent);display:none;}
  .hud-btn{pointer-events:auto;background:rgba(19,26,46,.88);border:1px solid var(--line);
    color:var(--text);border-radius:10px;width:40px;height:40px;font-size:18px;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .hud-btn:active{background:var(--panel2);}
  #hud-top .spacer{flex:1;}

  #quest{position:fixed;top:calc(env(safe-area-inset-top,0) + 58px);left:10px;right:10px;
    background:rgba(19,26,46,.82);border:1px solid var(--line);border-radius:10px;
    padding:7px 11px;font-size:12px;color:var(--text);z-index:9;pointer-events:none;line-height:1.5;}
  #quest b{color:var(--accent);font-weight:600;}

  #hud-bottom{position:fixed;bottom:env(safe-area-inset-bottom,0);left:0;right:0;
    padding:8px 10px 10px;z-index:10;pointer-events:none;}
  #inv-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
  .inv-chip{background:rgba(19,26,46,.88);border:1px solid var(--line);border-radius:8px;
    padding:4px 8px;font-size:12px;display:flex;align-items:center;gap:5px;}
  .dot{width:10px;height:10px;border-radius:2px;display:inline-block;flex:0 0 auto;}
  #bottom-btns{display:flex;gap:8px;}
  .big-btn{pointer-events:auto;flex:1;background:var(--panel);border:1px solid var(--line);
    color:var(--text);border-radius:12px;padding:12px 0;font-size:15px;font-weight:600;}
  .big-btn:active{background:var(--panel2);}
  #cancel-build{display:none;background:#3d2030;border-color:var(--danger);color:var(--danger);}
  #btn-undo-place{display:none;background:#3d3320;border-color:var(--warn);color:var(--warn);}
  #btn-confirm-preview{background:#0e4d40;border-color:var(--accent);color:var(--accent);}

  #zoom-btns{position:fixed;right:10px;bottom:calc(env(safe-area-inset-bottom,0) + 110px);
    display:flex;flex-direction:column;gap:8px;z-index:10;}

  /* ===== パネル（ボトムシート） ===== */
  #panel-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;display:none;}
  #panel{position:fixed;left:0;right:0;bottom:0;max-height:72vh;overflow-y:auto;z-index:21;display:none;
    background:var(--panel);border-top:2px solid var(--line);border-radius:18px 18px 0 0;
    padding:14px 14px calc(env(safe-area-inset-bottom,0) + 18px);}
  #panel h2{font-size:16px;margin-bottom:10px;color:var(--accent);display:flex;align-items:center;gap:8px;}
  #panel h3{font-size:13px;margin:12px 0 6px;color:var(--sub);}
  .row{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #1e2745;font-size:13px;flex-wrap:wrap;}
  .row .grow{flex:1;min-width:70px;}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:8px 12px;font-size:13px;}
  .btn:active{background:#28345e;}
  .btn.primary{background:#0e4d40;border-color:var(--accent);color:var(--accent);font-weight:600;}
  .btn.danger{background:#3d2030;border-color:var(--danger);color:var(--danger);}
  .btn:disabled{opacity:.35;}
  .btn.small{padding:6px 9px;font-size:12px;}
  .cost{font-size:11px;color:var(--sub);}
  .cost .ng{color:var(--danger);}
  #panel .close-x{margin-left:auto;background:none;border:none;color:var(--sub);font-size:22px;padding:2px 8px;}
  /* ===== 建設メニュー：コンパクトカード（Phase4.15①） ===== */
  .bm-tap{cursor:pointer;}
  .bm-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:7px;margin-left:4px;vertical-align:middle;}
  .bm-badge.new{background:#ffd94b;color:#3a2c00;}
  .bm-badge.ok{background:var(--accent);color:#04150f;}
  .progress{height:8px;background:#0a0f20;border-radius:4px;overflow:hidden;border:1px solid var(--line);margin:4px 0;}
  .progress i{display:block;height:100%;background:var(--warn);}
  textarea{width:100%;height:90px;background:#0a0f20;color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:8px;font-size:11px;font-family:monospace;}

  /* ===== トースト ===== */
  #toast{position:fixed;top:calc(env(safe-area-inset-top,0) + 100px);left:50%;transform:translateX(-50%);
    background:rgba(10,15,32,.94);border:1px solid var(--accent);color:var(--text);
    padding:9px 16px;border-radius:10px;font-size:13px;z-index:40;display:none;max-width:86vw;text-align:center;}

  /* ===== 留守中計算オーバーレイ ===== */
  #offline-progress{position:fixed;inset:0;background:rgba(4,6,14,.92);z-index:60;display:none;
    align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--text);font-size:14px;text-align:center;}
  #offline-progress .progress{width:70vw;max-width:280px;}
  #toast.warn{border-color:var(--warn);color:var(--warn);}
  #toast.danger{border-color:var(--danger);color:var(--danger);}

  /* ===== 更新通知（トーストと違い自動で消えない） ===== */
  #update-banner{position:fixed;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom,0) + 132px);
    background:rgba(14,77,64,.95);border:1px solid var(--accent);color:var(--accent);
    border-radius:10px;padding:10px 12px;font-size:13px;z-index:16;display:none;
    align-items:center;gap:8px;}
  #update-banner-text{flex:1;}
  #update-banner-close{background:none;border:none;color:var(--accent);font-size:16px;padding:2px 6px;flex:0 0 auto;}

  /* ===== クリア画面 ===== */
  #clear-overlay{position:fixed;inset:0;background:#04060e;z-index:50;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;}
  #clear-canvas{width:min(88vw,420px);border-radius:12px;border:1px solid var(--line);}
  #clear-overlay h1{font-size:22px;color:var(--accent);text-align:center;}
  #clear-overlay p{font-size:13px;color:var(--text);text-align:center;line-height:1.8;max-width:340px;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud-top">
  <div id="battery-wrap">
    <span style="font-size:14px">🔋</span>
    <div id="battery-bar"><div id="battery-fill"></div></div>
    <span id="battery-txt">100%</span>
    <span id="charging">⚡充電中</span>
  </div>
  <div class="spacer"></div>
  <button class="hud-btn" id="btn-center" title="ロボへ">📍</button>
  <button class="hud-btn" id="btn-settings" title="設定">⚙️</button>
</div>

<div id="quest"></div>

<div id="zoom-btns">
  <button class="hud-btn" id="btn-zoomin">＋</button>
  <button class="hud-btn" id="btn-zoomout">－</button>
</div>

<div id="hud-bottom">
  <div id="inv-bar"></div>
  <div id="bottom-btns">
    <button class="big-btn" id="btn-build">🔨 建設</button>
    <button class="big-btn" id="btn-erase">🗑 撤去</button>
    <button class="big-btn" id="btn-rotate-preview" style="display:none">🔄 向きを変える</button>
    <button class="big-btn" id="btn-confirm-preview" style="display:none">✅ この向きで設置</button>
    <button class="big-btn" id="btn-undo-place" style="display:none">↩️ 元に戻す</button>
    <button class="big-btn" id="cancel-build">✕ 設置キャンセル</button>
  </div>
</div>

<div id="panel-back"></div>
<div id="panel"></div>
<div id="toast"></div>
<div id="update-banner">
  <span id="update-banner-text">🆕 新しいバージョンがあります。タップして更新</span>
  <button id="update-banner-close">✕</button>
</div>
<div id="offline-progress">
  <div>🌙 留守中の生産を計算中…</div>
  <div class="progress"><i id="offline-progress-bar" style="width:0%"></i></div>
</div>

<div id="clear-overlay">
  <canvas id="clear-canvas" width="420" height="320"></canvas>
  <h1 id="clear-title">救難信号 送信成功！</h1>
  <p id="clear-msg">アンテナが起動し、信号は星の海を越えていく。<br>
  探査ロボ・ぽん太はこの星で、迎えの船を待ちながら<br>工場をひらきつづけるのだった……。<br><br>― Phase 1 クリア！おめでとう！ ―</p>
  <button class="btn primary" id="btn-clear-continue" style="padding:12px 30px;font-size:15px;">つづける</button>
</div>

<script>
'use strict';
/* =====================================================================
 * ひらけ！ほしこうじょう Phase 1 (MVP)  - ぽんず工房
 * 単一HTML / Canvas / localStorageセーブ
 * =====================================================================
 * ▼▼▼ 調整パラメータ（バランス調整はここをいじる） ▼▼▼ */
const CONFIG = {
  AREA_W: 48,             // 第1・第2エリアそれぞれの一辺タイル数
  MAP_H: 48,              // マップの高さ（タイル数）
  BORDER_W: 3,            // エリア間の境界壁の厚み（ゲートはこの中央に1マス）
  SEED: 20260702,        // マップ生成シード（変えると別マップ）
  VIEW_R: 4.5,           // 視界半径（タイル）
  MOVE_SPEED: 3.2,       // 移動速度（タイル/秒）
  BATTERY_MAX: 100,
  MOVE_COST: 0.55,       // 1タイル移動あたりのバッテリー消費
  CHARGE_RATE: 22,       // 拠点付近での充電速度（/秒）
  LOW_BATTERY: 25,       // 警告を出す残量
  EMPTY_PENALTY: 0.2,    // バッテリー切れ時に失う資源の割合
  MINE_PER_TAP: 1,       // 手動採掘1タップの獲得数
  ORE_MIN: 105, ORE_MAX: 190,      // 鉱脈1タイルの埋蔵量（採掘機換算。実際の内部埋蔵量はORE_VEIN_MULT倍で保持する）。
                                   // 旧値30-55だとクラスタ1つ(4〜7タイル)が採掘機1台で10〜25分程度で枯渇し、
                                   // オフライン生産上限(4時間)に対して自動化の旨味が薄かったため、目安3.5倍(OREBOOST_MULT)に底上げした
  ORE_TYPE_MIN_GAP: 3,   // 新規マップ生成時、別タイプの鉱脈とこのタイル数以内には配置しない（採掘機の範囲でラインが混ざりにくくする）。新規マップにのみ影響
  ORE_VEIN_MULT: 10,     // 内部埋蔵量の底上げ倍率。採掘機は1個産出ごとにこの倍率ぶん消費するため自動化の速度・総産出量は変わらないが、
                         // 手動タップ（1回1消費）の体感の減りだけがこの倍率ぶん遅くなる＝連打だけでは現実的に掘りつくせなくなる
  MINER_HINT_TAP_COUNT: 15,  // 同一鉱脈への連打がこの回数に達すると採掘機ヒントの対象になる
  MINER_HINT_WINDOW_SEC: 10, // ↑を「連打」とみなす時間窓（秒）。この秒数を空けるとカウントがリセットされる
  MINER_INTERVAL: 4,     // 採掘機の産出間隔（秒/個）
  MINER_BUFFER: 12,      // 採掘機の内部バッファ上限
  MINER_RADIUS: 1,       // 採掘機の採掘範囲（1=中心3×3）
  ARM_INTERVAL: 2,       // アームの搬送間隔（秒/個）
  CHEST_OUT_INTERVAL: 1.5, // 搬入口付き保管箱(chestIn)が隣接ベルトへ自動搬出する間隔（秒/個）
  BELT_TIME: 1,          // ベルトが1タイル分アイテムを運ぶのにかかる時間（秒）
  SMELT_TIME: 2.5,       // 精錬1個あたりの時間（秒）
  FURNACE_IN_CAP: 20,    // 精錬炉の投入スロット上限（種類ごと）
  FURNACE_OUT_CAP: 20,   // 精錬炉の完成品スロット上限（種類ごと）
  ASSEMBLER_TIME: 3,        // 組立機の1クラフトあたりの時間（秒）
  ASSEMBLER_IN_CAP: 20,     // 組立機の投入スロット上限（材料ごと）
  ASSEMBLER_OUT_CAP: 20,    // 組立機の完成品スロット上限
  LAB_PACK_TIME: 0.5,       // 研究所が研究パック1個を消費するのにかかる時間（秒）。
                            // 旧値2秒だと必要量が重くなった研究(Phase3.3①)で組立機を何台増やしても
                            // 研究所側の消費速度で頭打ちになってしまうため、律速にならない速さまで下げた
  LAB_IN_CAP: 10,           // 研究所の投入バッファ上限（パック種別ごと）
  FAST_BELT_SPEED_MULT: 2,  // 高速ベルトの搬送速度倍率
  FAST_ARM_SPEED_MULT: 2,   // 高速アームの動作速度倍率
  MINER_MK2_RADIUS: 2,      // 採掘機Mk2の採掘範囲（2=中心5×5）
  MINER_MK2_SPEED_MULT: 1.5,// 採掘機Mk2の採掘速度倍率
  SENSOR_UPGRADE_MULT: 1.5, // 広域センサー研究後の視界半径倍率
  EXPLORE_SPEED_MULT: 1.3,  // 探査強化研究後の移動速度倍率
  EXPLORE_BATTERY_MULT: 1.5,// 探査強化研究後の最大バッテリー倍率（バッテリー拡張と重複して掛かる）
  CHEST_CAP: 60,         // 保管箱の容量（合計）
  ANTENNA_RANGE: 5,      // アンテナを設置できる拠点からの距離
  AUTOSAVE_SEC: 10,
  BATTERY_UPGRADE_COST: { circuit: 3, crystal: 2 },  // バッテリー拡張の材料（1回のみ）
  BATTERY_UPGRADE_MULT: 1.5,                          // バッテリー拡張後の最大容量倍率
  OFFLINE_MAX_HOURS: 4,        // オフライン生産を計算する上限時間
  OFFLINE_REPORT_MIN_SEC: 30,  // これ未満の不在時間はレポートしない
  // ---- 電力システム（Phase4） ----
  // 稼働に電力を必要とする設備の消費量（電線は敷かず、発電機/中継塔からの無線送電で賄う）
  POWER_USE: { miner: 1, minerMk2: 2, furnace: 1.5, assembler: 3, lab: 2, arm: 0.5, fastArm: 1, filterArm: 0.5 },
  BASE_POWER_OUTPUT: 15, // 拠点電源の発電量（燃料切れなし・常時稼働。Phase1〜2は基本これだけで賄える想定）
  BASE_POWER_RADIUS: 10, // 拠点電源の送電半径（タイル）。小型発電機より狭い
  GEN_OUTPUT: 20,        // 小型発電機の発電量
  GEN_RADIUS: 15,        // 小型発電機の送電半径（タイル）
  GEN_FUEL_INTERVAL: 20, // 小型発電機がエネルギー結晶1個を消費するのにかかる時間（秒）
  GEN_FUEL_CAP: 20,      // 小型発電機の燃料バッファ上限
  RELAY_RADIUS: 15,      // 無線中継塔の中継半径（タイル）。中継塔自体は電力を消費しない
  ADV_GEN_OUTPUT: 80,        // 上位発電機の発電量
  ADV_GEN_RADIUS: 28,        // 上位発電機の送電半径（タイル）
  ADV_GEN_FUEL_INTERVAL: 60, // 上位発電機がアークコア1個を消費するのにかかる時間（秒）
  ADV_GEN_FUEL_CAP: 10,      // 上位発電機の燃料バッファ上限
  BATTERY_CAPACITY: 1000,     // 蓄電池の充電容量
  BATTERY_CHARGE_RATE: 20,    // 蓄電池の充電速度（/秒。供給が需要を上回る分から充電）
  BATTERY_DISCHARGE_RATE: 20, // 蓄電池の放電速度（/秒。供給が需要を下回る分をここから補う）
  BATTERY_RADIUS: 15,         // 蓄電池の電力網への接続半径（タイル）。小型発電機と同格
  // 設備の設置コスト（gateは修理コスト）
  COSTS: {
    furnace:  { stone: 5 },
    chest:    { stone: 3 },
    workbench:{ stone: 4, ironPlate: 2 },
    miner:    { ironPlate: 4, stoneBlock: 2 },
    antenna:  { part: 5, stoneBlock: 5, crystal: 3 },
    arm:      { ironPlate: 1, part: 1 },
    belt:     { ironPlate: 1 },
    gate:     { part: 10, stoneBlock: 10 },
    beacon:   { circuit: 5, part: 10, crystal: 5 },
    assembler:{ ironPlate: 5, part: 3 },
    lab:      { ironPlate: 10, circuit: 5 },
    splitter: { ironPlate: 3 },
    chestIn:  { stone: 5, ironPlate: 2 },
    fastBelt: { ironPlate: 2, copperWire: 1 },
    minerMk2: { ironPlate: 6, stoneBlock: 3, circuit: 1 },
    fastArm:  { ironPlate: 2, part: 2, circuit: 1 },
    filterArm:{ ironPlate: 2, part: 2, circuit: 2 },
    gate2:    { part: 20, stoneBlock: 20, circuit: 10 },
    relay:    { ironPlate: 3, part: 2 },
    generator:{ ironPlate: 5, part: 3 },
    battery:  { ironPlate: 6, part: 4, circuit: 2 },
    advGenerator: { starCrystalCore: 4, circuit: 6, part: 6 },
    gate3:    { part: 30, stoneBlock: 30, circuit: 20 },
  },
  // その場アップグレードのコスト（アップグレード先の設備idがキー。差額計算ではなく固定値）。
  // 目安：新規建設コストから、アップグレード元の設備の建設コストぶんを差し引いた額（Phase4.15②）
  UPGRADE_COSTS: {
    minerMk2: { ironPlate: 2, stoneBlock: 1, circuit: 1 },   // minerMk2新規(6,3,1) - miner(4,2,0)
    fastBelt: { ironPlate: 1, copperWire: 1 },               // fastBelt新規(2,0,1) - belt(1,0,0)
    fastArm:  { ironPlate: 1, part: 1, circuit: 1 },         // fastArm新規(2,2,1) - arm(1,1,0)
  },
  // クラフトレシピ（作業台／組立機で共通）
  RECIPES: [
    { out: 'part', outN: 1, in: { ironPlate: 2 }, name: '部品' },
    { out: 'circuit', outN: 1, in: { copperWire: 2, ironPlate: 1 }, name: '回路' },
    { out: 'researchPack1', outN: 1, in: { ironPlate: 1, stoneBlock: 1 }, name: '研究パックI' },
    { out: 'researchPack2', outN: 1, in: { circuit: 1, crystal: 1 }, name: '研究パックII' },
    { out: 'starCrystalCore', outN: 1, in: { starCrystalRefined: 3 }, name: '星晶コア' },
    { out: 'arcCore', outN: 1, in: { starCrystalCore: 2, circuit: 1 }, name: 'アークコア' },
  ],

// サウンド（外部音声ファイルは使わずWeb Audio APIのoscillatorでコード生成する）
// =====================================================================
const SFX_KEY = 'ponzu_hoshi_koujou_sfx';
let sfxEnabled = localStorage.getItem(SFX_KEY) !== '0';   // 未設定ならデフォルトON
let audioCtx = null;
function ensureAudioCtx() {
  if (audioCtx) return audioCtx;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
  return audioCtx;
}
// 初回タップ/タッチ操作でAudioContextを起動・再開する（iOS Safari等はユーザー操作なしに音を鳴らせないため）
function unlockAudio() {
  const ctx = ensureAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  // iOS Safariはresume()だけでは有効化しきれないことがあるため、無音バッファを1つ再生して完全に起こす
  const buf = ctx.createBuffer(1, 1, 22050);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
}
['pointerdown', 'touchstart', 'mousedown'].forEach(ev => document.addEventListener(ev, unlockAudio, { once: true, passive: true }));

const SFX_MASTER_VOL = 0.14;   // 全体の音量係数。うるさくならないよう控えめに
// 単音を鳴らす: freq=周波数(Hz), duration=長さ(秒), type=波形, delay=開始を遅らせる秒数（和音用）, vol=個別音量(0〜1)
function playTone(freq, duration, type, delay, vol) {
  if (!sfxEnabled) return;
  const ctx = ensureAudioCtx();
  if (!ctx || ctx.state === 'suspended') return;   // 未アンロックならエラーにせず黙って諦める
  const t0 = ctx.currentTime + (delay || 0);
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  const peak = (vol === undefined ? 1 : vol) * SFX_MASTER_VOL;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(peak, t0 + 0.006);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t0); osc.stop(t0 + duration + 0.02);
}
// 複数音を重ねて鳴らす（和音・簡単なジングル用）。notes: [{freq,duration,type,delay,vol}, ...]
function playChord(notes) { for (const n of notes) playTone(n.freq, n.duration, n.type, n.delay, n.vol); }
function setSfxEnabled(on) {
  sfxEnabled = on;
  localStorage.setItem(SFX_KEY, on ? '1' : '0');
}

// =====================================================================
// 乱数（シード付き）
// =====================================================================
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
// タイル装飾用の決定的ハッシュ（0..1）
function hash2(x, y, n) {
  let h = (x * 374761393 + y * 668265263 + n * 1274126177) | 0;
  h = Math.imul(h ^ (h >>> 13), 1103515245);
  return ((h >>> 16) & 1023) / 1023;
}

const buildingAt = (x, y) => G.buildings[bkey(x, y)];
function walkable(x, y) {
  if (!inMap(x, y) || G.tiles[idx(x, y)] === T_ROCK) return false;
  const b = buildingAt(x, y);
  if (!b) return true;
  if (b.type === 'gate') return b.repaired;   // 修理済みゲートだけ通行可
  if (isBeltLike(b.type)) return true;        // ベルト系の上は歩ける（長いラインで行き来を塞がないように）
  return false;
}
// ベルト・高速ベルト・分配器は「単一アイテムを乗せて隣へ渡す」という共通の作法を持つ
function isBeltLike(type) { return type === 'belt' || type === 'fastBelt' || type === 'splitter'; }
function beltTime(b) { return b.type === 'fastBelt' ? CONFIG.BELT_TIME / CONFIG.FAST_BELT_SPEED_MULT : CONFIG.BELT_TIME; }
function minerRadius(b) { return b.type === 'minerMk2' ? CONFIG.MINER_MK2_RADIUS : CONFIG.MINER_RADIUS; }
// ぽん太強化「採掘速度+20%」は既存のMk2速度倍率とも重複して掛かる（採掘機・Mk2どちらにも効く）
function minerInterval(b) {
  const base = b.type === 'minerMk2' ? CONFIG.MINER_INTERVAL / CONFIG.MINER_MK2_SPEED_MULT : CONFIG.MINER_INTERVAL;
  return hasPontaUpgrade('mining') ? base / CONFIG.PONTA_MINING_MULT : base;
}
function armInterval(a) { return a.type === 'fastArm' ? CONFIG.ARM_INTERVAL / CONFIG.FAST_ARM_SPEED_MULT : CONFIG.ARM_INTERVAL; }
function hasPontaUpgrade(id) { return !!(G.player.ponTaUpgrades && G.player.ponTaUpgrades[id]); }
function effectiveViewR() {
  return CONFIG.VIEW_R
    * (G.research.sensorUpgrade ? CONFIG.SENSOR_UPGRADE_MULT : 1)
    * (hasPontaUpgrade('sensor') ? CONFIG.PONTA_SENSOR_MULT : 1);
}
function moveSpeedMult() {
  return (G.research.exploreUpgrade ? CONFIG.EXPLORE_SPEED_MULT : 1)
    * (hasPontaUpgrade('speed') ? CONFIG.PONTA_SPEED_MULT : 1);
}
function invCount(inv, item) { return inv[item] || 0; }
function invAdd(inv, item, n) { inv[item] = (inv[item] || 0) + n; if (inv[item] <= 0) delete inv[item]; }
function invTotal(inv) { return Object.values(inv).reduce((a, b) => a + b, 0); }
function battMax() {
  // 作業台のバッテリー拡張・探査強化研究・ぽん太強化は重複して掛かる
  return CONFIG.BATTERY_MAX
    * (G.player.batteryUpgraded ? CONFIG.BATTERY_UPGRADE_MULT : 1)
    * (G.research.exploreUpgrade ? CONFIG.EXPLORE_BATTERY_MULT : 1)
    * (hasPontaUpgrade('battery') ? CONFIG.PONTA_BATTERY_MULT : 1);
}

// =====================================================================
// マップ生成（第1・第2エリアをそれぞれローカル生成してから貼り付け）
// =====================================================================
// 1エリア分（AREA_W×MAP_H）の地形をローカル座標で生成する
function genAreaLocal(rng, opts) {
  const LN = AREA_W;
  const tiles = new Uint8Array(LN * MAP_H);
  const ore = new Uint16Array(LN * MAP_H);
  const lidx = (x, y) => y * LN + x;
  const linMap = (x, y) => x >= 0 && y >= 0 && x < LN && y < MAP_H;

  // 岩クラスタ（ランダムウォーク）
  for (let c = 0; c < (opts.rockClusters || 28); c++) {
    let x = Math.floor(rng() * LN), y = Math.floor(rng() * MAP_H);
    const size = 4 + Math.floor(rng() * 8);
    for (let s = 0; s < size; s++) {
      if (linMap(x, y)) tiles[lidx(x, y)] = T_ROCK;
      x += Math.floor(rng() * 3) - 1; y += Math.floor(rng() * 3) - 1;
    }
  }
  // (x,y)からminGapタイル以内に、type以外の鉱脈タイプが既に置かれていないか調べる（0以下なら常にfalse＝制限なし）
  function nearDifferentOre(x, y, type, minGap) {
    if (!minGap || minGap <= 0) return false;
    for (let dy = -minGap; dy <= minGap; dy++) for (let dx = -minGap; dx <= minGap; dx++) {
      const nx = x + dx, ny = y + dy;
      if (!linMap(nx, ny)) continue;
      const nt = tiles[lidx(nx, ny)];
      if (ORE_ITEM[nt] && nt !== type) return true;
    }
    return false;
  }
  // minGapを指定した呼び出しのみ、別タイプの鉱脈との最低間隔を守る（拠点/ゲート横の保証枠は指定せず優先する）
  function placeVein(type, cx, cy, size, minGap) {
    let x = cx, y = cy, placed = 0;
    for (let s = 0; s < size * 3 && placed < size; s++) {
      if (linMap(x, y) && tiles[lidx(x, y)] === T_PLAIN && !nearDifferentOre(x, y, type, minGap)) {
        tiles[lidx(x, y)] = type;
        ore[lidx(x, y)] = (CONFIG.ORE_MIN + Math.floor(rng() * (CONFIG.ORE_MAX - CONFIG.ORE_MIN))) * CONFIG.ORE_VEIN_MULT;
        placed++;
      }
      x += Math.floor(rng() * 3) - 1; y += Math.floor(rng() * 3) - 1;
    }
    return placed;
  }

  const bx = 24, by = 24; // 第1エリアの拠点位置（G.baseと一致させる）
  const gap = CONFIG.ORE_TYPE_MIN_GAP;
  const ironN = opts.ironVeins ?? 7, stoneN = opts.stoneVeins ?? 7, crystalN = opts.crystalVeins ?? 5;
  const copperN = opts.copper ? (opts.copperVeins ?? 8) : 0;
  const starN = opts.starCrystal ? (opts.starCrystalVeins ?? 14) : 0;
  for (let i = 0; i < ironN; i++) placeVein(T_IRON, Math.floor(rng() * LN), Math.floor(rng() * MAP_H), 4 + Math.floor(rng() * 4), gap);
  for (let i = 0; i < stoneN; i++) placeVein(T_STONE, Math.floor(rng() * LN), Math.floor(rng() * MAP_H), 4 + Math.floor(rng() * 4), gap);
  for (let i = 0; i < crystalN; i++) {
    let x, y, guard = 0;
    do { x = Math.floor(rng() * LN); y = Math.floor(rng() * MAP_H); }
    while (opts.hasBase && Math.hypot(x - bx, y - by) < 12 && ++guard < 50);
    placeVein(T_CRYSTAL, x, y, 3 + Math.floor(rng() * 3), gap);
  }
  for (let i = 0; i < copperN; i++) placeVein(T_COPPER, Math.floor(rng() * LN), Math.floor(rng() * MAP_H), 4 + Math.floor(rng() * 4), gap);
  for (let i = 0; i < starN; i++) placeVein(T_STARCRYSTAL, Math.floor(rng() * LN), Math.floor(rng() * MAP_H), 4 + Math.floor(rng() * 4), gap);

  if (opts.hasBase) {
    for (let dy = -3; dy <= 3; dy++) for (let dx = -3; dx <= 3; dx++) {
      const x = bx + dx, y = by + dy;
      if (linMap(x, y)) { tiles[lidx(x, y)] = T_PLAIN; ore[lidx(x, y)] = 0; }
    }
    placeVein(T_IRON, bx - 5, by - 4, 5);
    placeVein(T_STONE, bx + 5, by + 4, 5);
  } else if (opts.copper) {
    // ゲート側の入口付近に銅・鉄鉱脈を保証
    for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
      const x = 2 + dx, y = GATE_Y + dy;
      if (linMap(x, y)) { tiles[lidx(x, y)] = T_PLAIN; ore[lidx(x, y)] = 0; }
    }
    placeVein(T_COPPER, 3, GATE_Y, 5);
    placeVein(T_IRON, 2, GATE_Y - 6, 4);
  } else if (opts.starCrystal) {
    // ゲート側の入口付近に星晶石・鉄鉱脈を保証（到着してすぐ精製ラインを組めるように）
    for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
      const x = 2 + dx, y = GATE_Y + dy;
      if (linMap(x, y)) { tiles[lidx(x, y)] = T_PLAIN; ore[lidx(x, y)] = 0; }
    }
    placeVein(T_STARCRYSTAL, 3, GATE_Y, 5);
    placeVein(T_IRON, 2, GATE_Y - 6, 4);
  }

  return { tiles, ore };
}

function pasteArea(local, x0) {
  for (let y = 0; y < MAP_H; y++) for (let x = 0; x < AREA_W; x++) {
    const gi = idx(x0 + x, y), li = y * AREA_W + x;
    G.tiles[gi] = local.tiles[li];
    G.ore[gi] = local.ore[li];
  }
}

// 境界壁＋ゲート開口部を彫る（tiles/oreは任意の配列に対して実行できる：移行処理でも再利用）
// 境界は「x0から始まりBORDER_Wの厚みを持つ壁」の並び。各境界の中央(gateX)がゲート開口部になる。
const BORDERS = [
  { x0: AREA_W, gateX: GATE_X },
  { x0: AREA_W * 2 + BORDER_W, gateX: GATE2_X },
  { x0: AREA_W * 3 + BORDER_W * 2, gateX: GATE3_X },
];
function carveBorderAndGate(tiles, ore) {
  for (const bd of BORDERS) {
    for (let y = 0; y < MAP_H; y++) for (let x = bd.x0; x < bd.x0 + BORDER_W; x++) {
      tiles[idx(x, y)] = T_ROCK; ore[idx(x, y)] = 0;
    }
    // ゲートの行は境界の壁の厚み全体＋両側の接続タイルを地形として通行可能にする。
    // 未修理の間は、ゲート「建物」自体（walkable()）が通行を塞ぐ。
    for (let x = bd.x0 - 1; x <= bd.x0 + BORDER_W; x++) {
      tiles[idx(x, GATE_Y)] = T_PLAIN; ore[idx(x, GATE_Y)] = 0;
    }
  }
}
// マップ全体の外周（x=0付近／x=W-1付近／y=0付近／y=H-1付近）を、境界と同じ厚み(BORDER_W)の岩で封鎖する。
// エリア間の境界と違いゲート（出入り口）は作らない完全な壁。「ここが世界の果て」と一目でわかるようにする
// （tilesは任意の配列に対して実行できる：移行処理でも再利用）
function sealOuterBorder(tiles, ore) {
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < BORDER_W; x++) { tiles[idx(x, y)] = T_ROCK; ore[idx(x, y)] = 0; }
    for (let x = W - BORDER_W; x < W; x++) { tiles[idx(x, y)] = T_ROCK; ore[idx(x, y)] = 0; }
  }
  for (let x = 0; x < W; x++) {
    for (let y = 0; y < BORDER_W; y++) { tiles[idx(x, y)] = T_ROCK; ore[idx(x, y)] = 0; }
    for (let y = H - BORDER_W; y < H; y++) { tiles[idx(x, y)] = T_ROCK; ore[idx(x, y)] = 0; }
  }
}
// このborderのゲートが既に修理済み（＝ゲート建物が撤去済み）かどうか
function isGateRepaired(border) {
  return !Object.values(G.buildings).some(b => b.type === 'gate' && b.x === border.gateX && b.y === GATE_Y);
}
// requiresTech（研究必須の上位ゲート）に応じた修理コスト／完了フラグ名の対応表
const GATE_COST_KEY = { gate2Blueprint: 'gate2', gate3Blueprint: 'gate3' };
function gateRepairCost(b) { return b.requiresTech ? CONFIG.COSTS[GATE_COST_KEY[b.requiresTech]] : CONFIG.COSTS.gate; }
function gateFlagKey(b) { return b.requiresTech ? 'q_' + GATE_COST_KEY[b.requiresTech] : 'q_gate'; }
// ゲート拡張工事：対象の境界を上下1マスずつ追加で開通させ、幅3マスの通路にする（既存のG.tiles/G.oreを直接書き換える）
function applyGateWideningFor(border) {
  for (const y of [GATE_Y - 1, GATE_Y + 1]) {
    for (let x = border.x0 - 1; x <= border.x0 + BORDER_W; x++) {
      if (inMap(x, y)) { G.tiles[idx(x, y)] = T_PLAIN; G.ore[idx(x, y)] = 0; }
    }
  }
  markDirty();
}

function genMap(seed) {
  const rng = mulberry32(seed);
  G.tiles.fill(T_ROCK);
  G.ore.fill(0);

  const area1 = genAreaLocal(rng, { hasBase: true, rockClusters: 30 });
  pasteArea(area1, 0);
  const area2 = genAreaLocal(rng, { hasBase: false, copper: true, rockClusters: 24 });
  pasteArea(area2, AREA_W + BORDER_W);
  // 第3エリア：既存資源(銅・結晶中心)の高密度配置。新資源タイプは追加しない
  const area3 = genAreaLocal(rng, { hasBase: false, copper: true, copperVeins: 14, crystalVeins: 12, ironVeins: 3, stoneVeins: 3, rockClusters: 18 });
  pasteArea(area3, AREA_W * 2 + BORDER_W * 2);
  // 第4エリア：新資源「星晶石」中心。上位発電機のための精製チェーンの起点になる
  const area4 = genAreaLocal(rng, { hasBase: false, starCrystal: true, starCrystalVeins: 14, crystalVeins: 6, ironVeins: 4, stoneVeins: 4, rockClusters: 20 });
  pasteArea(area4, AREA_W * 3 + BORDER_W * 3);
  carveBorderAndGate(G.tiles, G.ore);
  sealOuterBorder(G.tiles, G.ore);

  G.buildings = {};
  G.buildings[bkey(G.base.x, G.base.y)] = { type: 'base', x: G.base.x, y: G.base.y };
  G.buildings[bkey(GATE_X, GATE_Y)] = { type: 'gate', x: GATE_X, y: GATE_Y, repaired: false };
  G.buildings[bkey(GATE2_X, GATE_Y)] = { type: 'gate', x: GATE2_X, y: GATE_Y, repaired: false, requiresTech: 'gate2Blueprint' };
  G.buildings[bkey(GATE3_X, GATE_Y)] = { type: 'gate', x: GATE3_X, y: GATE_Y, repaired: false, requiresTech: 'gate3Blueprint' };
  G.player.x = G.base.x; G.player.y = G.base.y + 1;
  G.player.batteryUpgraded = false;
  G.beaconCleared = false;
}

// =====================================================================
// 経路探索（A*・4方向）
// =====================================================================
function findPath(sx, sy, tx, ty) {
  if (!walkable(tx, ty)) return null;
  const open = [{ x: sx, y: sy, g: 0, f: 0, p: null }];
  const seen = new Map([[idx(sx, sy), 0]]);
  let guard = 0;
  while (open.length && ++guard < 6000) {
    let bi = 0;
    for (let i = 1; i < open.length; i++) if (open[i].f < open[bi].f) bi = i;
    const cur = open.splice(bi, 1)[0];
    if (cur.x === tx && cur.y === ty) {
      const path = [];
      for (let n = cur; n.p; n = n.p) path.unshift({ x: n.x, y: n.y });
      return path;
    }
    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const nx = cur.x + dx, ny = cur.y + dy;
      if (!walkable(nx, ny)) continue;
      const g = cur.g + 1;
      const k = idx(nx, ny);
      if (seen.has(k) && seen.get(k) <= g) continue;
      seen.set(k, g);
      open.push({ x: nx, y: ny, g, f: g + Math.abs(tx - nx) + Math.abs(ty - ny), p: cur });
    }
  }
  return null;
}
// 目標の隣接タイルへの経路（設備や鉱脈に近づく用）
function findPathAdjacent(tx, ty) {
  const p = G.player, sx = Math.round(p.x), sy = Math.round(p.y);
  let best = null;
  for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
    const ax = tx + dx, ay = ty + dy;
    if (!walkable(ax, ay)) continue;
    if (ax === sx && ay === sy) return [];
    const path = findPath(sx, sy, ax, ay);
    if (path && (!best || path.length < best.length)) best = path;
  }
  return best;
}

// =====================================================================
// プレイヤー操作
// =====================================================================
function playerDistTo(x, y) { return Math.hypot(G.player.x - x, G.player.y - y); }

// 同一鉱脈タイルへの連打を検知し、採掘機未設置のプレイヤーへ一度きりヒントを出す（行動トリガー型ヒント）
let tapStreakKey = null, tapStreakCount = 0, tapStreakSince = 0;
function trackMineTapStreak(x, y) {
  const key = bkey(x, y);
  if (key === tapStreakKey && G.time - tapStreakSince <= CONFIG.MINER_HINT_WINDOW_SEC) {
    tapStreakCount++;
  } else {
    tapStreakKey = key; tapStreakCount = 1; tapStreakSince = G.time;
  }
  if (tapStreakCount >= CONFIG.MINER_HINT_TAP_COUNT && !G.flags.hintMinerShown
      && !hasBuilding('miner') && !hasBuilding('minerMk2')) {
    G.flags.hintMinerShown = true;
    toast('手掘りには限界があります。採掘機を設置すると自動で掘り続けてくれます', undefined, 4500, true);
    saveGame();
  }
}

function tryMine(x, y) {
  const t = G.tiles[idx(x, y)];
  const item = ORE_ITEM[t];
  if (!item || G.ore[idx(x, y)] <= 0) return;
  trackMineTapStreak(x, y);
  G.ore[idx(x, y)] -= CONFIG.MINE_PER_TAP;
  invAdd(G.player.inv, item, CONFIG.MINE_PER_TAP);
  fx.push({ type: 'pop', x, y, txt: '+1 ' + ITEMS[item].name, t: 0 });
  sfxMine();
  if (G.ore[idx(x, y)] <= 0) {
    G.tiles[idx(x, y)] = T_PLAIN;
    toast(ITEMS[item].name + 'の鉱脈を掘りつくした');
    sfxOreDepleted();
  }
  markDirty();
}

function onTapTile(x, y) {
  if (!inMap(x, y) || !G.explored[idx(x, y)]) { return; }
  const p = G.player;

  // 撤去モード
  if (eraseMode) {
    const b = buildingAt(x, y);
    if (b && b.type !== 'base' && b.type !== 'gate') removeBuilding(b);
    else toast('ここには撤去できる設備がない', 'warn');
    return;
  }

  // 設置モード（向きのある設備は、置く前に向きプレビュー→確定の2段階にする）
  if (buildMode) {
    if (DIRECTIONAL_TYPES.has(buildMode)) {
      if (placePreview && placePreview.x === x && placePreview.y === y) {
        placePreview.dir = (placePreview.dir + 1) % 4; // 同じ場所を再タップ→向きを90度変える
      } else {
        placePreview = { type: buildMode, x, y, dir: placePreview ? placePreview.dir : 0 };
      }
      updateBuildModeUI();
      markDirty();
      return;
    }
    tryPlace(buildMode, x, y); return;
  }

  // 設備タップ
  const b = buildingAt(x, y);
  if (b) {
    if (playerDistTo(x, y) <= 1.6) { openBuilding(b); }
    else {
      const path = findPathAdjacent(x, y);
      if (path) { p.path = path; p.pending = { type: 'open', x, y }; }
      else toast('そこへは行けない', 'warn');
    }
    return;
  }

  // 鉱脈タップ → 近ければ採掘、遠ければ移動して採掘
  const t = G.tiles[idx(x, y)];
  if (ORE_ITEM[t]) {
    if (playerDistTo(x, y) <= 1.6) { tryMine(x, y); }
    else {
      const path = findPath(Math.round(p.x), Math.round(p.y), x, y) || findPathAdjacent(x, y);
      if (path) { p.path = path; p.pending = { type: 'mine', x, y }; }
      else toast('そこへは行けない', 'warn');
    }
    return;
  }

  // 平地タップ → 移動
  if (t === T_ROCK) { toast('岩は通れない', 'warn'); return; }
  const path = findPath(Math.round(p.x), Math.round(p.y), x, y);
  if (path) { p.path = path; p.pending = null; }
  else toast('そこへは行けない', 'warn');
}

// =====================================================================
// 設備の設置・撤去
// =====================================================================
let buildMode = null;
let eraseMode = false;
// 向きを持つ設備は、置く前に向きプレビュー→確定の2段階にする（初見で「置いたのに動かない」を防ぐ）
const DIRECTIONAL_TYPES = new Set(['arm', 'fastArm', 'filterArm', 'belt', 'fastBelt', 'splitter']);
let placePreview = null; // {type,x,y,dir} 設置確定前のプレビュー
let placementHistory = [];   // {type,x,y}のスタック。「元に戻す」を押すたびに1件ずつ取り消して、設置モードを抜けずにさかのぼれるようにする
// モード切替/キャンセルするまでクリアされないため、1回のベルト連続ドラッグ設置等で際限なく積み上がりうる。
// 実用上、これ以上さかのぼって元に戻す操作は発生しないので上限を設けて無制限な配列成長を防ぐ（Phase4.9）
const PLACEMENT_HISTORY_MAX = 200;
function pushPlacementHistory(entry) {
  placementHistory.push(entry);
  if (placementHistory.length > PLACEMENT_HISTORY_MAX) placementHistory.shift();
}

function canAfford(cost) {
  return Object.entries(cost).every(([k, v]) => invCount(G.player.inv, k) >= v);
}
function payCost(cost) { for (const [k, v] of Object.entries(cost)) invAdd(G.player.inv, k, -v); }
function costText(cost) {
  return Object.entries(cost).map(([k, v]) => {
    const ok = invCount(G.player.inv, k) >= v;
    return `<span class="${ok ? '' : 'ng'}">${ITEMS[k].name}×${v}</span>`;
  }).join('　');
}

function tryPlace(type, x, y, initDir) {
  const cost = CONFIG.COSTS[type];
  if (!G.explored[idx(x, y)]) { toast('未探索の場所には置けない', 'warn'); return; }
  if (buildingAt(x, y)) { toast('すでに設備がある', 'warn'); return; }
  if (Math.round(G.player.x) === x && Math.round(G.player.y) === y) { toast('ロボの足元には置けない', 'warn'); return; }
  const t = G.tiles[idx(x, y)];
  let minerMixedOreNames = null;   // 範囲内に複数種類の鉱脈がある場合、設置後に警告するため保持しておく
  if (type === 'miner' || type === 'minerMk2') {
    if (t === T_ROCK) { toast('岩の上には置けない', 'warn'); return; }
    const oreTypes = new Set();
    const R = type === 'minerMk2' ? CONFIG.MINER_MK2_RADIUS : CONFIG.MINER_RADIUS;
    for (let dy = -R; dy <= R; dy++) for (let dx = -R; dx <= R; dx++) {
      const nx = x + dx, ny = y + dy;
      if (inMap(nx, ny) && ORE_ITEM[G.tiles[idx(nx, ny)]] && G.ore[idx(nx, ny)] > 0) oreTypes.add(ORE_ITEM[G.tiles[idx(nx, ny)]]);
    }
    if (oreTypes.size === 0) { toast(`採掘機は鉱脈から${R}マス以内に置く`, 'warn'); return; }
    if (oreTypes.size >= 2) minerMixedOreNames = [...oreTypes].map(k => ITEMS[k].name).join('と');
  } else {
    if (t === T_ROCK) { toast('岩の上には置けない', 'warn'); return; }
    if (ORE_ITEM[t]) { toast('鉱脈の上に置けるのは採掘機だけ', 'warn'); return; }
  }
  if (type === 'antenna' && Math.hypot(x - G.base.x, y - G.base.y) > CONFIG.ANTENNA_RANGE) {
    toast(`アンテナは拠点から${CONFIG.ANTENNA_RANGE}マス以内に設置する`, 'warn'); return;
  }
  if (!canAfford(cost)) { toast('材料が足りない', 'warn'); return; }

  payCost(cost);
  const b = { type, x, y };
  const dir0 = initDir || 0;
  if (type === 'miner' || type === 'minerMk2') { b.timer = 0; b.buffer = {}; }
  if (type === 'furnace') { b.input = {}; b.output = {}; b.job = null; b.progress = 0; }
  if (type === 'chest' || type === 'chestIn') { b.inv = {}; }
  if (type === 'antenna') { b.active = false; }
  if (type === 'arm' || type === 'fastArm') { b.dir = dir0; b.timer = 0; }
  if (type === 'filterArm') { b.dir = dir0; b.timer = 0; b.filterItem = null; }
  if (type === 'belt' || type === 'fastBelt') { b.dir = dir0; b.item = null; b.progress = 0; }
  if (type === 'splitter') { b.dir = dir0; b.item = null; b.progress = 0; b.toggle = 0; }
  if (type === 'beacon') { b.active = false; }
  if (type === 'assembler') { b.input = {}; b.output = {}; b.job = null; b.progress = 0; b.recipeOut = null; }
  if (type === 'lab') { b.input = {}; b.currentTech = null; b.job = null; b.progress = 0; }
  if (type === 'generator' || type === 'advGenerator') { b.input = {}; b.job = null; b.progress = 0; b.active = false; }
  if (type === 'battery') { b.charge = 0; }
  G.buildings[bkey(x, y)] = b;
  markPowerTopologyDirty();
  pushPlacementHistory({ type, x, y });
  buildMode = null;
  placePreview = null;
  updateBuildModeUI();
  if (minerMixedOreNames) toast(`⚠️ 設置した！この範囲には${minerMixedOreNames}の鉱脈が混在しています（ラインが混ざるかも）`, 'warn', 4200);
  else toast(BUILDINGS[type].name + 'を設置した！');
  sfxPlace();
  markDirty(); scheduleSave();
}

function removeBuilding(b) {
  if (b.type === 'base' || b.type === 'gate') return; // 拠点・ゲートは撤去不可
  // コスト返却＋中身をプレイヤーへ
  payCostRefund(CONFIG.COSTS[b.type]);
  for (const src of [b.buffer, b.input, b.output, b.inv]) {
    if (src) for (const [k, v] of Object.entries(src)) invAdd(G.player.inv, k, v);
  }
  if (b.item) invAdd(G.player.inv, b.item, 1);
  delete G.buildings[bkey(b.x, b.y)];
  markPowerTopologyDirty();
  closePanel();
  toast(BUILDINGS[b.type].name + 'を撤去した（材料は返却）');
  markDirty(); scheduleSave();
}
function payCostRefund(cost) { for (const [k, v] of Object.entries(cost)) invAdd(G.player.inv, k, v); }
// その場アップグレード（Phase4.15②）：miner→minerMk2／belt→fastBelt／arm→fastArmのみ対象。
// 対象の設備はtryPlace()で生成される時点から通常版・上位版でプロパティの形が完全に一致しており
// （buffer/timer、item/progress/dir、timerなど）、typeを差し替えるだけで向き・接続・バッファの
// 中身・ベルト上のアイテム・進行度のいずれも失われずに引き継がれる（安全性はtryPlace実装を確認して判断）。
// 発電機系統は対象外（燃料の系統が異なるため。BUILDINGS側でupgradesToを設定しない）
function canUpgrade(b) {
  const nextType = BUILDINGS[b.type] && BUILDINGS[b.type].upgradesTo;
  return !!nextType && buildingUnlocked(nextType);
}
function upgradeBuilding(b) {
  const nextType = BUILDINGS[b.type] && BUILDINGS[b.type].upgradesTo;
  if (!nextType || !buildingUnlocked(nextType)) return;
  const cost = CONFIG.UPGRADE_COSTS[nextType];
  if (!cost || !canAfford(cost)) return;
  payCost(cost);
  const oldName = BUILDINGS[b.type].name;
  b.type = nextType;   // 向き・バッファ・搬送中アイテム等は同じプロパティ名のまま引き継がれる
  toast(`⬆️ ${oldName}を${BUILDINGS[nextType].name}にアップグレードした！`);
  sfxResearchDone();
  markDirty(); scheduleSave();
}
// 「元に戻す」：placementHistoryの末尾から1件ずつ取り消す。押すたびにさかのぼれるスタック方式（Phase4.6③）
function undoLastPlacement() {
  if (!placementHistory.length) return;
  const { type, x, y } = placementHistory.pop();
  const b = buildingAt(x, y);
  if (!b || b.type !== type) { updateBuildModeUI(); toast('その設備はもう無い', 'warn'); return; }
  removeBuilding(b);
  // updateBuildModeUIは末尾でbuildMode中のヒントtoastを出すため、それより後に呼んで
  // 「元に戻した」のフィードバックが上書きされて消えないようにする
  updateBuildModeUI();
  toast(BUILDINGS[type].name + 'を元に戻した' + (placementHistory.length ? `（あと${placementHistory.length}件戻せる）` : ''));
}

// =====================================================================
// 設備の自動処理
// =====================================================================
const SMELT_OUT = { ironOre: 'ironPlate', stone: 'stoneBlock', copperOre: 'copperWire', starCrystal: 'starCrystalRefined' };
function furnaceAccepts(item) { return !!SMELT_OUT[item]; }

// ---- 設備の入出力（採掘機バッファ／精錬炉の投入出力／保管箱／ベルト、共通操作） ----
function firstKey(obj) { const ks = Object.keys(obj); return ks.length ? ks[0] : null; }
// wantItemを指定すると、その種類が在庫にあるかだけを見る（無ければfirstKeyで先頭の1種類を返す）。
// フィルタアーム対応（バグ修正）：wantItem無指定だとfirstKeyしか見ないため、混在鉱脈の採掘機バッファ等で
// 先頭に無い種類（例:銅鉱石）がいつまでも掴めなかった。フィルタアームは常にwantItemを渡して直接その種類を探す
function peekSpecific(inv, wantItem) { return invCount(inv, wantItem) > 0 ? wantItem : null; }
function bldPeekOutput(b, wantItem) {
  if (b.type === 'chest' || b.type === 'chestIn') return wantItem ? peekSpecific(b.inv, wantItem) : firstKey(b.inv);
  if (b.type === 'furnace') return wantItem ? peekSpecific(b.output, wantItem) : firstKey(b.output);
  if (b.type === 'miner' || b.type === 'minerMk2') return wantItem ? peekSpecific(b.buffer, wantItem) : firstKey(b.buffer);
  if (b.type === 'assembler') return wantItem ? peekSpecific(b.output, wantItem) : firstKey(b.output);
  if (isBeltLike(b.type)) return wantItem ? (b.item === wantItem ? b.item : null) : b.item;
  return null;
}
function bldRemoveOne(b, item) {
  if (b.type === 'chest' || b.type === 'chestIn') invAdd(b.inv, item, -1);
  else if (b.type === 'furnace') invAdd(b.output, item, -1);
  else if (b.type === 'miner' || b.type === 'minerMk2') invAdd(b.buffer, item, -1);
  else if (b.type === 'assembler') invAdd(b.output, item, -1);
  else if (isBeltLike(b.type)) { b.item = null; b.progress = 0; }
}
function bldCanInsert(b, item) {
  if (b.type === 'chest' || b.type === 'chestIn') return invTotal(b.inv) < CONFIG.CHEST_CAP;
  if (b.type === 'furnace') return furnaceAccepts(item) && invCount(b.input, item) < CONFIG.FURNACE_IN_CAP;
  if (b.type === 'assembler') {
    const recipe = assemblerRecipe(b);
    return !!(recipe && recipe.in[item] !== undefined && invCount(b.input, item) < CONFIG.ASSEMBLER_IN_CAP);
  }
  if (b.type === 'lab') {
    if (item !== 'researchPack1' && item !== 'researchPack2') return false;
    if (!b.currentTech) return false;
    const tech = researchById(b.currentTech);
    if (!tech) return false;
    const need = tech.cost[item] || 0;
    const consumed = getResearchProgress(b.currentTech)[item] || 0;
    return consumed + invCount(b.input, item) < need && invCount(b.input, item) < CONFIG.LAB_IN_CAP;
  }
  if (b.type === 'generator') return item === 'crystal' && invCount(b.input, item) < CONFIG.GEN_FUEL_CAP;
  if (b.type === 'advGenerator') return item === 'arcCore' && invCount(b.input, item) < CONFIG.ADV_GEN_FUEL_CAP;
  if (isBeltLike(b.type)) return !b.item;
  return false;
}
function bldInsert(b, item) {
  if (b.type === 'chest' || b.type === 'chestIn') invAdd(b.inv, item, 1);
  else if (b.type === 'furnace') invAdd(b.input, item, 1);
  else if (b.type === 'assembler') invAdd(b.input, item, 1);
  else if (b.type === 'lab') invAdd(b.input, item, 1);
  else if (b.type === 'generator' || b.type === 'advGenerator') invAdd(b.input, item, 1);
  else if (isBeltLike(b.type)) { b.item = item; b.progress = 0; }
}
// 中身プレビュー用：設備が持つ在庫系プロパティ(buffer/input/output/inv)をまとめて集計
function bldOverlayInv(b) {
  const merged = {};
  for (const src of [b.buffer, b.input, b.output, b.inv]) {
    if (!src) continue;
    for (const [k, v] of Object.entries(src)) merged[k] = (merged[k] || 0) + v;
  }
  return merged;
}

function tickMachines(dt) {
  // Object.values(G.buildings)は配列を新規生成するため、1フレームに何度も呼ぶと設備数に比例して無駄が増える。
  // 1回だけ呼んで使い回す（Phase4.6①）
  const all = Object.values(G.buildings);
  // 発電機の燃料消費（発電の可否）を先に確定してから、電力ネットワークの需給を計算する
  for (const b of all) {
    if (b.type === 'generator' || b.type === 'advGenerator') tickGenerator(b, dt);
  }
  tickPower(all, dt);
  for (const b of all) {
    // 電力を必要とする設備は、停電中（b.powered===false）は完全停止する
    if (CONFIG.POWER_USE[b.type] !== undefined && !b.powered) continue;
    if (b.type === 'miner' || b.type === 'minerMk2') tickMiner(b, dt);
    else if (b.type === 'furnace') tickFurnace(b, dt);
    else if (b.type === 'assembler') tickAssembler(b, dt);
    else if (b.type === 'lab') tickLab(b, dt);
    else if (b.type === 'arm' || b.type === 'fastArm' || b.type === 'filterArm') tickArm(b, dt);
    else if (b.type === 'belt' || b.type === 'fastBelt') tickBelt(b, dt);
    else if (b.type === 'splitter') tickSplitter(b, dt);
    else if (b.type === 'chestIn') tickChestIn(b, dt);
  }
}

// =====================================================================
// 電力システム（無線送電：電線は敷かず、発電機/中継塔からの半径で届く）
// =====================================================================
// 発電機：燃料（結晶／アークコア）を消費し続けている間だけ発電する（精錬炉と同じ「job」パターン）
function tickGenerator(b, dt) {
  const fuel = b.type === 'advGenerator' ? 'arcCore' : 'crystal';
  const interval = b.type === 'advGenerator' ? CONFIG.ADV_GEN_FUEL_INTERVAL : CONFIG.GEN_FUEL_INTERVAL;
  if (!b.job && invCount(b.input, fuel) > 0) { invAdd(b.input, fuel, -1); b.job = fuel; b.progress = 0; }
  if (b.job) {
    b.progress += dt;
    if (b.progress >= interval) {
      b.job = null; b.progress = 0;
      if (invCount(b.input, fuel) > 0) { invAdd(b.input, fuel, -1); b.job = fuel; b.progress = 0; }
    }
  }
  b.active = !!b.job;
}
// 拠点電源（base）は燃料切れなしの常時稼働電源として扱う。既存セーブもbase建物は必ず存在するため、
// 移行処理を書かなくてもロードした瞬間から拠点電源が有効になる
function isPowerNode(b) { return b.type === 'base' || b.type === 'generator' || b.type === 'advGenerator' || b.type === 'relay' || b.type === 'battery'; }
function powerNodeRadius(b) {
  if (b.type === 'base') return CONFIG.BASE_POWER_RADIUS;
  if (b.type === 'generator') return CONFIG.GEN_RADIUS;
  if (b.type === 'advGenerator') return CONFIG.ADV_GEN_RADIUS;
  if (b.type === 'relay') return CONFIG.RELAY_RADIUS;
  if (b.type === 'battery') return CONFIG.BATTERY_RADIUS;
  return 0;
}
function powerNodeOutput(b) {
  if (b.type === 'base') return CONFIG.BASE_POWER_OUTPUT;
  if (!b.active) return 0;
  if (b.type === 'generator') return CONFIG.GEN_OUTPUT;
  if (b.type === 'advGenerator') return CONFIG.ADV_GEN_OUTPUT;
  return 0;
}
// 発電機・中継塔の位置関係（Union-Find）だけを対象にした「電力網」の再計算。
// 設備の設置・撤去時にのみ呼べばよい（消費設備が増減しても網の形自体は変わらないため）
let powerNetworks = [];
let powerTopologyDirty = true;
function markPowerTopologyDirty() { powerTopologyDirty = true; }
function rebuildPowerTopology() {
  const nodes = Object.values(G.buildings).filter(isPowerNode);
  const parent = nodes.map((_, i) => i);
  function find(i) { while (parent[i] !== i) { parent[i] = parent[parent[i]]; i = parent[i]; } return i; }
  function union(i, j) { const ri = find(i), rj = find(j); if (ri !== rj) parent[ri] = rj; }
  for (let i = 0; i < nodes.length; i++) for (let j = i + 1; j < nodes.length; j++) {
    const d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
    if (d <= powerNodeRadius(nodes[i]) || d <= powerNodeRadius(nodes[j])) union(i, j);
  }
  const groups = new Map();
  nodes.forEach((node, i) => {
    const root = find(i);
    if (!groups.has(root)) groups.set(root, []);
    groups.get(root).push(node);
  });
  powerNetworks = [...groups.values()].map(ns => ({ nodes: ns, supply: 0, demand: 0 }));
  powerTopologyDirty = false;
}
// 各設備の稼働可否（b.powered）を毎ティック確定する：
// 供給＝ネットワーク内で現在発電中のノードの出力合計、需要＝そのネットワークが届く消費設備の消費量合計
// 拠点電源（base）が常時ネットワークの一員になっているため、恩恵期間のような特別扱いは不要
function tickPower(all, dt) {
  if (powerTopologyDirty) rebuildPowerTopology();
  for (const net of powerNetworks) { net.supply = net.nodes.reduce((s, n) => s + powerNodeOutput(n), 0); net.demand = 0; }
  const assigned = [];
  for (const b of all) {
    if (CONFIG.POWER_USE[b.type] === undefined) continue;
    const net = powerNetworks.find(cand => cand.nodes.some(n => Math.hypot(n.x - b.x, n.y - b.y) <= powerNodeRadius(n)));
    if (net) net.demand += CONFIG.POWER_USE[b.type];
    assigned.push([b, net]);
  }
  // 蓄電池の充放電（Phase4.11①）：供給が需要を上回るネットワークは余剰分を蓄電池へ充電し、
  // 下回るネットワークは不足分を蓄電池から放電して補う。見かけ上の供給net.effectiveSupplyに
  // 反映し、停電判定はこちらを使う（単発の発電機故障などによる網全体の停電を緩和する）。
  // supply/demand/surplus/deficitは瞬時値（ワット相当）、charge/room/energyはエネルギー量なので、
  // 両者をdtで変換する時に単位を揃えること（charge/dtやrate*dtを混同すると充放電が機能しない）
  for (const net of powerNetworks) {
    net.effectiveSupply = net.supply;
    const batteries = net.nodes.filter(n => n.type === 'battery');
    if (!batteries.length) continue;
    if (net.supply >= net.demand) {
      let surplus = net.supply - net.demand;   // ワット（余剰）
      for (const bt of batteries) {
        if (surplus <= 0) break;
        const room = CONFIG.BATTERY_CAPACITY - (bt.charge || 0);
        const rate = Math.min(CONFIG.BATTERY_CHARGE_RATE, surplus);   // このtickで使う充電レート（ワット）
        const energy = Math.min(rate * dt, room);                     // 実際に貯まるエネルギー量
        if (energy > 0) { bt.charge = (bt.charge || 0) + energy; surplus -= energy / dt; }
      }
    } else {
      let deficit = net.demand - net.supply;   // ワット（不足）
      for (const bt of batteries) {
        if (deficit <= 0) break;
        const maxRateFromCharge = dt > 0 ? (bt.charge || 0) / dt : 0; // 残エネルギーで維持できる最大レート
        const rate = Math.min(CONFIG.BATTERY_DISCHARGE_RATE, deficit, maxRateFromCharge);
        if (rate > 0) { bt.charge -= rate * dt; net.effectiveSupply += rate; deficit -= rate; }
      }
    }
  }
  let newlyUnpowered = false;
  for (const [b, net] of assigned) {
    const newPowered = !!(net && net.effectiveSupply >= net.demand);
    if (!newPowered && b.powered !== false) {
      newlyUnpowered = true;   // このtickで新たに停電した設備がある（SEは1回にまとめる）
      // 初めて停電を経験した瞬間に、小型発電機・無線中継塔の存在を一度だけ案内する
      // （序盤から強制的に発電機を作らせず、実際に電力が必要になったタイミングで気づかせる）
      if (!G.flags.hintPowerShown) {
        G.flags.hintPowerShown = true;
        toast('⚡ 電力が足りない！🔨建設メニューの「基本」から小型発電機を、「電力」から無線中継塔を作って電力網を広げよう', undefined, 5500, true);
        saveGame();
      }
    }
    b.powered = newPowered;
  }
  if (newlyUnpowered) sfxPowerOut();
}

// 研究所：選択中の研究のコストに従い、パックを1個ずつ消費して進行する
// 消費実績はG.researchProgressにグローバル管理し、同じ技術を選んだ複数の研究所が進捗を共有する
function tickLab(b, dt) {
  if (!b.currentTech) return;
  if (G.research[b.currentTech]) { b.currentTech = null; return; } // 他の研究所が先に完了済み
  const tech = researchById(b.currentTech);
  if (!tech) { b.currentTech = null; return; }
  const progress = getResearchProgress(b.currentTech);
  if (!b.job) {
    for (const packType of ['researchPack1', 'researchPack2']) {
      const need = tech.cost[packType] || 0;
      const consumed = progress[packType] || 0;
      if (consumed < need && invCount(b.input, packType) > 0) {
        invAdd(b.input, packType, -1);
        b.job = packType; b.progress = 0;
        break;
      }
    }
  }
  if (b.job) {
    b.progress += dt;
    if (b.progress >= CONFIG.LAB_PACK_TIME) {
      progress[b.job] = (progress[b.job] || 0) + 1;
      b.job = null; b.progress = 0;
      markDirty();
      const allDone = Object.entries(tech.cost).every(([k, v]) => (progress[k] || 0) >= v);
      if (allDone) {
        G.research[tech.id] = true;
        delete G.researchProgress[tech.id];
        // この技術を対象にしていた全ての研究所（この研究所自身も含む）をクリアする
        for (const lab of Object.values(G.buildings)) {
          if (lab.type === 'lab' && lab.currentTech === tech.id) { lab.currentTech = null; lab.job = null; lab.progress = 0; }
        }
        // ゲート拡張工事：既に修理済みのゲートがあれば即座に拡幅する（未修理分は修理時に適用）
        if (tech.id === 'gateWidening') {
          for (const bd of BORDERS) if (isGateRepaired(bd)) applyGateWideningFor(bd);
        }
        toast(`🔬「${tech.name}」の研究が完了した！`);
        sfxResearchDone();
        saveGame();
      }
    }
  }
}
// 研究所の進捗率（0〜1）：グローバル消費済みパック数＋この研究所が現在処理中の端数を、必要総数で割る
function labProgress(b) {
  const tech = b.currentTech ? researchById(b.currentTech) : null;
  if (!tech) return 0;
  const totalNeeded = Object.values(tech.cost).reduce((a, c) => a + c, 0);
  if (!totalNeeded) return 0;
  // costに存在しないパック種別（研究コスト変更で外れた旧消費実績など）は分子に含めない
  const progress = getResearchProgress(b.currentTech);
  const totalConsumed = Object.keys(tech.cost).reduce((a, k) => a + Math.min(progress[k] || 0, tech.cost[k]), 0);
  const partial = b.job ? b.progress / CONFIG.LAB_PACK_TIME : 0;
  return (totalConsumed + partial) / totalNeeded;
}

// 組立機に選択中のレシピオブジェクトを返す（CONFIG.RECIPESからoutで検索）
function assemblerRecipe(b) { return b.recipeOut ? CONFIG.RECIPES.find(r => r.out === b.recipeOut) : null; }

// レシピの段階解放：材料を一度も入手していなければ'hidden'（一覧に出さない）、
// 一部だけ入手済みなら'partial'（シルエット＋？？？）、全て入手済み（研究要件があれば研究完了も）なら'full'
function recipeVisibility(r) {
  const materials = Object.keys(r.in);
  const known = materials.filter(k => G.discovered[k]);
  if (known.length === 0) return 'hidden';
  if (known.length < materials.length) return 'partial';
  if (r.requiresTech && !G.research[r.requiresTech]) return 'partial';
  return 'full';
}
// 一覧表示用：CONFIG.RECIPESの元インデックスを保持したまま、hidden以外を返す
function visibleRecipes() {
  return CONFIG.RECIPES
    .map((r, i) => ({ r, i, vis: recipeVisibility(r) }))
    .filter(x => x.vis !== 'hidden');
}
// レシピ材料の表示テキスト（'full'は通常のcostText、それ以外は未入手の材料だけ？？？にする）
function recipeMaterialsText(r, vis) {
  if (vis === 'full') return costText(r.in);
  return Object.entries(r.in).map(([k, v]) => G.discovered[k] ? `${ITEMS[k].name}×${v}` : '？？？').join('　');
}

function tickAssembler(b, dt) {
  const recipe = assemblerRecipe(b);
  if (!recipe) return; // レシピ未選択
  if (!b.job) {
    const hasAll = Object.entries(recipe.in).every(([k, v]) => invCount(b.input, k) >= v);
    if (hasAll && invCount(b.output, recipe.out) < CONFIG.ASSEMBLER_OUT_CAP) {
      for (const [k, v] of Object.entries(recipe.in)) invAdd(b.input, k, -v);
      b.job = recipe.out; b.progress = 0;
    }
  }
  if (b.job) {
    b.progress += dt;
    if (b.progress >= CONFIG.ASSEMBLER_TIME) {
      const jobRecipe = CONFIG.RECIPES.find(r => r.out === b.job);
      invAdd(b.output, b.job, jobRecipe ? jobRecipe.outN : 1);
      b.job = null; b.progress = 0;
      markDirty();
      sfxProduce();
    }
  }
}

function tickArm(a, dt) {
  a.timer += dt;
  if (a.timer < armInterval(a)) return;
  if (a.type === 'filterArm' && !a.filterItem) return;   // 対象アイテム未設定なら何も掴まない
  const dv = DIR_VEC[a.dir];
  const src = buildingAt(a.x - dv.x, a.y - dv.y);
  const dst = buildingAt(a.x + dv.x, a.y + dv.y);
  if (!src || !dst) return;
  // フィルタアームはfilterItemを直接指定して探す。指定なしだと先頭の1種類(firstKey)しか見ないため、
  // 採掘機バッファ等に複数種類が混在していると先頭以外（例:銅鉱石）がいつまでも掴めないバグがあった
  const item = bldPeekOutput(src, a.type === 'filterArm' ? a.filterItem : undefined);
  if (!item) return;
  if (!bldCanInsert(dst, item)) return;
  bldRemoveOne(src, item);
  bldInsert(dst, item);
  a.timer = 0;
  markDirty();
}

function tickBelt(b, dt) {
  if (!b.item) return;
  if (b.progress < 1) b.progress = Math.min(1, b.progress + dt / beltTime(b));
  if (b.progress >= 1) {
    const dv = DIR_VEC[b.dir];
    const nb = buildingAt(b.x + dv.x, b.y + dv.y);
    if (nb && isBeltLike(nb.type) && !nb.item) {
      nb.item = b.item; nb.progress = 0;
      b.item = null; b.progress = 0;
      markDirty();
    } else if (nb && nb.type === 'chestIn' && bldCanInsert(nb, b.item)) {
      bldInsert(nb, b.item);
      b.item = null; b.progress = 0;
      markDirty();
    }
  }
}

// 分配器：受け取ったアイテムを前方向／右方向へ交互に振り分ける（簡易スプリッタ）
function tickSplitter(b, dt) {
  if (!b.item) return;
  if (b.progress < 1) b.progress = Math.min(1, b.progress + dt / beltTime(b));
  if (b.progress >= 1) {
    const outDirs = [b.dir, (b.dir + 1) % 4];
    const order = (b.toggle || 0) % 2 === 0 ? outDirs : [outDirs[1], outDirs[0]];
    for (const d of order) {
      const dv = DIR_VEC[d];
      const nb = buildingAt(b.x + dv.x, b.y + dv.y);
      let ok = false;
      if (nb && isBeltLike(nb.type) && !nb.item) { nb.item = b.item; nb.progress = 0; ok = true; }
      else if (nb && nb.type === 'chestIn' && bldCanInsert(nb, b.item)) { bldInsert(nb, b.item); ok = true; }
      if (ok) {
        b.item = null; b.progress = 0;
        b.toggle = ((b.toggle || 0) + 1) % 2;
        markDirty();
        return;
      }
    }
  }
}

// 搬入口付き保管箱(chestIn)：搬入はこれまで通りベルトからの直接プッシュ、搬出は隣接する空きベルトへ自動で1個ずつ渡す
// （b.timerは旧セーブに無くても(b.timer||0)で0扱いになるため、移行処理は不要）
function tickChestIn(b, dt) {
  b.timer = (b.timer || 0) + dt;
  if (b.timer < CONFIG.CHEST_OUT_INTERVAL) return;
  const item = bldPeekOutput(b);
  if (!item) return;
  for (const dv of DIR_VEC) {
    const nb = buildingAt(b.x + dv.x, b.y + dv.y);
    if (nb && isBeltLike(nb.type) && !nb.item) {
      nb.item = item; nb.progress = 0;
      bldRemoveOne(b, item);
      b.timer = 0;
      markDirty();
      return;
    }
  }
}

// 採掘機の中心から半径内にある、まだ残量のある鉱脈タイル一覧（Mk2は範囲が広い）
function minerOreTiles(b) {
  const list = [];
  const R = minerRadius(b);
  for (let dy = -R; dy <= R; dy++) for (let dx = -R; dx <= R; dx++) {
    const nx = b.x + dx, ny = b.y + dy;
    if (!inMap(nx, ny)) continue;
    const t = G.tiles[idx(nx, ny)];
    if (ORE_ITEM[t] && G.ore[idx(nx, ny)] > 0) list.push({ x: nx, y: ny, item: ORE_ITEM[t] });
  }
  return list;
}

function tickMiner(b, dt) {
  const veins = minerOreTiles(b);
  if (veins.length === 0) { b.depleted = true; return; }   // 範囲内の鉱脈が尽きた
  b.depleted = false;
  b.timer += dt;
  if (b.timer < minerInterval(b)) return;
  // 範囲内の鉱脈を順番に採掘（ラウンドロビン）
  const cursor = (b.cursor || 0) % veins.length;
  const vein = veins[cursor];
  b.cursor = (cursor + 1) % veins.length;
  const item = vein.item;
  // 受け渡し先を探す（隣接の精錬炉→保管箱→内部バッファ）
  let placed = false;
  for (const dv of DIR_VEC) {
    const nb = buildingAt(b.x + dv.x, b.y + dv.y);
    if (nb && (nb.type === 'furnace' || nb.type === 'chest' || nb.type === 'chestIn') && bldCanInsert(nb, item)) {
      bldInsert(nb, item); placed = true; break;
    }
  }
  if (!placed) {
    if (invTotal(b.buffer) >= CONFIG.MINER_BUFFER) return; // 満杯：待機（timerは保持）
    invAdd(b.buffer, item, 1);
  }
  b.timer = 0;
  const vi = idx(vein.x, vein.y);
  // 内部埋蔵量はORE_VEIN_MULT倍で保持しているため、1個産出するごとにその倍率ぶん消費する
  // （産出間隔・産出量・鉱脈が尽きるまでの時間は倍率導入前と変わらない）
  G.ore[vi] = Math.max(0, G.ore[vi] - CONFIG.ORE_VEIN_MULT);
  if (G.ore[vi] <= 0) G.tiles[vi] = T_PLAIN;
  markDirty();
}

function tickFurnace(b, dt) {
  if (!b.job) {
    for (const src of Object.keys(SMELT_OUT)) {
      const out = SMELT_OUT[src];
      if (invCount(b.input, src) > 0 && invCount(b.output, out) < CONFIG.FURNACE_OUT_CAP) {
        invAdd(b.input, src, -1);
        b.job = out; b.progress = 0;
        break;
      }
    }
  }
  if (b.job) {
    b.progress += dt;
    if (b.progress >= CONFIG.SMELT_TIME) {
      invAdd(b.output, b.job, 1);
      b.job = null; b.progress = 0;
      markDirty();
      sfxProduce();
    }
  }
}

// =====================================================================
// 更新ループ
// =====================================================================
let dirty = true;
function markDirty() { dirty = true; }
const fx = [];   // エフェクト（+1ポップなど）

// 所持アイテムの中で初めて入手した素材を素材図鑑に記録し、小さな通知を出す（レシピの段階解放のヒント）
function syncDiscovered() {
  for (const k of Object.keys(G.player.inv)) {
    if (G.player.inv[k] > 0 && !G.discovered[k]) {
      G.discovered[k] = true;
      if (ANALYSIS_LOGS[k]) {
        // 星晶石チェーンの初回入手は、通常の「発見！」より長く目立つ解析ログ演出に差し替える
        toast(ANALYSIS_LOGS[k], undefined, 5000, true);
        sfxAnalysisLog();
      } else {
        toast(`${ITEMS[k].name}を発見！新しいレシピのヒントが増えた`);
      }
    }
  }
}

function update(dt) {
  G.time += dt;
  const p = G.player;

  // --- 移動 ---
  if (p.path.length > 0) {
    const node = p.path[0];
    const dx = node.x - p.x, dy = node.y - p.y;
    const dist = Math.hypot(dx, dy);
    const step = CONFIG.MOVE_SPEED * moveSpeedMult() * dt;
    if (Math.abs(dx) > 0.01) p.facing = dx > 0 ? 1 : -1;
    if (dist <= step) {
      p.x = node.x; p.y = node.y;
      p.path.shift();
      p.battery = Math.max(0, p.battery - CONFIG.MOVE_COST * dist);
    } else {
      p.x += dx / dist * step; p.y += dy / dist * step;
      p.battery = Math.max(0, p.battery - CONFIG.MOVE_COST * step);
    }
    if (followCam) centerCamera(false);
    // バッテリー警告（最大容量に対する割合で判定。バッテリー拡張後も同じ％で警告）
    const lowThreshold = battMax() * (CONFIG.LOW_BATTERY / CONFIG.BATTERY_MAX);
    if (p.battery <= lowThreshold && !lowWarned && p.battery > 0) {
      lowWarned = true;
      toast('⚠️ バッテリー残りわずか！拠点に戻って充電しよう', 'warn');
      sfxLowBattery();
    }
    // バッテリー切れ → 強制帰還
    if (p.battery <= 0) forcedReturn();
  } else if (p.pending) {
    const a = p.pending; p.pending = null;
    if (playerDistTo(a.x, a.y) <= 1.6) {
      if (a.type === 'mine') tryMine(a.x, a.y);
      else if (a.type === 'open') { const b = buildingAt(a.x, a.y); if (b) openBuilding(b); }
    }
  }

  // --- 充電 ---
  const nearBase = Math.hypot(p.x - G.base.x, p.y - G.base.y) <= 1.8;
  const chargingEl = document.getElementById('charging');
  if (nearBase && p.battery < battMax()) {
    p.battery = Math.min(battMax(), p.battery + CONFIG.CHARGE_RATE * dt);
    chargingEl.style.display = 'inline';
    if (p.battery > battMax() * (CONFIG.LOW_BATTERY / CONFIG.BATTERY_MAX)) lowWarned = false;
  } else {
    chargingEl.style.display = 'none';
  }

  // --- 視界 ---
  const viewR = effectiveViewR();
  const px = Math.round(p.x), py = Math.round(p.y), R = Math.ceil(viewR);
  for (let dy = -R; dy <= R; dy++) for (let dx = -R; dx <= R; dx++) {
    const x = px + dx, y = py + dy;
    if (inMap(x, y) && dx * dx + dy * dy <= viewR * viewR) G.explored[idx(x, y)] = 1;
  }

  // --- 設備 ---
  tickMachines(dt);

  // --- エフェクト ---
  for (let i = fx.length - 1; i >= 0; i--) { fx[i].t += dt; if (fx[i].t > 1) fx.splice(i, 1); }

  // --- クエスト＆HUD ---
  updateFlags();
  if (dirty) { syncDiscovered(); renderInvBar(); renderQuest(); refreshOpenPanel(); dirty = false; }
  renderBattery();

  // --- オートセーブ ---
  autosaveT += dt;
  if (autosaveT >= CONFIG.AUTOSAVE_SEC) { autosaveT = 0; saveGame(); }
}

let lowWarned = false;
let autosaveT = 0;

function forcedReturn() {
  const p = G.player;
  p.path = []; p.pending = null;
  p.x = G.base.x; p.y = G.base.y + 1;
  // 軽ペナルティ：資源の一部を失う
  for (const k of Object.keys(p.inv)) {
    const lose = Math.floor(p.inv[k] * CONFIG.EMPTY_PENALTY);
    if (lose > 0) invAdd(p.inv, k, -lose);
  }
  centerCamera(true);
  toast('🔋 バッテリー切れ！緊急帰還した（資源の一部を失った…）', 'danger');
  sfxBatteryDead();
  lowWarned = false;
  markDirty();
}

function hasBuilding(type) { return Object.values(G.buildings).some(b => b.type === type); }
function buildingOfType(type) { return Object.values(G.buildings).find(b => b.type === type); }
function everHad(item) { return !!G.flags['had_' + item]; }
function totalEverMined() { return 0; } // gather判定は所持数で簡易化

  }
  for (const q of [...QUESTS, ...QUESTS_POST]) {
    if (!G.flags['q_' + q.id] && q.check()) { G.flags['q_' + q.id] = true; markDirty(); }

}
function renderQuest() {
