// =====================================================================
// 描画
// =====================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let cam = { x: 24, y: 25 };   // 画面中心のタイル座標
let tilePx = 40;              // ズーム（1タイルのピクセルサイズ）
let followCam = true;
let dpr = 1, vw = 0, vh = 0;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  vw = window.innerWidth; vh = window.innerHeight;
  canvas.width = vw * dpr; canvas.height = vh * dpr;
  canvas.style.width = vw + 'px'; canvas.style.height = vh + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);

function centerCamera(snap) {
  if (snap) { cam.x = G.player.x; cam.y = G.player.y; }
  else {
    cam.x += (G.player.x - cam.x) * 0.15;
    cam.y += (G.player.y - cam.y) * 0.15;
  }
}
function tileToScreen(x, y) {
  return [vw / 2 + (x - cam.x) * tilePx, vh / 2 + (y - cam.y) * tilePx];
}
function screenToTile(sx, sy) {
  return [Math.round(cam.x + (sx - vw / 2) / tilePx), Math.round(cam.y + (sy - vh / 2) / tilePx)];
}

function render() {
  ctx.fillStyle = '#04060e';
  ctx.fillRect(0, 0, vw, vh);
  // 宇宙背景の星
  for (let i = 0; i < 60; i++) {
    const sx = (hash2(i, 7, 1) * vw), sy = (hash2(i, 13, 2) * vh);
    ctx.globalAlpha = 0.25 + 0.5 * hash2(i, 3, 3);
    ctx.fillStyle = '#cfd8ff';
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  const s = tilePx;
  const x0 = Math.floor(cam.x - vw / 2 / s) - 1, x1 = Math.ceil(cam.x + vw / 2 / s) + 1;
  const y0 = Math.floor(cam.y - vh / 2 / s) - 1, y1 = Math.ceil(cam.y + vh / 2 / s) + 2;
  const p = G.player;

  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      if (!inMap(x, y)) continue;
      const [sx, sy] = tileToScreen(x - 0.5, y - 0.5);
      if (!G.explored[idx(x, y)]) continue;  // 未探索＝背景（霧）のまま
      drawTile(x, y, sx, sy, s);
    }
  }

  // 経路プレビュー
  ctx.fillStyle = 'rgba(94,230,200,.5)';
  for (const node of p.path) {
    const [sx, sy] = tileToScreen(node.x, node.y);
    ctx.beginPath(); ctx.arc(sx, sy, s * 0.08, 0, 7); ctx.fill();
  }

  // 設備（y順に描く）：ビューポート外の設備は描画しても見えないため、事前に画面内だけへ絞り込む
  // （設備数が増えるほど毎フレームdrawBuildingを呼ぶコストが線形に増えていたため、Phase4.6①で追加）
  const blds = Object.values(G.buildings).filter(b => b.x >= x0 && b.x <= x1 && b.y >= y0 && b.y <= y1 && G.explored[idx(b.x, b.y)]).sort((a, b) => a.y - b.y);
  let playerDrawn = false;
  for (const b of blds) {
    if (!playerDrawn && p.y < b.y) { drawPlayer(s); playerDrawn = true; }
    const [sx, sy] = tileToScreen(b.x - 0.5, b.y - 0.5);
    drawBuilding(b, sx, sy, s);
  }
  if (!playerDrawn) drawPlayer(s);

  // 現在視界外の霧（探索済みだが暗い）
  ctx.fillStyle = 'rgba(4,6,14,.55)';
  const viewR2 = effectiveViewR() * effectiveViewR();
  for (let y = y0; y <= y1; y++) for (let x = x0; x <= x1; x++) {
    if (!inMap(x, y) || !G.explored[idx(x, y)]) continue;
    const d2 = (x - p.x) ** 2 + (y - p.y) ** 2;
    if (d2 > viewR2) {
      const [sx, sy] = tileToScreen(x - 0.5, y - 0.5);
      ctx.fillRect(sx, sy, s + 1, s + 1);
    }
  }

  // 設置モードのガイド
  if (buildMode) {
    ctx.strokeStyle = 'rgba(94,230,200,.7)'; ctx.lineWidth = 2;
    if (buildMode === 'antenna') {
      const [bx, by] = tileToScreen(G.base.x, G.base.y);
      ctx.beginPath(); ctx.arc(bx, by, CONFIG.ANTENNA_RANGE * s, 0, 7); ctx.stroke();
    }
    // 発電機/中継塔の設置モード中は、ロボの足元に置いた場合の送電範囲の目安を表示する
    const previewRadius = { generator: CONFIG.GEN_RADIUS, advGenerator: CONFIG.ADV_GEN_RADIUS, relay: CONFIG.RELAY_RADIUS }[buildMode];
    if (previewRadius) {
      const [px, py] = tileToScreen(p.x, p.y);
      ctx.strokeStyle = 'rgba(255,217,75,.8)'; ctx.setLineDash([6, 5]);
      ctx.beginPath(); ctx.arc(px, py, previewRadius * s, 0, 7); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  // 選択中（パネルを開いている）の発電系設備の送電範囲を常時表示する
  if (openedPanel && openedPanel.kind === 'building') {
    const ob = openedPanel.b;
    const obRadius = { base: CONFIG.BASE_POWER_RADIUS, generator: CONFIG.GEN_RADIUS, advGenerator: CONFIG.ADV_GEN_RADIUS, relay: CONFIG.RELAY_RADIUS }[ob.type];
    if (obRadius && G.buildings[bkey(ob.x, ob.y)]) {
      const [obx, oby] = tileToScreen(ob.x, ob.y);
      ctx.strokeStyle = 'rgba(255,217,75,.85)'; ctx.lineWidth = 2; ctx.setLineDash([6, 5]);
      ctx.beginPath(); ctx.arc(obx, oby, obRadius * s, 0, 7); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // 向きプレビュー（設置確定前・タップで回転／✅で確定）：大きめの矢印で視認性を優先する
  if (placePreview) {
    const [psx, psy] = tileToScreen(placePreview.x - 0.5, placePreview.y - 0.5);
    ctx.fillStyle = 'rgba(94,230,200,.3)';
    ctx.fillRect(psx, psy, s, s);
    ctx.strokeStyle = 'rgba(94,230,200,.9)'; ctx.lineWidth = 2;
    ctx.strokeRect(psx + 1, psy + 1, s - 2, s - 2);
    ctx.save();
    ctx.translate(psx + s / 2, psy + s / 2);
    ctx.rotate(placePreview.dir * Math.PI / 2);
    const pu = s / 8;
    ctx.beginPath();
    ctx.moveTo(pu * 3, 0); ctx.lineTo(-pu * 1.2, -pu * 1.6); ctx.lineTo(-pu * 1.2, pu * 1.6);
    ctx.closePath();
    ctx.fillStyle = '#ffd94b';
    ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#1c2542'; ctx.stroke();
    ctx.restore();
  }

  // ベルト連続設置／連続撤去のドラッグプレビュー
  if (dragPath) {
    const rgb = dragPath.mode === 'belt' ? '94,230,200' : '255,107,129';
    for (const t of dragPath.tiles) {
      const [tsx, tsy] = tileToScreen(t.x - 0.5, t.y - 0.5);
      ctx.fillStyle = `rgba(${rgb},.35)`;
      ctx.fillRect(tsx, tsy, s, s);
      if (dragPath.mode === 'belt') {
        ctx.save();
        ctx.translate(tsx + s / 2, tsy + s / 2);
        ctx.rotate(t.dir * Math.PI / 2);
        ctx.fillStyle = 'rgba(94,230,200,.9)';
        const uu = s / 8;
        ctx.beginPath();
        ctx.moveTo(uu * 2, 0); ctx.lineTo(-uu * 0.8, -uu * 0.9); ctx.lineTo(-uu * 0.8, uu * 0.9);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }
  }

  // エフェクト（+1ポップ）
  ctx.textAlign = 'center'; ctx.font = 'bold 13px sans-serif';
  for (const f of fx) {
    const [sx, sy] = tileToScreen(f.x, f.y);
    ctx.globalAlpha = 1 - f.t;
    ctx.fillStyle = '#5ee6c8';
    ctx.fillText(f.txt, sx, sy - s * 0.5 - f.t * 22);
  }
  ctx.globalAlpha = 1;
}

// --- タイル描画（ドット絵風・コード生成） ---
function drawTile(x, y, sx, sy, s) {
  const t = G.tiles[idx(x, y)];
  const u = s / 8;
  // 地面ベース
  ctx.fillStyle = (x + y) % 2 ? '#191d33' : '#1b1f37';
  ctx.fillRect(sx, sy, s + 1, s + 1);
  // 地面の砂粒
  for (let i = 0; i < 3; i++) {
    const hx = hash2(x, y, i * 2), hy = hash2(x, y, i * 2 + 1);
    ctx.fillStyle = hash2(x, y, i + 9) > 0.5 ? '#232849' : '#141728';
    ctx.fillRect(sx + hx * (s - u), sy + hy * (s - u), u, u);
  }
  if (t === T_ROCK) {
    ctx.fillStyle = '#3c4560';
    ctx.fillRect(sx + u * 0.5, sy + u, s - u, s - u * 1.5);
    ctx.fillStyle = '#4d5878';
    ctx.fillRect(sx + u, sy + u * 1.5, s - u * 3, u * 2);
    ctx.fillStyle = '#2a3148';
    ctx.fillRect(sx + u * 1.5, sy + s - u * 2.5, s - u * 3, u * 1.5);
  } else if (ORE_ITEM[t]) {
    const colors = { [T_IRON]: ['#c9784a', '#8f4f2c'], [T_STONE]: ['#aab3bf', '#6f7885'], [T_CRYSTAL]: ['#5ee6c8', '#2a9d84'], [T_COPPER]: ['#bd4628', '#822c17'], [T_STARCRYSTAL]: ['#c9a7ff', '#6c3fb5'] };
    const [c1, c2] = colors[t];
    const rich = G.ore[idx(x, y)] / (CONFIG.ORE_MAX * CONFIG.ORE_VEIN_MULT);   // 残量で粒の数を変える（連打では見た目がほとんど変わらない）
    const lumps = Math.max(2, Math.round(2 + rich * 3));
    for (let i = 0; i < lumps; i++) {
      const hx = u + hash2(x, y, 20 + i) * (s - u * 3.5);
      const hy = u + hash2(x, y, 30 + i) * (s - u * 3.5);
      if (t === T_CRYSTAL || t === T_STARCRYSTAL) {
        // 結晶はひし形＋光
        ctx.fillStyle = c2;
        ctx.fillRect(sx + hx, sy + hy + u * 0.5, u * 1.6, u * 0.8);
        ctx.fillStyle = c1;
        ctx.fillRect(sx + hx + u * 0.35, sy + hy - u * 0.3, u * 0.9, u * 1.8);
      } else {
        ctx.fillStyle = c2;
        ctx.fillRect(sx + hx, sy + hy, u * 2, u * 1.6);
        ctx.fillStyle = c1;
        ctx.fillRect(sx + hx + u * 0.3, sy + hy + u * 0.25, u * 1.2, u * 0.8);
      }
    }
  }
}

// --- プレイヤー（探査ロボ）描画 ---
function drawPlayer(s) {
  const p = G.player;
  const [sx, sy] = tileToScreen(p.x - 0.5, p.y - 0.5);
  const u = s / 8;
  const bob = Math.sin(G.time * 6) * (p.path.length ? u * 0.4 : u * 0.12);
  ctx.save();
  ctx.translate(sx + s / 2, sy + s / 2 + bob);
  ctx.scale(p.facing, 1);
  // キャタピラ
  ctx.fillStyle = '#2a3148';
  ctx.fillRect(-u * 2.6, u * 1.6, u * 5.2, u * 1.4);
  ctx.fillStyle = '#454f6e';
  ctx.fillRect(-u * 2.2, u * 1.9, u * 0.8, u * 0.8);
  ctx.fillRect(-u * 0.4, u * 1.9, u * 0.8, u * 0.8);
  ctx.fillRect(u * 1.4, u * 1.9, u * 0.8, u * 0.8);
  // ボディ
  ctx.fillStyle = '#dde4f5';
  ctx.fillRect(-u * 2.2, -u * 1.6, u * 4.4, u * 3.2);
  ctx.fillStyle = '#b8c2dd';
  ctx.fillRect(-u * 2.2, u * 0.8, u * 4.4, u * 0.8);
  // バイザー（目）
  ctx.fillStyle = '#0a0f20';
  ctx.fillRect(-u * 1.4, -u * 1, u * 3.2, u * 1.3);
  ctx.fillStyle = '#5ee6c8';
  ctx.fillRect(u * 0.4, -u * 0.8, u * 1, u * 0.9);
  // アンテナ
  ctx.fillStyle = '#8f9bc4';
  ctx.fillRect(u * 1.4, -u * 2.8, u * 0.4, u * 1.2);
  ctx.fillStyle = '#ff6b81';
  ctx.fillRect(u * 1.2, -u * 3.3, u * 0.8, u * 0.7);
  ctx.restore();
}

// --- 設備描画 ---
function drawBuilding(b, sx, sy, s) {
  const u = s / 8;
  if (b.type === 'base') {
    // 着陸パッド＋ドーム
    ctx.fillStyle = '#2c3554';
    ctx.fillRect(sx - u, sy - u, s + u * 2, s + u * 2);
    ctx.fillStyle = '#3a4568';
    ctx.fillRect(sx, sy, s, s);
    ctx.fillStyle = '#5ee6c8';
    ctx.fillRect(sx + u * 0.5, sy + u * 0.5, u, u);
    ctx.fillRect(sx + s - u * 1.5, sy + u * 0.5, u, u);
    ctx.fillRect(sx + u * 0.5, sy + s - u * 1.5, u, u);
    ctx.fillRect(sx + s - u * 1.5, sy + s - u * 1.5, u, u);
    ctx.fillStyle = '#cdd8f5';
    ctx.fillRect(sx + u * 1.5, sy + u * 0.5, s - u * 3, s - u * 2.5);
    ctx.fillStyle = '#9fb2e5';
    ctx.fillRect(sx + u * 2, sy + u * 1.2, s - u * 4, u * 1.2);
    // ⚡マーク
    ctx.fillStyle = '#ffd94b';
    ctx.fillRect(sx + s / 2 - u * 0.4, sy + u * 3, u * 0.9, u * 1);
    ctx.fillRect(sx + s / 2 - u * 0.8, sy + u * 3.8, u * 0.9, u * 1);
  } else if (b.type === 'miner' || b.type === 'minerMk2') {
    const mk2 = b.type === 'minerMk2';
    const working = !b.depleted && invTotal(b.buffer) < CONFIG.MINER_BUFFER;
    const drill = working ? Math.abs(Math.sin(G.time * 8)) * u : 0;
    ctx.fillStyle = mk2 ? '#2f5a52' : '#7a4a22';
    ctx.fillRect(sx + u, sy + u * 2, s - u * 2, s - u * 3);
    ctx.fillStyle = mk2 ? '#3f9c86' : '#e8963c';
    ctx.fillRect(sx + u * 1.5, sy + u * 1.2, s - u * 3, u * 2);
    ctx.fillStyle = mk2 ? '#2a6d5e' : '#c2762a';
    ctx.fillRect(sx + u * 2, sy + u * 3.5, s - u * 4, u * 1.4);
    // ドリル
    ctx.fillStyle = '#cfd6de';
    ctx.fillRect(sx + s / 2 - u * 0.5, sy + u * 4 + drill, u, u * 2.2);
    ctx.fillStyle = '#8f99a8';
    ctx.fillRect(sx + s / 2 - u * 0.25, sy + u * 6 + drill, u * 0.5, u);
    // ランプ
    ctx.fillStyle = working ? '#5ee6c8' : '#ff6b81';
    ctx.fillRect(sx + s - u * 2.2, sy + u * 1.6, u * 0.9, u * 0.9);
    // 範囲内の鉱脈を掘りつくした → 停止表示
    if (b.depleted) {
      ctx.fillStyle = 'rgba(10,10,20,.5)';
      ctx.fillRect(sx, sy, s, s);
      ctx.fillStyle = '#ff6b81';
      ctx.font = `bold ${Math.round(u * 2.2)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('×', sx + s / 2, sy + s / 2 + u * 0.7);
    }
  } else if (b.type === 'furnace') {
    ctx.fillStyle = '#5a3a3a';
    ctx.fillRect(sx + u, sy + u, s - u * 2, s - u * 1.5);
    ctx.fillStyle = '#7a4f4a';
    ctx.fillRect(sx + u * 1.5, sy + u * 1.5, s - u * 3, u * 1.2);
    // 炉の口（稼働で明滅）
    const hot = b.job ? 0.7 + 0.3 * Math.sin(G.time * 10) : 0.15;
    ctx.fillStyle = `rgba(255,140,50,${hot})`;
    ctx.fillRect(sx + u * 2.5, sy + u * 4, s - u * 5, u * 2.2);
    ctx.fillStyle = `rgba(255,220,120,${hot * 0.8})`;
    ctx.fillRect(sx + u * 3.2, sy + u * 4.5, s - u * 6.4, u * 1.2);
    // 煙突
    ctx.fillStyle = '#463030';
    ctx.fillRect(sx + s - u * 2.6, sy - u * 0.5, u * 1.4, u * 2);
  } else if (b.type === 'chest' || b.type === 'chestIn') {
    const inTake = b.type === 'chestIn';
    ctx.fillStyle = inTake ? '#3a5568' : '#6e5230';
    ctx.fillRect(sx + u * 1.2, sy + u * 2.5, s - u * 2.4, s - u * 3.8);
    ctx.fillStyle = inTake ? '#4f7a8f' : '#8f6c40';
    ctx.fillRect(sx + u * 1.2, sy + u * 2.5, s - u * 2.4, u * 1.6);
    ctx.fillStyle = '#e8b34b';
    ctx.fillRect(sx + s / 2 - u * 0.5, sy + u * 3.6, u, u);
    if (inTake) {
      // 搬入口（上部の受け口）
      ctx.fillStyle = '#5ee6c8';
      ctx.fillRect(sx + u * 2, sy + u * 1.6, s - u * 4, u * 0.8);
    }
    const fill = invTotal(b.inv) / CONFIG.CHEST_CAP;
    if (fill > 0) {
      ctx.fillStyle = '#5ee6c8';
      ctx.fillRect(sx + u * 1.2, sy + s - u * 1.6, (s - u * 2.4) * Math.min(1, fill), u * 0.4);
    }
  } else if (b.type === 'workbench') {
    ctx.fillStyle = '#4a5568';
    ctx.fillRect(sx + u, sy + u * 3, s - u * 2, s - u * 4);
    ctx.fillStyle = '#5f6e88';
    ctx.fillRect(sx + u * 0.6, sy + u * 2.4, s - u * 1.2, u * 1.4);
    // 工具
    ctx.fillStyle = '#e8b34b';
    ctx.fillRect(sx + u * 1.6, sy + u * 1.4, u * 1.6, u * 0.7);
    ctx.fillStyle = '#7fb2ff';
    ctx.fillRect(sx + s - u * 3.4, sy + u * 1.2, u * 0.8, u * 1.1);
  } else if (b.type === 'antenna') {
    // マスト（タイルの上にはみ出して描く）
    ctx.fillStyle = '#39415f';
    ctx.fillRect(sx + u * 1.5, sy + s - u * 2, s - u * 3, u * 1.5);
    ctx.fillStyle = '#8f9bc4';
    ctx.fillRect(sx + s / 2 - u * 0.5, sy - s * 0.8, u, s * 1.6);
    ctx.fillRect(sx + s / 2 - u * 2, sy - s * 0.3, u * 4, u * 0.5);
    // パラボラ
    ctx.fillStyle = '#cfd8ff';
    ctx.beginPath();
    ctx.arc(sx + s / 2, sy - s * 0.8, u * 2.2, Math.PI * 0.9, Math.PI * 2.1);
    ctx.fill();
    ctx.fillStyle = '#ff6b81';
    ctx.fillRect(sx + s / 2 - u * 0.4, sy - s * 0.95, u * 0.8, u * 0.8);
    // 起動中は信号リング
    if (b.active) {
      const r = (G.time % 1.5) / 1.5;
      ctx.strokeStyle = `rgba(94,230,200,${1 - r})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx + s / 2, sy - s * 0.8, u * 2 + r * s * 1.2, 0, 7);
      ctx.stroke();
    }
  } else if (b.type === 'assembler') {
    ctx.fillStyle = '#3a4568';
    ctx.fillRect(sx + u, sy + u, s - u * 2, s - u * 2);
    ctx.fillStyle = '#2a3148';
    ctx.fillRect(sx + u * 1.5, sy + u * 1.5, s - u * 3, s - u * 3);
    const spin = b.job ? G.time * 4 : 0;
    ctx.save();
    ctx.translate(sx + s / 2, sy + s / 2);
    ctx.rotate(spin);
    ctx.fillStyle = b.job ? '#7fb2ff' : '#4a5568';
    for (let i = 0; i < 4; i++) {
      ctx.save(); ctx.rotate(i * Math.PI / 2);
      ctx.fillRect(-u * 0.5, -u * 2.4, u, u * 1.1);
      ctx.restore();
    }
    ctx.fillStyle = '#1c2542';
    ctx.beginPath(); ctx.arc(0, 0, u * 1.1, 0, 7); ctx.fill();
    ctx.restore();
    if (!b.recipeOut) {
      ctx.fillStyle = '#ff6b81';
      ctx.font = `bold ${Math.round(u * 1.8)}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillText('？', sx + s / 2, sy + s - u * 0.8);
    }
  } else if (b.type === 'lab') {
    ctx.fillStyle = '#2a3148';
    ctx.fillRect(sx + u, sy + u * 3, s - u * 2, s - u * 4);
    ctx.fillStyle = '#3a4568';
    ctx.fillRect(sx + u * 0.6, sy + u * 2.4, s - u * 1.2, u * 1.2);
    // フラスコ
    const active = !!(b.currentTech && b.job);
    const bubble = active ? 0.6 + 0.4 * Math.sin(G.time * 6) : 0.25;
    ctx.fillStyle = '#1c2542';
    ctx.beginPath();
    ctx.moveTo(sx + s / 2 - u * 0.8, sy + u * 4);
    ctx.lineTo(sx + s / 2 - u * 1.6, sy + s - u * 1.5);
    ctx.lineTo(sx + s / 2 + u * 1.6, sy + s - u * 1.5);
    ctx.lineTo(sx + s / 2 + u * 0.8, sy + u * 4);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = `rgba(167,139,250,${bubble})`;
    ctx.beginPath();
    ctx.moveTo(sx + s / 2 - u * 1.3, sy + s - u * 2);
    ctx.lineTo(sx + s / 2 - u * 1.6, sy + s - u * 1.5);
    ctx.lineTo(sx + s / 2 + u * 1.6, sy + s - u * 1.5);
    ctx.lineTo(sx + s / 2 + u * 1.3, sy + s - u * 2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#3a4568';
    ctx.fillRect(sx + s / 2 - u, sy + u * 3, u * 2, u * 1.2);
    if (!b.currentTech) {
      ctx.fillStyle = '#8f9bc4';
      ctx.font = `bold ${Math.round(u * 1.6)}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillText('？', sx + s / 2, sy + u * 2);
    }
  } else if (b.type === 'gate') {
    ctx.fillStyle = '#4a5568';
    ctx.fillRect(sx + u * 0.5, sy, u * 1.2, s);
    ctx.fillRect(sx + s - u * 1.7, sy, u * 1.2, s);
    if (b.repaired) {
      ctx.fillStyle = '#5ee6c8';
      ctx.fillRect(sx + u * 0.5, sy + u * 3.5, u * 1.2, u * 1.2);
      ctx.fillRect(sx + s - u * 1.7, sy + u * 3.5, u * 1.2, u * 1.2);
    } else {
      ctx.fillStyle = '#ff6b81';
      ctx.fillRect(sx + u * 1.5, sy + u * 2.5, s - u * 3, u * 2);
      ctx.fillStyle = '#c94a5e';
      ctx.fillRect(sx + u * 1.5, sy + u * 4.6, s - u * 3, u);
    }
  } else if (b.type === 'beacon') {
    ctx.fillStyle = '#39415f';
    ctx.fillRect(sx + u * 1.2, sy + s - u * 2, s - u * 2.4, u * 1.5);
    ctx.fillStyle = '#9b87c0';
    ctx.fillRect(sx + s / 2 - u * 0.6, sy - s * 0.9, u * 1.2, s * 1.7);
    ctx.fillStyle = '#ffd94b';
    ctx.beginPath(); ctx.arc(sx + s / 2, sy - s * 0.95, u * 1.4, 0, 7); ctx.fill();
    if (b.active) {
      const r = (G.time * 1.4) % (Math.PI * 2);
      ctx.strokeStyle = 'rgba(155,135,192,.85)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx + s / 2, sy - s * 0.95);
      ctx.lineTo(sx + s / 2 + Math.cos(r) * s * 1.3, sy - s * 0.95 + Math.sin(r) * s * 1.3);
      ctx.stroke();
      const r2 = (G.time % 1.5) / 1.5;
      ctx.strokeStyle = `rgba(155,135,192,${1 - r2})`;
      ctx.beginPath(); ctx.arc(sx + s / 2, sy - s * 0.95, u * 1.6 + r2 * s * 1.1, 0, 7); ctx.stroke();
    }
  } else if (b.type === 'belt' || b.type === 'fastBelt') {
    const ang = b.dir * Math.PI / 2;
    const fast = b.type === 'fastBelt';
    ctx.save();
    ctx.translate(sx + s / 2, sy + s / 2);
    ctx.rotate(ang);
    ctx.fillStyle = '#20263f';
    ctx.fillRect(-s * 0.45, -s * 0.45, s * 0.9, s * 0.9);
    ctx.fillStyle = '#39415f';
    for (let i = -1; i <= 1; i++) ctx.fillRect(-u * 0.5, i * u * 1.8 - u * 0.4, u, u * 0.8);
    ctx.fillStyle = fast ? '#ffd94b' : '#5ee6c8';
    ctx.lineWidth = Math.max(1, u * 0.18); ctx.strokeStyle = '#0a0f20';
    ctx.beginPath();
    ctx.moveTo(u * 2.4, 0); ctx.lineTo(u * 0.6, -u * 1.1); ctx.lineTo(u * 0.6, u * 1.1);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    if (fast) {
      ctx.beginPath();
      ctx.moveTo(u * 3.4, 0); ctx.lineTo(u * 1.6, -u * 1.1); ctx.lineTo(u * 1.6, u * 1.1);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    ctx.restore();
    if (b.item) {
      const dv = DIR_VEC[b.dir];
      const cx = sx + s / 2 + dv.x * (b.progress - 0.5) * s * 0.7;
      const cy = sy + s / 2 + dv.y * (b.progress - 0.5) * s * 0.7;
      ctx.fillStyle = ITEMS[b.item].color;
      ctx.fillRect(cx - u * 0.9, cy - u * 0.9, u * 1.8, u * 1.8);
    }
  } else if (b.type === 'splitter') {
    const ang = b.dir * Math.PI / 2;
    ctx.save();
    ctx.translate(sx + s / 2, sy + s / 2);
    ctx.rotate(ang);
    ctx.fillStyle = '#20263f';
    ctx.fillRect(-s * 0.45, -s * 0.45, s * 0.9, s * 0.9);
    ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = Math.max(1.5, u * 0.35);
    ctx.beginPath();
    ctx.moveTo(-u * 2, 0); ctx.lineTo(0, 0); ctx.lineTo(u * 2, -u * 2);
    ctx.moveTo(0, 0); ctx.lineTo(u * 2, u * 0.2);
    ctx.stroke();
    ctx.fillStyle = '#a78bfa';
    ctx.beginPath(); ctx.arc(0, 0, u * 0.7, 0, 7); ctx.fill();
    ctx.restore();
    if (b.item) {
      ctx.fillStyle = ITEMS[b.item].color;
      ctx.fillRect(sx + s / 2 - u * 0.9, sy + s / 2 - u * 0.9, u * 1.8, u * 1.8);
    }
  } else if (b.type === 'arm' || b.type === 'fastArm' || b.type === 'filterArm') {
    const ang = b.dir * Math.PI / 2;
    const pulse = a_pulse(b);
    ctx.save();
    ctx.translate(sx + s / 2, sy + s / 2);
    ctx.rotate(ang);
    ctx.fillStyle = '#3a4568';
    ctx.fillRect(-u * 2.2, -u * 2.2, u * 4.4, u * 4.4);
    ctx.fillStyle = pulse ? '#5ee6c8' : (b.type === 'fastArm' ? '#ffd94b' : (b.type === 'filterArm' ? '#f472b6' : '#7fb2ff'));
    ctx.fillRect(-u * 0.6, -u * 0.6, u * 3.4, u * 1.2);
    ctx.fillStyle = '#e8b34b';
    ctx.beginPath(); ctx.arc(u * 2.8, 0, u * 0.9, 0, 7); ctx.fill();
    // 向きを一目で分かるように、先端に矢じり（アウトライン付き）を追加
    ctx.lineWidth = Math.max(1, u * 0.18); ctx.strokeStyle = '#0a0f20';
    ctx.fillStyle = '#e8ecff';
    ctx.beginPath();
    ctx.moveTo(u * 3.7, 0); ctx.lineTo(u * 2.2, -u * 1.1); ctx.lineTo(u * 2.2, u * 1.1);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#1c2542';
    ctx.beginPath(); ctx.arc(0, 0, u * 0.9, 0, 7); ctx.fill();
    ctx.restore();
    if (b.type === 'filterArm' && !b.filterItem) {
      ctx.fillStyle = '#ff6b81';
      ctx.font = `bold ${Math.round(u * 1.6)}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillText('？', sx + s / 2, sy + u * 2);
    }
  } else if (b.type === 'generator' || b.type === 'advGenerator') {
    const adv = b.type === 'advGenerator';
    ctx.fillStyle = adv ? '#3a2f57' : '#2f3f57';
    ctx.fillRect(sx + u, sy + u * 1.5, s - u * 2, s - u * 2.5);
    ctx.fillStyle = adv ? '#9b6bd6' : '#5ee6c8';
    ctx.fillRect(sx + u * 1.6, sy + u * 2, s - u * 3.2, u * 1.4);
    ctx.fillStyle = b.active ? '#ffd94b' : '#4a5568';
    ctx.beginPath(); ctx.arc(sx + s / 2, sy + s - u * 2, u * 0.9, 0, 7); ctx.fill();
    if (b.active) {
      const r = (G.time % 2) / 2;
      ctx.strokeStyle = `rgba(${adv ? '155,107,214' : '94,230,200'},${0.5 - r * 0.5})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx + s / 2, sy + s / 2, u * 3 + r * s * 0.6, 0, 7); ctx.stroke();
    }
  } else if (b.type === 'relay') {
    const net = powerNetworks.find(n => n.nodes.includes(b));
    const live = !!(net && net.supply > 0);
    ctx.fillStyle = '#39415f';
    ctx.fillRect(sx + s / 2 - u * 0.5, sy + u, u, s - u * 1.5);
    ctx.strokeStyle = live ? '#5ee6c8' : '#4a5568';
    ctx.lineWidth = Math.max(1.2, u * 0.25);
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(sx + s / 2, sy + u * 1.4, u * (1 + i * 0.9), Math.PI * 1.15, Math.PI * 1.85);
      ctx.stroke();
    }
    ctx.fillStyle = live ? '#5ee6c8' : '#8f9bc4';
    ctx.beginPath(); ctx.arc(sx + s / 2, sy + u * 1.4, u * 0.6, 0, 7); ctx.fill();
  } else if (b.type === 'battery') {
    const pct = Math.max(0, Math.min(1, (b.charge || 0) / CONFIG.BATTERY_CAPACITY));
    const bx = sx + u * 1.5, by = sy + u * 1.4, bw = s - u * 3, bh = s - u * 2.2;
    ctx.fillStyle = '#2f3f57';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#4a5568';
    ctx.fillRect(sx + s / 2 - u * 0.6, sy + u * 0.7, u * 1.2, u * 0.8); // 端子
    // 充電量ゲージ：本体の枠内にパディングを取り、下から満ちる
    const padX = u * 0.5, padY = u * 0.5;
    const gw = bw - padX * 2, gh = (bh - padY * 2) * pct;
    ctx.fillStyle = pct > 0.2 ? '#5ee6c8' : '#ff6b81';
    if (gh > 0) ctx.fillRect(bx + padX, by + bh - padY - gh, gw, gh);
    ctx.strokeStyle = '#1c2542'; ctx.lineWidth = Math.max(1, u * 0.15);
    ctx.strokeRect(bx, by, bw, bh);
  }
  // 電力切れ（停電）の視覚表示：暗くして⚡に斜線
  if (CONFIG.POWER_USE[b.type] !== undefined && b.powered === false) {
    ctx.fillStyle = 'rgba(10,10,20,.55)';
    ctx.fillRect(sx, sy, s, s);
    ctx.fillStyle = '#ffb347';
    ctx.font = `bold ${Math.round(u * 1.8)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText('⚡', sx + s / 2, sy + u * 2);
    ctx.strokeStyle = '#ff6b81'; ctx.lineWidth = Math.max(1.5, u * 0.3);
    ctx.beginPath(); ctx.moveTo(sx + u * 0.8, sy + s - u * 0.8); ctx.lineTo(sx + s - u * 0.8, sy + u * 0.8); ctx.stroke();
  }
  if (['chest', 'chestIn', 'miner', 'minerMk2', 'furnace', 'assembler', 'lab', 'generator', 'advGenerator'].includes(b.type)) {
    drawInvOverlay(b, sx, sy, s);
  }
}
function a_pulse(a) { return (a.timer || 0) / armInterval(a) > 0.75; }

// タイル上に主要アイテムのミニアイコン＋個数を常時オーバーレイ表示（開かなくても中身が分かる）
function drawInvOverlay(b, sx, sy, s) {
  if (s < 28) return; // ズームが引きすぎたら省略
  const merged = bldOverlayInv(b);
  const entries = Object.entries(merged).filter(([, v]) => v > 0).sort((a, c) => c[1] - a[1]);
  if (!entries.length) return;
  const shown = entries.slice(0, 2);
  const u = s / 8;
  const badgeW = u * 3.4, badgeH = u * 1.7, gap = u * 0.3;
  ctx.font = `bold ${Math.max(9, Math.round(u * 1.1))}px sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  shown.forEach(([item, count], i) => {
    const bx = sx + s - badgeW - gap;
    const by = sy + gap + i * (badgeH + gap * 0.6);
    ctx.fillStyle = 'rgba(10,15,32,.82)';
    ctx.fillRect(bx, by, badgeW, badgeH);
    ctx.fillStyle = ITEMS[item].color;
    ctx.fillRect(bx + gap, by + badgeH / 2 - u * 0.5, u, u);
    ctx.fillStyle = '#e8ecff';
    ctx.fillText(String(count), bx + gap + u * 1.3, by + badgeH / 2 + 1);
  });
}

// =====================================================================
// 入力（タップ／ドラッグ／ズーム）
// =====================================================================
// ベルト連続設置／連続撤去用：a→bを4方向ステップで繋ぐ（斜めはx優先→y優先で分解）
function tilesBetween(a, b) {
  const path = [];
  let x = a.x, y = a.y;
  while (x !== b.x) { x += Math.sign(b.x - x); path.push({ x, y }); }
  while (y !== b.y) { y += Math.sign(b.y - y); path.push({ x, y }); }
  return path;
}
function vecToDir(dx, dy) { return DIR_VEC.findIndex(d => d.x === dx && d.y === dy); }
function paintModeActive() { return buildMode === 'belt' || buildMode === 'fastBelt' || eraseMode; }

// ドラッグで拾った経路に沿ってベルト(または高速ベルト)を連続設置。岩・鉱脈・既存設備・資材切れで停止
function commitBeltDrag(tiles, beltType) {
  let placed = 0;
  for (const t of tiles) {
    if (!G.explored[idx(t.x, t.y)]) break;
    if (Math.round(G.player.x) === t.x && Math.round(G.player.y) === t.y) break;
    if (buildingAt(t.x, t.y)) break;
    const tt = G.tiles[idx(t.x, t.y)];
    if (tt === T_ROCK || ORE_ITEM[tt]) break;
    if (!canAfford(CONFIG.COSTS[beltType])) break;
    payCost(CONFIG.COSTS[beltType]);
    G.buildings[bkey(t.x, t.y)] = { type: beltType, x: t.x, y: t.y, dir: t.dir, item: null, progress: 0 };
    pushPlacementHistory({ type: beltType, x: t.x, y: t.y });   // 1本ずつ積む→「元に戻す」で1本ずつさかのぼれる
    placed++;
  }
  if (placed > 0) { updateBuildModeUI(); markDirty(); scheduleSave(); }
  toast(placed > 0 ? `${BUILDINGS[beltType].name}を${placed}個設置した` : '設置できなかった（岩・鉱脈・設備・資材不足）', placed > 0 ? undefined : 'warn');
}
// ドラッグで拾った経路上の設備をまとめて撤去（拠点・ゲートはスキップして継続）
function commitEraseDrag(tiles) {
  let removed = 0;
  for (const t of tiles) {
    const b = buildingAt(t.x, t.y);
    if (!b || b.type === 'base' || b.type === 'gate') continue;
    removeBuilding(b);
    removed++;
  }
  toast(removed > 0 ? `${removed}個の設備を撤去した` : '撤去できる設備がなかった', removed > 0 ? undefined : 'warn');
}

let ptr = null;
let dragPath = null;   // {mode:'belt'|'erase', beltType, tiles:[{x,y,dir}]} 連続設置/撤去のプレビュー
// 同時タッチ数を数えて1本指/2本指を判定する（設置モード中でも2本指ドラッグで見渡せるように）
const touches = new Map();   // pointerId -> {x,y}
let panState = null;         // 2本指カメラパン中 {cx,cy,mx,my}
function touchMidpoint() {
  const pts = Array.from(touches.values());
  return { x: pts.reduce((s, p) => s + p.x, 0) / pts.length, y: pts.reduce((s, p) => s + p.y, 0) / pts.length };
}
canvas.addEventListener('pointerdown', e => {
  // 実機（特にPWAのスタンドアロン表示）では、指が画面端に近づく等でcanvas範囲外に
  // 出た瞬間pointermove/pointerupがcanvasに届かなくなることがある。touches/ptr/dragPathの
  // 掃除がpointerup/pointercancel任せになっているため、それが届かないと後始末されずに
  // 残り続け、プレイを続けるほどタップ誤判定が蓄積していく（「時間経過で重くなる」の一因）。
  // ポインタキャプチャで、指がどこに動いてもこのcanvasへイベントが届くことを保証する（Phase4.9）。
  try { canvas.setPointerCapture(e.pointerId); } catch (err) { /* 対応環境差は無視 */ }
  touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (touches.size >= 2) {
    // 2本指目が触れた瞬間：進行中の設置/撤去ドラッグは確定させずに中断し、カメラパンへ切り替える
    ptr = null; dragPath = null;
    const mid = touchMidpoint();
    panState = { cx: cam.x, cy: cam.y, mx: mid.x, my: mid.y };
    followCam = false;
    return;
  }
  const paint = paintModeActive();
  ptr = { id: e.pointerId, sx: e.clientX, sy: e.clientY, cx: cam.x, cy: cam.y, drag: false, paint };
  if (paint) {
    const [tx, ty] = screenToTile(e.clientX, e.clientY);
    const isBeltMode = buildMode === 'belt' || buildMode === 'fastBelt';
    dragPath = { mode: isBeltMode ? 'belt' : 'erase', beltType: buildMode, tiles: [{ x: tx, y: ty, dir: 0 }] };
  }
});
canvas.addEventListener('pointermove', e => {
  if (touches.has(e.pointerId)) touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (panState) {
    if (touches.size < 2) return;   // 1本指に減った後は次のpointerupでパン終了するまで何もしない
    const mid = touchMidpoint();
    cam.x = panState.cx - (mid.x - panState.mx) / tilePx;
    cam.y = panState.cy - (mid.y - panState.my) / tilePx;
    return;
  }
  if (!ptr || e.pointerId !== ptr.id) return;
  const dx = e.clientX - ptr.sx, dy = e.clientY - ptr.sy;
  if (!ptr.drag && Math.hypot(dx, dy) > 12) ptr.drag = true;
  if (!ptr.drag) return;
  if (ptr.paint) {
    const [tx, ty] = screenToTile(e.clientX, e.clientY);
    const tiles = dragPath.tiles;
    const last = tiles[tiles.length - 1];
    if (tx !== last.x || ty !== last.y) {
      for (const s of tilesBetween(last, { x: tx, y: ty })) {
        const prev = tiles[tiles.length - 1];
        const dir = vecToDir(s.x - prev.x, s.y - prev.y);
        if (dir < 0) continue;
        prev.dir = dir; // 直前タイルの向きを、進んだ方向で確定
        tiles.push({ x: s.x, y: s.y, dir: 0 });
      }
    }
  } else if (!buildMode) {
    // 探索中（設置モードでない）だけ1本指ドラッグでカメラを動かす。設置モード中の非ペイント型
    // （採掘機・アーム・組立機等）は、指のわずかなブレがこの閾値を超えて「ドラッグ」と誤判定
    // されると、タップが無反応になった上カメラだけ密かにずれる不具合があったため、
    // 設置モード中はここでカメラを動かさないようにした（Phase4.8）。カメラを動かしたい時は
    // Phase4.4で追加した2本指ドラッグを使う
    followCam = false;
    cam.x = ptr.cx - dx / tilePx;
    cam.y = ptr.cy - dy / tilePx;
  }
});
canvas.addEventListener('pointerup', e => {
  try { canvas.releasePointerCapture(e.pointerId); } catch (err) { /* 対応環境差は無視 */ }
  touches.delete(e.pointerId);
  if (panState) {
    if (touches.size === 0) panState = null;   // 両方の指が離れたら2本指パンを終了（設置・タップは発生させない）
    return;
  }
  if (!ptr || e.pointerId !== ptr.id) return;
  if (ptr.paint) {
    if (!ptr.drag) {
      const [tx, ty] = screenToTile(e.clientX, e.clientY);
      onTapTile(tx, ty);
    } else if (dragPath) {
      if (dragPath.mode === 'belt') commitBeltDrag(dragPath.tiles, dragPath.beltType);
      else commitEraseDrag(dragPath.tiles);
    }
  } else if (buildMode || !ptr.drag) {
    // 設置モード中の非ペイント型は、指がブレて「ドラッグ」と誤判定されていても
    // 常に指を離した位置をタップとして確定する（カメラを動かしていないので、離した位置が
    // そのまま意図した設置場所になる。Phase4.8）
    const [tx, ty] = screenToTile(e.clientX, e.clientY);
    onTapTile(tx, ty);
  }
  ptr = null; dragPath = null;
});
canvas.addEventListener('pointercancel', e => {
  try { canvas.releasePointerCapture(e.pointerId); } catch (err) { /* 対応環境差は無視 */ }
  touches.delete(e.pointerId);
  if (touches.size === 0) panState = null;
  ptr = null; dragPath = null;
});

function updateBuildModeUI() {
  const active = !!buildMode || eraseMode;
  const previewing = !!placePreview;
  document.getElementById('btn-build').style.display = (active || previewing) ? 'none' : 'block';
  document.getElementById('btn-erase').style.display = (active || previewing) ? 'none' : 'block';
  document.getElementById('btn-rotate-preview').style.display = previewing ? 'block' : 'none';
  document.getElementById('btn-confirm-preview').style.display = previewing ? 'block' : 'none';
  // 誤設置に気づいた時、設置モードを抜けずにその場で取り消せるボタン。押すたびに1件ずつさかのぼれる（Phase4.6③）
  const undoBtn = document.getElementById('btn-undo-place');
  undoBtn.style.display = (buildMode && !previewing && placementHistory.length) ? 'block' : 'none';
  undoBtn.textContent = placementHistory.length > 1 ? `↩️ 元に戻す（${placementHistory.length}）` : '↩️ 元に戻す';
  const cancelBtn = document.getElementById('cancel-build');
  cancelBtn.style.display = (active || previewing) ? 'block' : 'none';
  cancelBtn.textContent = eraseMode ? '✕ 撤去終了' : '✕ 設置モードを終了';
  if (buildMode && !previewing) toast(BUILDINGS[buildMode].name + 'を置く場所をタップ' + (buildMode === 'belt' ? '（ドラッグで連続設置）' : ''));
  else if (previewing) toast('向きを確認 → 同じ場所タップか🔄で回転、✅で設置確定');
}

// --- 建設メニュー ---
// 建設メニューのカテゴリ分け：役割ベース（生産/搬送/電力/特殊）。設備数が増えて一覧性が
// 落ちてきたため、序盤導線ベース（基本/自動化/電力/進行）から役割ベースへ変更した（Phase4.15①）。
// カテゴリ内は「通常版→上位版」の並びで隣接配置し、シリーズを見つけやすくする
const BUILD_CATEGORIES = [
  { id: 'produce',   name: '⛏️ 生産', items: ['miner', 'minerMk2', 'furnace', 'workbench', 'assembler', 'lab'] },
  { id: 'transport', name: '➡️ 搬送', items: ['belt', 'fastBelt', 'arm', 'fastArm', 'filterArm', 'splitter', 'chestIn', 'chest'] },
  { id: 'power',     name: '⚡ 電力', items: ['generator', 'advGenerator', 'relay', 'battery'] },
  { id: 'special',   name: '📡 特殊', items: ['antenna', 'beacon'] },
];
// 研究で解禁される設備の対応表。未解禁の間は建設メニューに出さない（Phase3.1のレシピ段階解放と同じ考え方）
const BUILDING_RESEARCH_GATE = {
  splitter: 'splitter', chestIn: 'inputChest', fastBelt: 'fastBelt',
  minerMk2: 'minerMk2', fastArm: 'fastArm', filterArm: 'filterArm',
  advGenerator: 'gate3Blueprint', battery: 'battery',
};
function buildingUnlocked(type) {
  const gate = BUILDING_RESEARCH_GATE[type];
  if (gate) return !!G.research[gate];
  if (type === 'beacon') return G.cleared;
  return true;
}
// NEWバッジ：研究等で解禁されてからまだ建設メニューで見ていない設備にだけ出す（Phase4.15①）。
// 最初から使える設備（研究ゲートが無いもの）は「新しく解禁された」わけではないので対象外
function isNewBuilding(type) {
  const gated = !!BUILDING_RESEARCH_GATE[type] || type === 'beacon';
  return gated && buildingUnlocked(type) && !G.buildMenuSeen[type];
}
let buildMenuTab = null;
function openBuildMenu(keep) {
  if (!buildMenuTab) buildMenuTab = BUILD_CATEGORIES[0].id;
  const tabsHtml = BUILD_CATEGORIES.map(c => {
    const n = c.items.filter(buildingUnlocked).length;
    return `<button class="btn small ${buildMenuTab === c.id ? 'primary' : ''}" data-tab="${c.id}" style="margin:2px 4px 2px 0">${c.name}（${n}）</button>`;
  }).join('');
  const cat = BUILD_CATEGORIES.find(c => c.id === buildMenuTab) || BUILD_CATEGORIES[0];
  const list = cat.items.filter(buildingUnlocked);
  const rows = list.length ? list.map(t => {
    const ok = canAfford(CONFIG.COSTS[t]);
    const badges = (isNewBuilding(t) ? '<span class="bm-badge new">NEW</span>' : '') + (ok ? '<span class="bm-badge ok">作成可能</span>' : '');
    return `<div class="row">
      <div class="grow bm-tap" data-detail="${t}"><b>${BUILDINGS[t].icon} ${BUILDINGS[t].name}</b>${badges}<br>
        <span class="cost">${costText(CONFIG.COSTS[t])}</span><br>
        <span class="cost">${BUILDINGS[t].short}</span></div>
      <button class="btn ${ok ? 'primary' : ''}" data-build="${t}" ${ok ? '' : 'disabled'}>設置</button>
    </div>`;
  }).join('') : '<div class="row"><span class="cost">このカテゴリにはまだ何もない（研究で解禁されるものがあります）</span></div>';
  showPanel(`<h2>🔨 建設メニュー<button class="close-x">✕</button></h2>
    <div style="display:flex;flex-wrap:wrap;margin-bottom:8px">${tabsHtml}</div>
    ${rows}`);
  openedPanel = { kind: 'build' };
  panelEl.querySelectorAll('[data-tab]').forEach(btn => {
    btn.onclick = () => { buildMenuTab = btn.dataset.tab; openBuildMenu(); };
  });
  panelEl.querySelectorAll('[data-detail]').forEach(el => {
    el.onclick = () => openBuildingDetail(el.dataset.detail);
  });
  panelEl.querySelectorAll('[data-build]').forEach(btn => {
    btn.onclick = () => { buildMode = btn.dataset.build; placePreview = null; placementHistory = []; closePanel(); updateBuildModeUI(); };
  });
  // このタブで表示した解禁済み設備は既読にする（次回以降NEWバッジを出さない）
  let seenChanged = false;
  for (const t of list) if (isNewBuilding(t)) { G.buildMenuSeen[t] = true; seenChanged = true; }
  if (seenChanged) scheduleSave();
}
// 建設メニューのカードをタップした時の詳細ポップアップ：仕様説明・コストを確認してそのまま設置できる（Phase4.15①）
function openBuildingDetail(type) {
  const b = BUILDINGS[type];
  const ok = canAfford(CONFIG.COSTS[type]);
  showPanel(`<h2>${b.icon} ${b.name}<button class="close-x">✕</button></h2>
    <div class="row"><div class="grow">${b.desc}</div></div>
    <div class="row"><div class="grow">必要素材：${costText(CONFIG.COSTS[type])}</div></div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn" id="bd-back" style="flex:1">🔨 メニューへ戻る</button>
      <button class="btn primary" id="bd-build" style="flex:1" ${ok ? '' : 'disabled'}>設置する</button>
    </div>`);
  openedPanel = null;
  panelEl.querySelector('#bd-back').onclick = () => openBuildMenu();
  panelEl.querySelector('#bd-build').onclick = () => {
    buildMode = type; placePreview = null; placementHistory = []; closePanel(); updateBuildModeUI();
  };
}

// --- 設備パネル ---
function openBuilding(b, keep) {
  openedPanel = { kind: 'building', b };
  const inv = G.player.inv;
  let html = '';
  const removeBtn = `<div style="margin-top:14px"><button class="btn danger" id="pb-remove">🗑 撤去する（材料は返却）</button></div>`;
  // その場アップグレード（Phase4.15②）：miner/belt/armのみ対象。研究で解禁済み、かつ対象タイプに
  // upgradesToがある場合だけボタンを出す（minerMk2/fastBelt/fastArm自身はupgradesToが無いため出ない）
  const upgradeTarget = BUILDINGS[b.type] && BUILDINGS[b.type].upgradesTo;
  const upgradeBtn = canUpgrade(b) ? (() => {
    const cost = CONFIG.UPGRADE_COSTS[upgradeTarget];
    const ok = canAfford(cost);
    return `<div style="margin-top:10px"><button class="btn ${ok ? 'primary' : ''}" id="pb-upgrade" ${ok ? '' : 'disabled'}>⬆️ ${BUILDINGS[upgradeTarget].name}にアップグレード（${costText(cost)}）</button></div>`;
  })() : '';

  if (b.type === 'base') {
    html = `<h2>🏠 拠点<button class="close-x">✕</button></h2>
      <div class="row"><div class="grow">近くにいるとバッテリーが充電される。<br>
      <span class="cost">バッテリーが切れるとここへ強制帰還（資源の一部を失う）。</span></div></div>
      <div class="row"><div class="grow">⚡ 拠点電源：燃料切れなしの常時稼働電源<br>
      <span class="cost">出力${CONFIG.BASE_POWER_OUTPUT}・送電半径${CONFIG.BASE_POWER_RADIUS}マス（無線）。範囲外や消費が上回る分は小型発電機・無線中継塔で補おう。</span></div></div>`;
  }
  else if (b.type === 'miner' || b.type === 'minerMk2') {
    const veins = minerOreTiles(b);
    const bufTotal = invTotal(b.buffer);
    const R = minerRadius(b);
    const veinSummary = veins.length
      ? veins.map(v => ITEMS[v.item].name + '（残' + Math.ceil(G.ore[idx(v.x, v.y)] / CONFIG.ORE_VEIN_MULT) + '）').join('　')
      : null;
    html = `<h2>${b.type === 'minerMk2' ? '⛏️ 採掘機Mk2' : '⛏️ 採掘機'}（中心${R * 2 + 1}×${R * 2 + 1}）<button class="close-x">✕</button></h2>
      <div class="row"><div class="grow">${veinSummary ? '採掘中：' + veinSummary : '⚠️ 範囲内の鉱脈をすべて掘りつくした（停止中）'}</div></div>
      <div class="row"><div class="grow">内部バッファ：${bufTotal}/${CONFIG.MINER_BUFFER}<br>
        <span class="cost">${Object.entries(b.buffer).map(([k, v]) => ITEMS[k].name + '×' + v).join('　') || 'からっぽ'}</span></div>
        <button class="btn primary" id="pb-collect" ${bufTotal ? '' : 'disabled'}>回収する</button></div>
      <div class="row"><span class="cost">隣接の保管箱・精錬炉へ自動受け渡し。アームで離れた設備にも搬送できるよ</span></div>` + upgradeBtn + removeBtn;
  }
  else if (b.type === 'furnace') {
    const prog = b.job ? Math.round(b.progress / CONFIG.SMELT_TIME * 100) : 0;
    const inRow = (item) => {
      const have = invCount(inv, item), cur = invCount(b.input, item);
      return `<div class="row"><div class="grow">${ITEMS[item].name}（炉内 ${cur}/${CONFIG.FURNACE_IN_CAP}・所持 ${have}）</div>
        <button class="btn small" data-in="${item}" data-n="1" ${have ? '' : 'disabled'}>入れる</button>
        <button class="btn small" data-in="${item}" data-n="10" ${have ? '' : 'disabled'}>×10</button></div>`;
    };
    const outTotal = invTotal(b.output);
    html = `<h2>🔥 精錬炉<button class="close-x">✕</button></h2>

      ${inRow('ironOre')}${inRow('stone')}${inRow('copperOre')}

  else if (b.type === 'assembler') {

    const prog = b.job ? Math.round(b.progress / CONFIG.ASSEMBLER_TIME * 100) : 0;
    const recipeRows = visibleRecipes().map(({ r, vis }) => {
      if (vis === 'partial') {
        return `<div class="row" style="opacity:.6">

      }
      return `<div class="row">

        <div class="grow"><b>${r.name}</b>×${r.outN}<br><span class="cost">材料：${recipeMaterialsText(r, vis)}</span></div>

      </div>`;
    }).join('');
    const inRows = recipe ? Object.keys(recipe.in).map(item => {
      const have = invCount(inv, item), cur = invCount(b.input, item);

    const outTotal2 = invTotal(b.output);
    html = `<h2>⚙️ 組立機<button class="close-x">✕</button></h2>

  else if (b.type === 'lab') {
    const curTech = b.currentTech ? researchById(b.currentTech) : null;

      const rows = CONFIG.RESEARCH.filter(t => t.tier === tier).map(t => {

    }).join('') : '';
    html = `<h2>🔬 研究所<button class="close-x">✕</button></h2>

    const bu = CONFIG.BATTERY_UPGRADE_COST;
    const buOk = canAfford(bu) && !G.player.batteryUpgraded;
    const buRow = `<h3>アップグレード</h3>
      <div class="row">
        <span class="dot" style="background:#ffd94b"></span>
        <div class="grow"><b>🔋 バッテリー拡張</b>（1回のみ）<br><span class="cost">${costText(bu)}</span><br>

      <div style="margin-top:10px"><button class="btn primary" id="pb-rotate" style="width:100%;padding:12px;">🔄 90度回転</button></div>` + removeBtn;

  else if (b.type === 'gate') {

    const have = invCount(inv, fuel), cur = invCount(b.input, fuel);
    html = `<h2>${adv ? '🔋 上位発電機' : '🔋 小型発電機'}<button class="close-x">✕</button></h2>
      <div class="row"><div class="grow">${b.active ? '⚡ 発電中' : '停止中（燃料切れ）'}<br>
      <span class="cost">出力${output}・送電半径${radius}マス（無線。届く範囲の設備が動く）</span></div></div>
      <div class="row"><div class="grow">${ITEMS[fuel].name}（燃料 ${cur}/${cap}・所持 ${have}）</div>
        <button class="btn small" data-in="${fuel}" data-n="1" ${have ? '' : 'disabled'}>入れる</button>
        <button class="btn small" data-in="${fuel}" data-n="10" ${have ? '' : 'disabled'}>×10</button></div>` + removeBtn;
  }
  else if (b.type === 'relay') {
    const net = powerNetworks.find(n => n.nodes.includes(b));
    const live = !!(net && net.supply > 0);
    html = `<h2>📶 無線中継塔<button class="close-x">✕</button></h2>
      <div class="row"><div class="grow">${live ? '⚡ 発電機とつながっている（中継中）' : '⚠️ まだどの発電機ともつながっていない'}<br>
      <span class="cost">中継半径：${CONFIG.RELAY_RADIUS}マス。電力は消費しない（純粋な中継専用）。</span></div></div>` + removeBtn;
  }
  else if (b.type === 'battery') {
    const charge = b.charge || 0;
    const pct = Math.round(charge / CONFIG.BATTERY_CAPACITY * 100);
    const net = powerNetworks.find(n => n.nodes.includes(b));
    const status = !net ? '電力網に未接続'
      : net.supply >= net.demand ? (charge >= CONFIG.BATTERY_CAPACITY ? '⚡ 満充電' : '⚡ 余剰電力を充電中')
      : (charge > 0 ? '🔋 不足分を放電中' : '⚠️ 充電なし・供給不足を補えない');
    html = `<h2>🔌 蓄電池<button class="close-x">✕</button></h2>
      <div class="row"><div class="grow">${status}<br>
      <span class="cost">容量${CONFIG.BATTERY_CAPACITY}・充電速度${CONFIG.BATTERY_CHARGE_RATE}/秒・放電速度${CONFIG.BATTERY_DISCHARGE_RATE}/秒</span></div></div>
      <div class="row"><div class="grow">充電量：${Math.round(charge)}/${CONFIG.BATTERY_CAPACITY}（${pct}%）</div></div>
      <div class="progress"><i style="width:${pct}%;background:var(--accent)"></i></div>` + removeBtn;
  }
  if (CONFIG.POWER_USE[b.type] !== undefined) {
    const statusRow = `<div class="row"><div class="grow" style="color:${b.powered ? 'var(--accent)' : 'var(--danger)'}">${b.powered ? '⚡ 電力供給中' : '⚡ 停電中（電力が届いていない、または不足している）'}</div></div>`;
    html = html.replace(/(<\/h2>)/, `$1${statusRow}`);
  }
  showPanel(html);
  openedPanel = { kind: 'building', b };

  // ボタン配線
  panelEl.querySelector('#pb-remove')?.addEventListener('click', () => removeBuilding(b));
  panelEl.querySelector('#pb-collect')?.addEventListener('click', () => {
    for (const [k, v] of Object.entries(b.buffer)) invAdd(inv, k, v);
    b.buffer = {}; markDirty(); scheduleSave();
  });
  panelEl.querySelector('#pb-takeout')?.addEventListener('click', () => {
    for (const [k, v] of Object.entries(b.output)) invAdd(inv, k, v);
    b.output = {}; markDirty(); scheduleSave();
  });
  panelEl.querySelectorAll('[data-in]').forEach(btn => btn.addEventListener('click', () => {
    const item = btn.dataset.in;
    const cap = b.type === 'assembler' ? CONFIG.ASSEMBLER_IN_CAP : b.type === 'lab' ? CONFIG.LAB_IN_CAP
      : b.type === 'advGenerator' ? CONFIG.ADV_GEN_FUEL_CAP : b.type === 'generator' ? CONFIG.GEN_FUEL_CAP : CONFIG.FURNACE_IN_CAP;
    const n = Math.min(+btn.dataset.n, invCount(inv, item), cap - invCount(b.input, item));
    if (n > 0) { invAdd(inv, item, -n); invAdd(b.input, item, n); markDirty(); scheduleSave(); }
  }));
  panelEl.querySelectorAll('[data-lab-tech]').forEach(btn => btn.addEventListener('click', () => {
    const techId = btn.dataset.labTech;
    if (b.currentTech === techId) return;
    // 研究対象を切り替える時は投入済みパックをプレイヤーへ返却する（グローバル進捗は他の研究所と共有のため保持）
    for (const [k, v] of Object.entries(b.input)) invAdd(inv, k, v);
    b.input = {}; b.job = null; b.progress = 0;
    b.currentTech = techId;
    markDirty(); scheduleSave();
    openBuilding(b);
  }));
  panelEl.querySelectorAll('[data-assembler-recipe]').forEach(btn => btn.addEventListener('click', () => {
    const newRecipe = btn.dataset.assemblerRecipe;
    if (b.recipeOut === newRecipe) return;
    // レシピ変更時は投入済みの材料をプレイヤーへ返却（違う材料が機内に残らないように）
    for (const [k, v] of Object.entries(b.input)) invAdd(inv, k, v);
    b.input = {}; b.job = null; b.progress = 0;
    b.recipeOut = newRecipe;
    markDirty(); scheduleSave();
    openBuilding(b);
  }));
  const chestMove = (k, n, toChest) => {
    if (toChest) {
      n = Math.min(n, invCount(inv, k), CONFIG.CHEST_CAP - invTotal(b.inv));
      if (n > 0) { invAdd(inv, k, -n); invAdd(b.inv, k, n); }
    } else {
      n = Math.min(n, invCount(b.inv, k));
      if (n > 0) { invAdd(b.inv, k, -n); invAdd(inv, k, n); }
    }
    markDirty(); scheduleSave();
  };
  panelEl.querySelectorAll('[data-put]').forEach(btn => btn.addEventListener('click', () => chestMove(btn.dataset.put, 1, true)));
  panelEl.querySelectorAll('[data-put10]').forEach(btn => btn.addEventListener('click', () => chestMove(btn.dataset.put10, 10, true)));
  panelEl.querySelectorAll('[data-take]').forEach(btn => btn.addEventListener('click', () => chestMove(btn.dataset.take, 1, false)));
  panelEl.querySelectorAll('[data-take10]').forEach(btn => btn.addEventListener('click', () => chestMove(btn.dataset.take10, 10, false)));
  const craft = (ri, times) => {
    const r = CONFIG.RECIPES[ri];
    let made = 0;
    for (let i = 0; i < times; i++) {
      if (!canAfford(r.in)) break;
      payCost(r.in);
      invAdd(inv, r.out, r.outN);
      made++;
    }
    if (made > 0) sfxCraft();
    markDirty(); scheduleSave();
  };
  panelEl.querySelectorAll('[data-craft]').forEach(btn => btn.addEventListener('click', () => craft(+btn.dataset.craft, 1)));
  panelEl.querySelectorAll('[data-craft5]').forEach(btn => btn.addEventListener('click', () => craft(+btn.dataset.craft5, 5)));
  panelEl.querySelector('#pb-upgrade')?.addEventListener('click', () => {
    upgradeBuilding(b);
    openBuilding(b);
  });
  panelEl.querySelector('#pb-activate')?.addEventListener('click', () => activateAntenna(b));
  panelEl.querySelector('#pb-rotate')?.addEventListener('click', () => {
    b.dir = (b.dir + 1) % 4;
    markDirty(); scheduleSave();
    openBuilding(b);
  });
  panelEl.querySelectorAll('[data-filter-item]').forEach(btn => btn.addEventListener('click', () => {
    b.filterItem = btn.dataset.filterItem;
    markDirty(); scheduleSave();
    openBuilding(b);
  }));
  panelEl.querySelector('#pb-battery-upgrade')?.addEventListener('click', () => {
    if (G.player.batteryUpgraded || !canAfford(CONFIG.BATTERY_UPGRADE_COST)) return;
    payCost(CONFIG.BATTERY_UPGRADE_COST);
    const oldMax = battMax();
    G.player.batteryUpgraded = true;
    G.player.battery = G.player.battery / oldMax * battMax();
    toast('バッテリーを拡張した！最大容量+' + Math.round((CONFIG.BATTERY_UPGRADE_MULT - 1) * 100) + '%');
    markDirty(); scheduleSave();
    openBuilding(b);
  });
  panelEl.querySelectorAll('[data-ponta]').forEach(btn => btn.addEventListener('click', () => {
    const id = btn.dataset.ponta;
    if (hasPontaUpgrade(id) || !canAfford(CONFIG.PONTA_UPGRADE_COST)) return;
    payCost(CONFIG.PONTA_UPGRADE_COST);
    const oldMax = battMax();   // battery強化の場合、現在値を新最大値の比率へ引き継ぐ（拡張と同じ作法）
    G.player.ponTaUpgrades = G.player.ponTaUpgrades || {};
    G.player.ponTaUpgrades[id] = true;
    if (id === 'battery') G.player.battery = G.player.battery / oldMax * battMax();
    const u = CONFIG.PONTA_UPGRADES.find(x => x.id === id);
    toast(`🌟 ぽん太強化：${u.name}を獲得！`);
    sfxResearchDone();
    markDirty(); scheduleSave();
    openBuilding(b);
  }));
  panelEl.querySelector('#pb-repair')?.addEventListener('click', () => {
    if (b.requiresTech && !G.research[b.requiresTech]) return;
    const cost = gateRepairCost(b);
    if (!canAfford(cost)) return;
    payCost(cost);
    G.flags[gateFlagKey(b)] = true; // ゲート自体は撤去するため、修理済みの記録は先にフラグへ残す
    const border = BORDERS.find(bd => bd.gateX === b.x);
    delete G.buildings[bkey(b.x, b.y)]; // 修理後はタイルを完全な平地に戻す（ベルト設置・通行が可能に）
    if (G.research.gateWidening && border) applyGateWideningFor(border); // 研究済みなら即座に3マス幅で開通
    toast('ゲートを修理した！奥へ進める（ベルトも通せるようになった）');
    closePanel(); markDirty(); scheduleSave();
  });
  panelEl.querySelector('#pb-beacon-activate')?.addEventListener('click', () => activateBeacon(b));
}

// --- 設定 ---
function openSettings() {
  showPanel(`<h2>⚙️ 設定<button class="close-x">✕</button></h2>
    <div class="row"><div class="grow">効果音<br><span class="cost">採掘・設置・研究完了などの短い操作音</span></div>
      <button class="btn ${sfxEnabled ? 'primary' : ''}" id="st-sfx-toggle">${sfxEnabled ? 'ON' : 'OFF'}</button></div>
    <div class="row"><div class="grow">セーブデータ（JSON）</div>
      <button class="btn" id="st-export">書き出す</button>
      <button class="btn primary" id="st-copy">📋 コピー</button>
      <button class="btn" id="st-import">読み込む</button></div>
    <textarea id="st-json" placeholder="「書き出す」でここにJSONが出ます。読み込みはここに貼り付けて「読み込む」"></textarea>
    <div class="row" style="margin-top:8px"><div class="grow">手動セーブ</div><button class="btn" id="st-save">セーブ</button></div>
    <div class="row"><div class="grow">最初からやり直す<br><span class="cost">セーブデータを消して新しい星へ</span></div>
      <button class="btn danger" id="st-reset">リセット</button></div>
    <div class="row"><div class="grow">📖 解析ログ<br><span class="cost">星晶石チェーンで見つけた解析ログを見返せる</span></div>
      <button class="btn" id="st-analysis-log">見る</button></div>
    <h3>あそびかた</h3>
    <div class="row"><span class="cost">
      ・タップで移動／鉱脈タップで採掘（近くにいるとき）<br>
      ・ドラッグでスクロール、＋－でズーム、📍でロボの位置へ<br>
      ・バッテリーに注意！拠点の近くで自動充電<br>
      ・🔨建設から設備を置いて、アンテナ起動でクリア！</span></div>`);
  openedPanel = null;
  panelEl.querySelector('#st-sfx-toggle').onclick = () => {
    setSfxEnabled(!sfxEnabled);
    if (sfxEnabled) sfxCraft();   // ONにした直後に確認用の短い音を鳴らす
    openSettings();
  };
  panelEl.querySelector('#st-analysis-log').onclick = () => openAnalysisLog();
  panelEl.querySelector('#st-export').onclick = () => {
    panelEl.querySelector('#st-json').value = JSON.stringify(makeSave());
    toast('書き出した！📋コピーボタンか、全選択してコピーしてね');
  };
  panelEl.querySelector('#st-copy').onclick = async () => {
    const ta = panelEl.querySelector('#st-json');
    ta.value = JSON.stringify(makeSave());   // タップ時点の最新セーブを書き出してからコピーする
    try {
      if (!navigator.clipboard || !navigator.clipboard.writeText) throw new Error('no clipboard api');
      await navigator.clipboard.writeText(ta.value);
      toast('📋 コピーした！');
    } catch (e) {
      // Clipboard APIが無い/失敗する環境向けフォールバック：全選択してexecCommandを試す。それも失敗したら選択状態だけ残す
      ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
      let ok = false;
      try { ok = document.execCommand('copy'); } catch (e2) { ok = false; }
      toast(ok ? '📋 コピーした！' : '自動コピーできなかった…全選択したので手動でコピーしてね', ok ? undefined : 'warn');
    }
  };
  panelEl.querySelector('#st-import').onclick = () => {
    try {
      const raw = JSON.parse(panelEl.querySelector('#st-json').value);
      const result = raw && typeof raw.v === 'number' ? migrateToLatest(raw) : null;
      if (!result) throw new Error('bad');
      applySave(result.data);
      localStorage.setItem(SAVE_KEY, JSON.stringify(result.data));
      closePanel();
      toast('セーブデータを読み込んだ！');
    } catch { toast('読み込み失敗…JSONを確認してね', 'danger'); }
  };
  panelEl.querySelector('#st-save').onclick = () => { saveGame(); toast('セーブした！'); };
  panelEl.querySelector('#st-reset').onclick = () => {
    if (confirm('セーブデータを消して最初からやり直す？')) {
      suppressSave = true;
      localStorage.removeItem(SAVE_KEY);
      // location.reload()はブラウザ/PWAのキャッシュから古いページを再利用してしまうことがあるため、
      // クエリを変えて別URL扱いにし確実にネットワークから読み直させる
      location.href = location.pathname + '?reset=' + Date.now();
    }
  };
}

function drawClearArt(variant) {
  const c = document.getElementById('clear-canvas');
  const x = c.getContext('2d');
  const W = c.width, H = c.height;
  // 夜空グラデ
  const grad = x.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050716'); grad.addColorStop(1, '#1a1440');
  x.fillStyle = grad; x.fillRect(0, 0, W, H);
  // 星
  for (let i = 0; i < 90; i++) {
    x.globalAlpha = 0.3 + hash2(i, 5, 8) * 0.7;
    x.fillStyle = i % 7 === 0 ? '#ffd94b' : '#dfe8ff';
    x.fillRect(hash2(i, 1, 4) * W, hash2(i, 2, 6) * H * 0.72, 2, 2);
  }
  x.globalAlpha = 1;
  // 遠くの惑星
  x.fillStyle = '#7a5aa8'; x.beginPath(); x.arc(W * 0.82, H * 0.2, 26, 0, 7); x.fill();
  x.fillStyle = '#9377c2'; x.beginPath(); x.arc(W * 0.79, H * 0.18, 20, 0, 7); x.fill();
  // 地面
  x.fillStyle = '#241f45'; x.beginPath();
  x.ellipse(W / 2, H * 1.25, W * 0.85, H * 0.55, 0, 0, 7); x.fill();
  // アンテナ
  const ax = W * 0.5, ay = H * 0.78;
  x.fillStyle = '#39415f'; x.fillRect(ax - 22, ay - 8, 44, 14);
  x.fillStyle = '#8f9bc4'; x.fillRect(ax - 4, ay - 90, 8, 86);
  x.fillRect(ax - 20, ay - 50, 40, 5);
  x.fillStyle = '#cfd8ff'; x.beginPath(); x.arc(ax, ay - 92, 22, Math.PI * 0.95, Math.PI * 2.05); x.fill();
  x.fillStyle = '#ff6b81'; x.fillRect(ax - 4, ay - 104, 8, 8);
  // 信号
  const glow = variant === 'beacon' ? '155,135,192' : '94,230,200';
  for (let i = 1; i <= 3; i++) {
    x.strokeStyle = `rgba(${glow},${1 - i * 0.25})`;
    x.lineWidth = 3;
    x.beginPath(); x.arc(ax, ay - 100, 14 + i * 16, Math.PI * 1.15, Math.PI * 1.85); x.stroke();
  }
  // ロボ（ばんざい）
  const rx = W * 0.3, ry = H * 0.8, u = 5;
  x.fillStyle = '#2a3148'; x.fillRect(rx - u * 2.6, ry + u * 1.6, u * 5.2, u * 1.4);
  x.fillStyle = '#dde4f5'; x.fillRect(rx - u * 2.2, ry - u * 1.6, u * 4.4, u * 3.2);
  x.fillStyle = '#0a0f20'; x.fillRect(rx - u * 1.4, ry - u, u * 2.8, u * 1.3);
  x.fillStyle = '#5ee6c8'; x.fillRect(rx - u * 0.9, ry - u * 0.8, u * 0.8, u * 0.9);
  x.fillRect(rx + u * 0.3, ry - u * 0.8, u * 0.8, u * 0.9);
  x.fillStyle = '#dde4f5';  // 両腕ばんざい
  x.fillRect(rx - u * 3.4, ry - u * 3.4, u, u * 2.4);
  x.fillRect(rx + u * 2.4, ry - u * 3.4, u, u * 2.4);
  x.fillStyle = '#ff6b81'; x.fillRect(rx - u * 0.4, ry - u * 3.4, u * 0.8, u * 0.7);
  x.fillStyle = '#8f9bc4'; x.fillRect(rx - u * 0.2, ry - u * 2.8, u * 0.4, u * 1.2);
}

// =====================================================================
// トースト
// =====================================================================
let toastTimer = null;
let toastLockUntil = 0;   // この時刻までは、priority指定のトーストが表示中なので他の通知で上書きしない
function toast(msg, kind, durMs, priority) {
  if (!priority && Date.now() < toastLockUntil) return;   // 連打中の他のトースト（掘りつくした等）に上書きされないようにする
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = kind || '';
  el.style.display = 'block';
  clearTimeout(toastTimer);
  const dur = durMs || 2600;
  toastLockUntil = priority ? Date.now() + dur : 0;
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, dur);
}

// =====================================================================
// セーブ／ロード
// =====================================================================
function makeSave() {
  return {
    v: SAVE_VERSION,
    seed: CONFIG.SEED,
    tiles: Array.from(G.tiles).join(''),
    ore: Array.from(G.ore),
    explored: Array.from(G.explored).join(''),
    buildings: Object.values(G.buildings),
    player: {
      x: G.player.x, y: G.player.y, battery: G.player.battery, inv: G.player.inv,
      batteryUpgraded: !!G.player.batteryUpgraded,
      ponTaUpgrades: G.player.ponTaUpgrades || {},
    },
    flags: G.flags,
    research: G.research,
    researchProgress: G.researchProgress,
    discovered: G.discovered,
    buildMenuSeen: G.buildMenuSeen || {},
    cleared: G.cleared,
    beaconCleared: !!G.beaconCleared,
    time: G.time,
    lastSeen: G.lastSeen,
  };
}
// リセット時にtrueにすると、reload()が発火させるpagehide/visibilitychangeの自動セーブを止める
// （これが無いと、削除した直後のreloadでオートセーブが復活させてしまいリセットが効かなくなる）
let suppressSave = false;
function saveGame() {
  if (suppressSave) return;
  G.lastSeen = Date.now();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(makeSave())); } catch (e) { /* 容量オーバー等は無視 */ }
}
// 建設タップ・撤去・パネル操作のたびに毎回同期でJSON.stringify(セーブ全体)+localStorage書き込みを
// 行っていたため、設備数が多い終盤セーブほどそのタップ自身の処理内でメインスレッドを長く塞ぎ、
// 直後に連打された次のタップの処理を遅らせていた（「反応しない→連打→少し待つと置ける」の一因）。
// 短時間に何度呼ばれても最後の1回だけ、今のフレームの外（後続のタイマー）でまとめて保存する。
// 定期オートセーブ(CONFIG.AUTOSAVE_SEC)が別途動いているため、データ消失の猶予は従来と同程度に収まる（Phase4.10）。
const SAVE_DEBOUNCE_MS = 1200;
let saveDebounceTimer = null;
function scheduleSave() {
  if (suppressSave) return;
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(saveGame, SAVE_DEBOUNCE_MS);
}
function applySave(d) {
  for (let i = 0; i < d.tiles.length; i++) G.tiles[i] = +d.tiles[i];
  G.ore.set(d.ore);
  for (let i = 0; i < d.explored.length; i++) G.explored[i] = +d.explored[i];
  G.buildings = {};
  for (const b of d.buildings) G.buildings[bkey(b.x, b.y)] = b;
  const base = d.buildings.find(b => b.type === 'base');
  if (base) { G.base.x = base.x; G.base.y = base.y; }
  // 旧仕様（修理済みゲートが設備として残ったまま）からの互換：タイルを平地として開放する
  for (const oldGate of Object.values(G.buildings).filter(b => b.type === 'gate' && b.repaired)) {
    delete G.buildings[bkey(oldGate.x, oldGate.y)];
    (d.flags || (d.flags = {}))[gateFlagKey(oldGate)] = true;
  }
  G.player.x = d.player.x; G.player.y = d.player.y;
  G.player.battery = d.player.battery;
  G.player.inv = d.player.inv || {};
  G.player.batteryUpgraded = !!d.player.batteryUpgraded;
  G.player.ponTaUpgrades = d.player.ponTaUpgrades || {};
  G.player.path = []; G.player.pending = null;
  G.flags = d.flags || {};
  G.research = d.research || {};
  G.researchProgress = d.researchProgress || {};
  G.discovered = d.discovered || {};
  G.buildMenuSeen = d.buildMenuSeen || null; // nullなら旧セーブ→下のbackfillで補完
  G.cleared = !!d.cleared;
  G.beaconCleared = !!d.beaconCleared;
  G.time = d.time || 0;
  G.lastSeen = d.lastSeen || Date.now();
  backfillHadStoneBlock();
  backfillBuildMenuSeen();
  markPowerTopologyDirty();
  buildMode = null;
  centerCamera(true);
  markDirty();
}
// 既存セーブ向け：石ブロックのクエスト追加より前から遊んでいたプレイヤーが、今さら
// 「石ブロックを作ろう」を出されないように、既に入手済みとみなせる証拠があればhad_stoneBlockを補完する
function backfillHadStoneBlock() {
  if (G.flags.had_stoneBlock) return;
  if (invCount(G.player.inv, 'stoneBlock') > 0) { G.flags.had_stoneBlock = true; return; }
  if (G.flags.q_gate || G.flags.q_gate2) { G.flags.had_stoneBlock = true; return; } // ゲート修理はstoneBlockを消費する
  for (const b of Object.values(G.buildings)) {
    if (CONFIG.COSTS[b.type] && CONFIG.COSTS[b.type].stoneBlock) { G.flags.had_stoneBlock = true; return; }
    for (const src of [b.buffer, b.input, b.output, b.inv]) {
      if (src && src.stoneBlock > 0) { G.flags.had_stoneBlock = true; return; }
    }
  }
}
// 既存セーブ向け：buildMenuSeenが無い（Phase4.15より前の）セーブでは、既に解禁済みの設備を
// 今さら「NEW」扱いにしないよう、現時点で解禁済みのものは最初から既読とみなす
function backfillBuildMenuSeen() {
  if (G.buildMenuSeen) return;
  G.buildMenuSeen = {};
  for (const t of Object.keys(BUILDING_RESEARCH_GATE)) if (buildingUnlocked(t)) G.buildMenuSeen[t] = true;
  if (buildingUnlocked('beacon')) G.buildMenuSeen.beacon = true;
}

// Phase1（v1・48×48単一エリア）のセーブを新マップ形式（v2・第1＋第2エリア）へ移行
// 注意：v2形式の幅は現在のグローバルW（3エリア分）とは異なるため、
// 必ずこの関数専用のローカル幅・idxを使うこと（グローバルなidx()/Wを使うと座標がずれる）
function migrateV1(d) {
  const OLD_N = 48;
  const V2_W = AREA_W * 2 + BORDER_W; // v2形式（第1＋境界＋第2エリア）の幅
  const v2idx = (x, y) => y * V2_W + x;
  const newTiles = new Uint8Array(V2_W * MAP_H).fill(T_ROCK);
  const newOre = new Uint16Array(V2_W * MAP_H);
  const newExplored = new Uint8Array(V2_W * MAP_H);
  for (let y = 0; y < OLD_N; y++) for (let x = 0; x < OLD_N; x++) {
    const oi = y * OLD_N + x, ni = v2idx(x, y);   // 第1エリアはx0=0のまま座標が一致する
    newTiles[ni] = +d.tiles[oi];
    newOre[ni] = d.ore[oi];
    newExplored[ni] = +d.explored[oi];
  }
  const rng = mulberry32((d.seed || CONFIG.SEED) + 777);
  const area2 = genAreaLocal(rng, { hasBase: false, copper: true, rockClusters: 24 });
  for (let y = 0; y < MAP_H; y++) for (let x = 0; x < AREA_W; x++) {
    const ni = v2idx(AREA_W + BORDER_W + x, y), li = y * AREA_W + x;
    newTiles[ni] = area2.tiles[li];
    newOre[ni] = area2.ore[li];
  }
  // v2形式の境界を彫る（ゲート1つ分のみ。現行のcarveBorderAndGate()はv3の2ゲート分＆v3幅前提のため使えない）
  for (let y = 0; y < MAP_H; y++) for (let x = AREA_W; x < AREA_W + BORDER_W; x++) {
    newTiles[v2idx(x, y)] = T_ROCK; newOre[v2idx(x, y)] = 0;
  }
  for (let x = AREA_W - 1; x <= AREA_W + BORDER_W; x++) {
    newTiles[v2idx(x, GATE_Y)] = T_PLAIN; newOre[v2idx(x, GATE_Y)] = 0;
  }

  return {
    v: 2,
    seed: d.seed,
    tiles: Array.from(newTiles).join(''),
    ore: Array.from(newOre),
    explored: Array.from(newExplored).join(''),
    buildings: [...d.buildings, { type: 'gate', x: GATE_X, y: GATE_Y, repaired: false }],
    player: { x: d.player.x, y: d.player.y, battery: d.player.battery, inv: d.player.inv || {}, batteryUpgraded: false },
    flags: d.flags || {},
    cleared: !!d.cleared,
    beaconCleared: false,
    time: d.time || 0,
    lastSeen: Date.now(),
  };
}

// Phase2（v2・第1＋第2エリア）のセーブを新マップ形式（v3・第3エリア＋ゲート図面）へ移行
function migrateV2(d) {
  const OLD_W = AREA_W * 2 + BORDER_W; // v2時点のマップ幅（第1＋境界＋第2エリア）
  const OLD_H = MAP_H;
  const newTiles = new Uint8Array(W * H).fill(T_ROCK);
  const newOre = new Uint16Array(W * H);
  const newExplored = new Uint8Array(W * H);
  for (let y = 0; y < OLD_H; y++) for (let x = 0; x < OLD_W; x++) {
    const oi = y * OLD_W + x, ni = idx(x, y);   // 第1・第2エリアの座標はそのまま（右側に追加するだけ）
    newTiles[ni] = +d.tiles[oi];
    newOre[ni] = d.ore[oi];
    newExplored[ni] = +d.explored[oi];
  }
  const rng = mulberry32((d.seed || CONFIG.SEED) + 1234);
  const area3 = genAreaLocal(rng, { hasBase: false, copper: true, copperVeins: 14, crystalVeins: 12, ironVeins: 3, stoneVeins: 3, rockClusters: 18 });
  for (let y = 0; y < MAP_H; y++) for (let x = 0; x < AREA_W; x++) {
    const ni = idx(AREA_W * 2 + BORDER_W * 2 + x, y), li = y * AREA_W + x;
    newTiles[ni] = area3.tiles[li];
    newOre[ni] = area3.ore[li];
  }
  carveBorderAndGate(newTiles, newOre);

  return {
    v: 3,
    seed: d.seed,
    tiles: Array.from(newTiles).join(''),
    ore: Array.from(newOre),
    explored: Array.from(newExplored).join(''),
    buildings: [...d.buildings, { type: 'gate', x: GATE2_X, y: GATE_Y, repaired: false, requiresTech: 'gate2Blueprint' }],
    player: d.player,
    flags: d.flags || {},
    research: d.research || {},
    cleared: !!d.cleared,
    beaconCleared: !!d.beaconCleared,
    time: d.time || 0,
    lastSeen: d.lastSeen || Date.now(),
  };
}

// Phase3.1（v3・レシピ段階解放なし）のセーブに素材図鑑（discovered）を追加する（v4）。
// 「所持中＋設置済み設備の関連素材」を入手済み扱いにして、今見えているレシピが消えないようにする
function migrateV3(d) {
  const discovered = {};
  for (const k of Object.keys(d.player.inv || {})) discovered[k] = true;
  for (const b of d.buildings) {
    const cost = CONFIG.COSTS[b.type];
    if (cost) for (const k of Object.keys(cost)) discovered[k] = true;
    for (const src of [b.buffer, b.input, b.output, b.inv]) {
      if (!src) continue;
      for (const k of Object.keys(src)) discovered[k] = true;
    }
    if (b.item) discovered[b.item] = true;
    // 組立機で選択中のレシピは、材料が今すぐ手元になくても見え続けるようにする
    if (b.type === 'assembler' && b.recipeOut) {
      const recipe = CONFIG.RECIPES.find(r => r.out === b.recipeOut);
      if (recipe) { discovered[recipe.out] = true; for (const k of Object.keys(recipe.in)) discovered[k] = true; }
    }
  }
  return { ...d, v: 4, discovered };
}

// Phase3.2（v4・鉱脈内部埋蔵量がORE_VEIN_MULT倍される前）のセーブのore配列を新しい内部スケールへ換算する（v5）。
// 換算しないと、既存セーブの鉱脈が採掘機によって本来より大幅に速く枯渇してしまう
function migrateV4(d) {
  return { ...d, v: 5, ore: d.ore.map(v => v * CONFIG.ORE_VEIN_MULT) };
}

// Phase4（v5・第1〜第3エリアまで）のセーブを新マップ形式（v6・第4エリア＋星晶石＋ゲート図面）へ移行
function migrateV5(d) {
  const OLD_W = AREA_W * 3 + BORDER_W * 2; // v5時点のマップ幅（第1＋境界＋第2＋境界＋第3エリア）
  const OLD_H = MAP_H;
  const newTiles = new Uint8Array(W * H).fill(T_ROCK);
  const newOre = new Uint16Array(W * H);
  const newExplored = new Uint8Array(W * H);
  for (let y = 0; y < OLD_H; y++) for (let x = 0; x < OLD_W; x++) {
    const oi = y * OLD_W + x, ni = idx(x, y);   // 第1〜第3エリアの座標はそのまま（右側に追加するだけ）
    newTiles[ni] = +d.tiles[oi];
    newOre[ni] = d.ore[oi];
    newExplored[ni] = +d.explored[oi];
  }
  const rng = mulberry32((d.seed || CONFIG.SEED) + 5678);
  const area4 = genAreaLocal(rng, { hasBase: false, starCrystal: true, starCrystalVeins: 14, crystalVeins: 6, ironVeins: 4, stoneVeins: 4, rockClusters: 20 });
  for (let y = 0; y < MAP_H; y++) for (let x = 0; x < AREA_W; x++) {
    const ni = idx(AREA_W * 3 + BORDER_W * 3 + x, y), li = y * AREA_W + x;
    newTiles[ni] = area4.tiles[li];
    newOre[ni] = area4.ore[li];
  }
  carveBorderAndGate(newTiles, newOre);

  return {
    v: 6,
    seed: d.seed,
    tiles: Array.from(newTiles).join(''),
    ore: Array.from(newOre),
    explored: Array.from(newExplored).join(''),
    buildings: [...d.buildings, { type: 'gate', x: GATE3_X, y: GATE_Y, repaired: false, requiresTech: 'gate3Blueprint' }],
    player: d.player,
    flags: d.flags || {},
    research: d.research || {},
    discovered: d.discovered || {},
    cleared: !!d.cleared,
    beaconCleared: !!d.beaconCleared,
    time: d.time || 0,
    lastSeen: d.lastSeen || Date.now(),
  };
}

// Phase4.2（v6）：研究所ごとのconsumedを廃止し、技術ごとのグローバル進捗researchProgressへ統合（v7）
// 複数の研究所が別々にconsumedを持っていた場合は同じ技術IDへ合算する
function migrateV6(d) {
  const researchProgress = {};
  for (const b of d.buildings) {
    if (b.type === 'lab' && b.currentTech && b.consumed && !(d.research && d.research[b.currentTech])) {
      const p = researchProgress[b.currentTech] || (researchProgress[b.currentTech] = {});
      for (const [k, v] of Object.entries(b.consumed)) p[k] = (p[k] || 0) + v;
    }
    delete b.consumed;
  }
  return { ...d, v: 7, researchProgress };
}

// Phase4.5①（v7）：鉱脈埋蔵量を目安3.5倍に底上げ（v8）。既に残っている鉱脈(G.ore>0)のみ底上げし、
// 既に掘りつくしてT_PLAINになったタイルはore===0のままなので対象外（元の埋蔵量が分からないため復元しない）
const OREBOOST_MULT = 3.5;   // CONFIG.ORE_MIN/MAXの旧値(30-55)→新値(105-190)にかけた倍率と合わせてある
function migrateV7(d) {
  return { ...d, v: 8, ore: d.ore.map(v => v > 0 ? Math.round(v * OREBOOST_MULT) : v) };
}

// Phase4.5⑥（v8）：マップ外周をエリア境界と同じ岩で封鎖する（v9）。既存の設備があるタイルは
// 踏み荒らさないよう、封鎖前に一時退避して封鎖後に復元する
function migrateV8(d) {
  const tiles = new Uint8Array(W * H);
  for (let i = 0; i < d.tiles.length; i++) tiles[i] = +d.tiles[i];
  const ore = new Uint16Array(d.ore);
  const saved = d.buildings.map(b => ({ x: b.x, y: b.y, t: tiles[idx(b.x, b.y)], o: ore[idx(b.x, b.y)] }));
  sealOuterBorder(tiles, ore);
  for (const s of saved) { tiles[idx(s.x, s.y)] = s.t; ore[idx(s.x, s.y)] = s.o; }
  return { ...d, v: 9, tiles: Array.from(tiles).join(''), ore: Array.from(ore) };
}

// v(古い) -> 移行関数 のチェーン。新しい互換性破壊的変更を追加する時はここに1エントリ足すだけでよい
const MIGRATIONS = {
  1: migrateV1,   // v1（Phase1・単一エリア）→ v2（第1＋第2エリア＋ゲート）
  2: migrateV2,   // v2（第1＋第2エリア）→ v3（第3エリア＋ゲート図面研究）
  3: migrateV3,   // v3 → v4（素材図鑑discoveredを追加、レシピ段階解放）
  4: migrateV4,   // v4 → v5（鉱脈内部埋蔵量をORE_VEIN_MULT倍に換算、連打枯渇対策）
  5: migrateV5,   // v5 → v6（第4エリア＋星晶石＋ゲート図面研究、Phase4電力システム）
  6: migrateV6,   // v6 → v7（研究所consumedを廃止、グローバル研究進捗researchProgressへ統合）
  7: migrateV7,   // v7 → v8（鉱脈埋蔵量を目安3.5倍に底上げ、自動化ラインの早期枯渇対策）
  8: migrateV8,   // v8 → v9（マップ外周を岩で封鎖、「世界の果て」を視覚的に明確化）
};
// dをMIGRATIONSチェーンで最新のSAVE_VERSIONまで引き上げる。到達できなければnullを返す。
// loadGame（localStorage起動時）と設定画面の手動「読み込む」（JSON貼り付け）の両方から共有する
function migrateToLatest(d) {
  let migrated = false, guard = 0;
  while (d.v < SAVE_VERSION && MIGRATIONS[d.v] && guard++ < 10) {
    d = MIGRATIONS[d.v](d);
    migrated = true;
  }
  if (d.v !== SAVE_VERSION) return null;
  return { data: d, migrated };
}
function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const result = migrateToLatest(JSON.parse(raw));
    if (!result) return false;
    if (result.migrated) toast('セーブデータを新しい形式に更新しました');
    applySave(result.data);
    return true;
  } catch (e) { return false; }
}

// =====================================================================
// オフライン生産
// =====================================================================
// 全設備の保有アイテム総量をスナップショット（留守中レポートの差分計算用）
function snapshotProduction() {
  const totals = {};
  for (const b of Object.values(G.buildings)) {
    for (const src of [b.buffer, b.input, b.output, b.inv]) {
      if (!src) continue;
      for (const [k, v] of Object.entries(src)) totals[k] = (totals[k] || 0) + v;
    }
    if (b.item) totals[b.item] = (totals[b.item] || 0) + 1;
  }
  return totals;
}
// 1秒刻みで tickMachines を繰り返し、通常プレイと同じロジックで不在時間分を早送りする
// （枯渇・容量上限などはtick関数自体が処理するため、ここで特別扱いする必要はない）
//
// 不在時間（最大 OFFLINE_MAX_HOURS=4時間＝14400秒分）をすべて同期ループで一気に処理すると、
// 設備数が多い終盤セーブほど・不在時間が長いほどメインスレッドを長時間ブロックしてしまう
// （実測：504設備で4時間分＝約1.9秒、実機の遅いCPUや終盤の大規模セーブではこれが数十秒〜
// 1〜2分に増幅されうる）。バックグラウンドで長時間放置されたPWAをOSがメモリ不足等で
// 破棄し、復帰時に再読み込み（boot()の再実行）が発生するケースでは、プレイ中の任意の
// タイミング（例：建設メニューでの選択操作）の直後にこの重い同期処理がそのまま発生し、
// 「操作すると1〜2分固まってから自然に復帰する」という症状として現れていた。
// 1フレーム分の時間予算（PROGRESS_BUDGET_MS）ごとに小分けにして、コミット手段は変えず
// （STEP=1秒・tickMachinesの呼び出し方は従来通り）フレームの合間に処理を進める
async function simulateOffline(totalSeconds, onProgress) {
  const STEP = 1;
  const PROGRESS_BUDGET_MS = 8; // 1フレーム(16.6ms)のうち計算に使ってよい目安時間
  let remaining = totalSeconds;
  const total = totalSeconds;
  let sinceYield = performance.now();
  while (remaining > 0.001) {
    const step = Math.min(STEP, remaining);
    tickMachines(step);
    remaining -= step;
    if (performance.now() - sinceYield >= PROGRESS_BUDGET_MS) {
      if (onProgress) onProgress(1 - remaining / total);
      // rAFはバックグラウンドタブ扱いだと止まる/大幅に間引かれる環境があるため、
      // 可視状態に依存しないsetTimeoutでイベントループに制御を返す
      await new Promise(r => setTimeout(r, 0));
      sinceYield = performance.now();
    }
  }
  if (onProgress) onProgress(1);
}
function showOfflineReport(seconds, before, after) {
  const hrs = Math.floor(seconds / 3600), mins = Math.floor((seconds % 3600) / 60);
  const timeTxt = hrs > 0 ? `${hrs}時間${mins}分` : `${mins}分`;
  const keys = new Set([...Object.keys(before), ...Object.keys(after)]);
  const rows = [...keys]
    .map(k => ({ k, diff: (after[k] || 0) - (before[k] || 0) }))
    .filter(r => r.diff !== 0 && ITEMS[r.k])
    .sort((a, b) => b.diff - a.diff);
  const list = rows.length
    ? rows.map(r => `<div class="row"><span class="dot" style="background:${ITEMS[r.k].color}"></span><div class="grow">${ITEMS[r.k].name}</div><b style="color:${r.diff > 0 ? 'var(--accent)' : 'var(--danger)'}">${r.diff > 0 ? '+' : ''}${r.diff}</b></div>`).join('')
    : '<div class="row">目立った変化はなかった</div>';
  showPanel(`<h2>🌙 留守中の生産レポート<button class="close-x">✕</button></h2>
    <div class="row"><div class="grow">${timeTxt}ぶんの時間が経過し、自動化設備が稼働していた。</div></div>
    ${list}`);
  openedPanel = null;
}

// =====================================================================
// バージョンチェック（インストール済みPWAにコード更新が反映されない対策）
// デプロイのたびにGAME_VERSIONを上げると、開いたままのPWAに更新通知が出せる
// =====================================================================
const GAME_VERSION = '4.16.0';
async function checkForUpdate() {
  try {
    // cache無視で自身(index.html)を再取得し、埋め込まれたGAME_VERSION表記を比較する
    const res = await fetch(location.pathname + '?_v=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return;
    const text = await res.text();
    const m = text.match(/const GAME_VERSION = '([^']+)'/);
    if (m && m[1] && m[1] !== GAME_VERSION) {
      document.getElementById('update-banner').style.display = 'flex';
    }
  } catch (e) { /* オフライン等は無視。次回起動時にまた確認する */ }
}
document.getElementById('update-banner-text').onclick = () => {
  // Phase3.2の設定リセット修正と同じ考え方：クエリを変えて別URL扱いにし、キャッシュを避けて確実に最新化する
  location.href = location.pathname + '?updated=' + Date.now();
};
document.getElementById('update-banner-close').onclick = (e) => {
  e.stopPropagation();
  document.getElementById('update-banner').style.display = 'none';
};

// =====================================================================
// 起動
// =====================================================================
// バックグラウンド化・終了時は、保留中のデバウンス保存(scheduleSave)を待たずに必ず即時保存する
document.addEventListener('visibilitychange', () => { if (document.hidden) { clearTimeout(saveDebounceTimer); saveGame(); } });
window.addEventListener('pagehide', () => { clearTimeout(saveDebounceTimer); saveGame(); });

async function boot() {
  resize();
  checkForUpdate();
  const hadSave = loadGame();
  if (!hadSave) {
    genMap(CONFIG.SEED);
    toast('未知の惑星に不時着した…。まずは鉱脈をタップして資源を集めよう！');
  } else {
    const elapsedSec = Math.min(CONFIG.OFFLINE_MAX_HOURS * 3600, Math.max(0, (Date.now() - (G.lastSeen || Date.now())) / 1000));
    if (elapsedSec > CONFIG.OFFLINE_REPORT_MIN_SEC) {
      const before = snapshotProduction();
      const overlay = document.getElementById('offline-progress');
      const bar = document.getElementById('offline-progress-bar');
      overlay.style.display = 'flex';
      await simulateOffline(elapsedSec, p => { bar.style.width = Math.round(p * 100) + '%'; });
      overlay.style.display = 'none';
      const after = snapshotProduction();
      showOfflineReport(elapsedSec, before, after);
    }
  }
  G.lastSeen = Date.now();
  centerCamera(true);
  markDirty();
  updateBuildModeUI();

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.1, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
boot();
</script>
</body>
</html>
